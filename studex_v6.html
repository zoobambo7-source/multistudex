  const pad2 = n => String(n).padStart(2,'0');
  const examDateLabel = examDate ? new Date(examDate+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '';
  const startDateLabel = startDate ? new Date(startDate+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : 'Not set';

  return (
    <div className="con-layout">
      {/* LEFT: main content */}
      <div className="con-left">
        {/* Top bar: title + date pickers */}
        <div className="con-topbar">
          <div className="con-title-block">
            <div className="con-title">Consistency Tracker</div>
            <div className="con-subtitle">Track your daily study habit toward JEE</div>
          </div>
          <div className="con-date-controls">
            <div className="con-date-field">
              <span className="con-exam-label">Start Date</span>
              <input className="con-exam-input" type="date" value={startDate} onChange={e=>saveStartDate(e.target.value)}/>
            </div>
            <div className="con-date-sep">→</div>
            <div className="con-date-field">
              <span className="con-exam-label">Exam Date</span>
              <input className="con-exam-input" type="date" value={examDate} onChange={e=>saveExamDate(e.target.value)}/>
            </div>
          </div>
        </div>

        {/* Stats strip */}
        <div className="con-stats">
          {[
            {num: totalDays || '—', lbl: 'Total Days'},
            {num: studied.length, lbl: 'Studied'},
            {num: studyRate+'%', lbl: 'Consistency'},
            {num: curStreak, lbl: 'Current Streak'},
            {num: longestStreak, lbl: 'Best Streak'},
            {num: daysLeft, lbl: 'Days Left'},
          ].map((s,i)=>(
            <div key={i} className="con-stat">
              <div className="con-stat-num">{s.num}</div>
              <div className="con-stat-lbl">{s.lbl}</div>
            </div>
          ))}
        </div>

        {/* Countdown */}
        {examDate ? (
          <div className="con-countdown-bar">
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
              <div style={{display:'flex',alignItems:'flex-end',gap:0}}>
                <div className="flip-unit"><div className="flip-num">{countdown.d}</div><div className="flip-label">Days</div></div>
                <div className="flip-sep">:</div>
                <div className="flip-unit"><div className="flip-num">{pad2(countdown.h)}</div><div className="flip-label">Hours</div></div>
                <div className="flip-sep">:</div>
                <div className="flip-unit"><div className="flip-num">{pad2(countdown.m)}</div><div className="flip-label">Mins</div></div>
                <div className="flip-sep">:</div>
                <div className="flip-unit"><div className="flip-num">{pad2(countdown.s)}</div><div className="flip-label">Secs</div></div>
              </div>
              <div className="con-range">{startDate ? startDateLabel : 'Today'} → {examDateLabel}{totalDays > 0 ? ` · ${totalDays} days` : ''}</div>
            </div>
          </div>
        ) : (
          <div className="con-no-exam">Set your start date and exam date above to begin tracking</div>
        )}

        {/* Heatmap — fills the rest */}
        <div className="con-heatmap-section">
          <div className="con-section-title">
            Activity Heatmap
            <div className="con-heatmap-legend">
              <div className="con-legend-item"><div className="con-legend-dot" style={{background:'var(--s-high)'}}/>Not marked</div>
              <div className="con-legend-item"><div className="con-legend-dot" style={{background:'var(--ink)'}}/>Studied</div>
              <div className="con-legend-item"><div className="con-legend-dot" style={{background:'var(--err)'}}/>Missed</div>
            </div>
          </div>
          <div className="heatmap-outer">
            <div className="heatmap-container">
              <div className="heatmap-dow-labels">
                {['S','M','T','W','T','F','S'].map((l,i)=><div key={i} className="heatmap-dow-label">{l}</div>)}
              </div>
              {cols.map((col,ci)=>(
                <div key={ci} className="heatmap-col">
                  <div className="heatmap-month-label">{getMonthLabel(col)}</div>
                  {col.map(date=>{
                    const isFuture = date > todayStr;
                    const isToday = date === todayStr;
                    const status = daysMap[date] || 'none';
                    return (
                      <div
                        key={date}
                        className={`heatmap-cell${isFuture?' future':''}${isToday?' today-cell':''}`}
                        data-status={isFuture?'none':status}
                        title={`${date} — ${status}`}
                        onClick={e=>{
                          if (isFuture) return;
                          const rect = e.target.getBoundingClientRect();
                          setPopup({date, x: rect.left, y: rect.bottom+4});
                        }}
                      />
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* RIGHT: This Week + gap warnings */}
      <div className="con-right">
        <div className="con-right-section">
          <div className="con-section-title">
            This Week
            <span style={{fontWeight:400,fontSize:9,color:'var(--muted)'}}>
              {new Date(weekDays[0]+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})} — {new Date(weekDays[6]+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
            </span>
          </div>
          <div className="week-grid">
            {weekDays.map((date,i)=>{
              const isFuture = date > todayStr;
              const isToday = date === todayStr;
              const status = daysMap[date] || 'none';
              const markerLabel = isFuture ? '—' : status === 'studied' ? 'S' : status === 'missed' ? 'M' : '·';
              const statusLbl = isFuture ? 'future' : status === 'none' ? '—' : status;
              return (
                <div
                  key={date}
                  className={`week-day${isFuture?' week-future':''}${isToday?' today-cell':''}`}
                  data-status={isFuture?'none':status}
                  style={isToday&&status==='none'?{borderColor:'var(--ink)',borderWidth:2}:{}}
                  onClick={()=>{
                    if (isFuture) return;
                    const x = window.innerWidth - 340, y = 300;
                    setPopup({date, x, y});
                  }}
                >
                  <div className="week-day-name">{DOW_NAMES[i]}</div>
                  <div className="week-day-date">{new Date(date+'T00:00:00').getDate()}</div>
                  <div className="week-day-marker">{markerLabel}</div>
                  <div className="week-day-status-lbl">{statusLbl}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Gap warnings */}
        {warnings.length > 0 && (
          <div className="con-right-section">
            <div className="con-section-title">Gaps</div>
            {warnings.map((w,i)=>(
              <div key={i} className="gap-warning">
                <span className="icon">warning</span>
                <span className="gap-warning-text">{w.len} missed days<br/><span style={{fontWeight:400,fontSize:10}}>{fmtDate(w.start)} → {fmtDate(w.end)}</span></span>
              </div>
            ))}
          </div>
        )}

        {/* Instructions */}
        <div className="con-right-section" style={{color:'var(--muted)',fontSize:11,lineHeight:1.6}}>
          <div className="con-section-title">How to use</div>
          Click any past day in the heatmap or week view to mark it as <strong>Studied</strong> or <strong>Missed</strong>. Unmarked past days count as missed.
        </div>
      </div>

      {/* Popup */}
      {popup && (
        <div ref={popupRef} className="heatmap-popup" style={{top:Math.min(popup.y, window.innerHeight-140), left:Math.min(popup.x, window.innerWidth-160)}}>
          <div className="heatmap-popup-date">{fmtDate(popup.date)}</div>
          <button className="heatmap-popup-btn" onClick={()=>setDayStatus(popup.date,'studied')}>
            <div className="heatmap-popup-dot" style={{background:'var(--ink)'}}/>Studied
          </button>
          <button className="heatmap-popup-btn" onClick={()=>setDayStatus(popup.date,'missed')}>
            <div className="heatmap-popup-dot" style={{background:'var(--err)'}}/>Missed
          </button>
          <button className="heatmap-popup-btn" onClick={()=>setDayStatus(popup.date,'clear')}>
            <div className="heatmap-popup-dot" style={{background:'var(--s-dim)'}}/>Clear
          </button>
        </div>
      )}
    </div>
  );
}

// ===================== QUESTION COUNTER =====================
function QuestionCounter({ user, showToast }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [count, setCount] = useState(25);
  const [subject, setSubject] = useState('');
  const [qtype, setQtype] = useState('');
  const [saving, setSaving] = useState(false);

  const SUBJS = [
    {id:'maths',label:'Maths',color:'var(--c-maths)'},
    {id:'physics',label:'Physics',color:'var(--c-physics)'},
    {id:'organic',label:'Organic',color:'var(--c-organic)'},
    {id:'inorganic',label:'Inorganic',color:'var(--c-inorganic)'},
    {id:'physical',label:'Physical',color:'var(--c-physical)'},
  ];
  const TYPES = [{id:'mains',label:'Mains'},{id:'advanced',label:'Advanced'},{id:'practice',label:'Practice'}];

  useEffect(() => {
    if (!user) return;
    sb.from('question_logs').select('*').eq('user_id', user.id).order('logged_at',{ascending:false}).then(({data,error})=>{
      if (!error) setLogs(data || []);
      setLoading(false);
    });
  }, [user]);

  const total = logs.reduce((a,l)=>a+l.count, 0);
  const byType = {mains:0, advanced:0, practice:0};
  const bySubj = {maths:0, physics:0, organic:0, inorganic:0, physical:0};
  logs.forEach(l=>{ byType[l.question_type]=(byType[l.question_type]||0)+l.count; bySubj[l.subject]=(bySubj[l.subject]||0)+l.count; });

  async function handleLog() {
    if (!subject || !qtype || count < 1) return;
    setSaving(true);
    const { data, error } = await sb.from('question_logs').insert({
      user_id: user.id, count, subject, question_type: qtype
    }).select().single();
    if (error) { showToast('Failed to log questions', 'error'); }
    else { setLogs(p=>[data,...p]); showToast(`Logged ${count} questions!`, 'add_circle'); setCount(25); }
    setSaving(false);
  }

  async function handleDelete(id) {
    const { error } = await sb.from('question_logs').delete().eq('id', id);
    if (error) { showToast('Delete failed', 'error'); return; }
    setLogs(p=>p.filter(l=>l.id!==id));
    showToast('Entry deleted', 'delete');
  }

  async function handleClearAll() {
    if (!confirm('Delete all question logs? This cannot be undone.')) return;
    const { error } = await sb.from('question_logs').delete().eq('user_id', user.id);
    if (error) { showToast('Clear failed', 'error'); return; }
    setLogs([]);
    showToast('All logs cleared', 'delete_forever');
  }

  function fmtLogTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  }

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="qc-layout">
      {/* Top hero bar */}
      <div className="qc-hero-bar">
        <div className="qc-hero-top">
          <div className="qc-hero-left">
            <div className="qc-total-label">Total Questions Solved</div>
            <div className="qc-total">{total.toLocaleString()}</div>
            <div className="qc-total-sub">across {Object.values(bySubj).filter(v=>v>0).length} subjects &amp; {Object.values(byType).filter(v=>v>0).length} types</div>
          </div>
          <div className="qc-type-legend">
            {[{id:'mains',label:'JEE Mains',color:'var(--c-maths)'},{id:'advanced',label:'JEE Advanced',color:'var(--c-physics)'},{id:'practice',label:'Practice',color:'var(--c-organic)'}].map(t=>(
              <div key={t.id} className="qc-type-item">
                <div className="qc-type-dot" style={{background:t.color}}/>
                <span className="qc-type-name">{t.label}</span>
                <span className="qc-type-num">{(byType[t.id]||0).toLocaleString()}</span>
              </div>
            ))}
          </div>
        </div>
        {/* Subject cells */}
        <div className="qc-subjects">
          {SUBJS.map(s=>(
            <div key={s.id} className="qc-subj-cell">
              <div className="qc-subj-label">{s.label}</div>
              <div className="qc-subj-num">{bySubj[s.id]||0}</div>
              <div className="qc-subj-bar-wrap">
                <div className="qc-subj-bar" style={{width: total>0 ? `${Math.round((bySubj[s.id]||0)/total*100)}%` : '0%', background:s.color}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Body */}
      <div className="qc-body">
        {/* Left: log form */}
        <div className="qc-left">
          <div className="qc-form">
            <div className="qc-form-title">Log Questions</div>
            <div style={{fontSize:9,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Number of Questions</div>
            <div className="qc-count-wrap">
              <button className="qc-stepper" onClick={()=>setCount(c=>Math.max(1,c-1))}>−</button>
              <input className="qc-count-input" type="number" min="1" value={count} onChange={e=>setCount(Math.max(1,+e.target.value||1))}/>
              <button className="qc-stepper" onClick={()=>setCount(c=>c+1)}>+</button>
            </div>
            <div className="qc-presets">
              {[10,20,30,75,90].map(n=><button key={n} className="qc-preset" onClick={()=>setCount(n)}>{n}</button>)}
            </div>
            <div className="qc-sel-group">
              <div className="qc-sel-label">Subject</div>
              <div className="qc-sel-btns">
                {SUBJS.map(s=>(
                  <button key={s.id} className={`qc-sel-btn${subject===s.id?' active-subj-'+s.id:''}`} onClick={()=>setSubject(s.id)}>{s.label}</button>
                ))}
              </div>
            </div>
            <div className="qc-sel-group">
              <div className="qc-sel-label">Type</div>
              <div className="qc-sel-btns">
                {TYPES.map(t=>(
                  <button key={t.id} className={`qc-sel-btn${qtype===t.id?' active-type':''}`} onClick={()=>setQtype(t.id)}>{t.label}</button>
                ))}
              </div>
            </div>
            <button className="qc-log-btn" disabled={!subject||!qtype||saving} onClick={handleLog}>
              {saving ? <span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/> : null}
              Log Questions
            </button>
          </div>
        </div>

        {/* Right: history */}
        <div className="qc-right">
          <div className="qc-history">
            <div className="qc-history-head">
              <span className="qc-history-title">History ({logs.length})</span>
              {logs.length > 0 && <button className="btn-ghost" onClick={handleClearAll}>Clear All</button>}
            </div>
            {logs.length === 0 ? (
              <div className="qc-empty">
                <span className="icon">calculate</span>
                No questions logged yet. Log your first session!
              </div>
            ) : logs.map(l=>(
              <div key={l.id} className="qc-entry">
                <div className="qc-entry-count">{l.count}</div>
                <div className="qc-entry-info">
                  <div className="qc-entry-subj">{SUBJS.find(s=>s.id===l.subject)?.label}</div>
                  <div className="qc-entry-meta">{fmtLogTime(l.logged_at)}</div>
                </div>
                <span className={`qc-entry-badge qc-badge-${l.question_type}`}>{l.question_type}</span>
                <button className="qc-del-btn" onClick={()=>handleDelete(l.id)}>
                  <span className="icon">delete</span>
                </button>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ===================== MOCK ANALYSIS =====================
function MockAnalysis({ user, showToast }) {
  const [mocks, setMocks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [chartFilter, setChartFilter] = useState('all');
  const canvasRef = useRef(null);

  const [form, setForm] = useState({
    test_name:'', test_type:'mains', test_date:today(),
    marks_maths:0, marks_physics:0, marks_chemistry:0,
    max_marks:300, notes:''
  });

  // UI subjects — Chemistry is the merged field for Organic+Inorganic+Physical
  const SUBJS = [
    {id:'marks_maths',label:'Maths',key:'maths'},
    {id:'marks_physics',label:'Physics',key:'physics'},
    {id:'marks_chemistry',label:'Chemistry',key:'chemistry'},
  ];

  // Split chemistry total evenly across the 3 DB fields
  function splitChem(total) {
    const base = Math.floor(total / 3);
    const rem = total % 3;
    return { marks_organic: base + (rem > 0 ? 1 : 0), marks_inorganic: base + (rem > 1 ? 1 : 0), marks_physical: base };
  }

  // Get chemistry total from a saved mock row
  function mockChem(m) { return (m.marks_organic||0) + (m.marks_inorganic||0) + (m.marks_physical||0); }

  useEffect(()=>{
    if (!user) return;
    sb.from('mock_tests').select('*').eq('user_id',user.id).order('test_date',{ascending:true}).then(({data,error})=>{
      if (!error) setMocks(data||[]);
      setLoading(false);
    });
  },[user]);

  useEffect(()=>{ drawChart(); },[mocks, chartFilter]);

  function drawChart() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const filtered = chartFilter==='all' ? mocks : mocks.filter(m=>m.test_type===chartFilter);
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth, H = 160;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    ctx.clearRect(0,0,W,H);
    if (filtered.length < 2) return;
    const pts = filtered.map(m=>({ x:m.test_date, y:Math.round((m.total_marks/m.max_marks)*100) }));
    const minY=0, maxY=100;
    const pad = {t:12,r:12,b:24,l:34};
    const xStep = (W-pad.l-pad.r)/(pts.length-1);
    function px(i) { return pad.l + i*xStep; }
    function py(v) { return pad.t+(H-pad.t-pad.b)*(1-(v-minY)/(maxY-minY)); }
    // Grid lines
    ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=1;
    [0,25,50,75,100].forEach(v=>{
      ctx.beginPath(); ctx.moveTo(pad.l,py(v)); ctx.lineTo(W-pad.r,py(v)); ctx.stroke();
      ctx.fillStyle='#5d5e66'; ctx.font='10px Geist,sans-serif'; ctx.fillText(v+'%',2,py(v)+3.5);
    });
    // Line
    ctx.beginPath(); ctx.strokeStyle='#000'; ctx.lineWidth=2;
    pts.forEach((p,i)=>{ i===0?ctx.moveTo(px(i),py(p.y)):ctx.lineTo(px(i),py(p.y)); });
    ctx.stroke();
    // Dots
    pts.forEach((p,i)=>{
      const color = p.y>=70?'#16a34a':p.y>=40?'#ea580c':'#ba1a1a';
      ctx.beginPath(); ctx.arc(px(i),py(p.y),5,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    });
  }

  const liveTotal = (+form.marks_maths||0) + (+form.marks_physics||0) + (+form.marks_chemistry||0);
  const livePct = form.max_marks > 0 ? Math.round(liveTotal/form.max_marks*100) : 0;

  async function handleSubmit() {
    if (!form.test_name.trim()) { showToast('Enter a test name','error'); return; }
    setSaving(true);
    const chemSplit = splitChem(+form.marks_chemistry||0);
    const payload = { ...form, user_id: user.id,
      marks_maths:+form.marks_maths||0, marks_physics:+form.marks_physics||0,
      ...chemSplit, max_marks:+form.max_marks||300 };
    delete payload.marks_chemistry;
    delete payload.notes_blank;
    const { data, error } = await sb.from('mock_tests').insert(payload).select().single();
    if (error) { showToast('Failed to save mock', 'error'); }
    else {
      setMocks(p=>[...p,data].sort((a,b)=>a.test_date>b.test_date?1:-1));
      showToast('Mock test saved!', 'bar_chart');
      setForm({test_name:'',test_type:'mains',test_date:today(),marks_maths:0,marks_physics:0,marks_chemistry:0,max_marks:300,notes:''});
    }
    setSaving(false);
  }

  async function handleDelete(id) {
    const { error } = await sb.from('mock_tests').delete().eq('id', id);
    if (error) { showToast('Delete failed','error'); return; }
    setMocks(p=>p.filter(m=>m.id!==id));
    showToast('Mock deleted','delete');
  }

  // Stats
  const count = mocks.length;
  const avgPct = count===0 ? 0 : Math.round(mocks.reduce((a,m)=>a+m.total_marks/m.max_marks*100,0)/count);
  const bestPct = count===0 ? 0 : Math.round(Math.max(...mocks.map(m=>m.total_marks/m.max_marks*100)));
  const avgMarks = count===0 ? 0 : Math.round(mocks.reduce((a,m)=>a+m.total_marks,0)/count);

  // Subject avgs (Chemistry = organic+inorganic+physical combined)
  const subjAvgs = {};
  if (!count) { subjAvgs.maths=0; subjAvgs.physics=0; subjAvgs.chemistry=0; }
  else {
    let totM=0,totP=0,totC=0,maxM=0,maxP=0,maxC=0;
    mocks.forEach(m=>{
      totM+=(m.marks_maths||0); totP+=(m.marks_physics||0);
      totC+=mockChem(m);
      maxM+=m.max_marks/3; maxP+=m.max_marks/3; maxC+=m.max_marks/3;
    });
    subjAvgs.maths  = maxM>0 ? Math.round(totM/maxM*100) : 0;
    subjAvgs.physics= maxP>0 ? Math.round(totP/maxP*100) : 0;
    subjAvgs.chemistry=maxC>0 ? Math.round(totC/maxC*100) : 0;
  }

  function tierClass(pct) { return pct>=70?'tier-green':pct>=40?'tier-amber':'tier-red'; }
  function pctClass(pct) { return pct>=70?'green':pct>=40?'amber':'red'; }
  function badgeClass(t) { return `ma-badge-${t}`; }

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="ma-layout">
      {/* Left: form */}
      <div className="ma-left">
        <div className="ma-form">
          <div className="ma-form-title">Log Mock Test</div>
          <div className="ma-field"><label>Test Name</label><input type="text" value={form.test_name} onChange={e=>setForm(p=>({...p,test_name:e.target.value}))} placeholder="e.g. Allen Major 12"/></div>
          <div style={{marginBottom:12}}>
            <div className="ma-field" style={{marginBottom:6}}><label>Type</label></div>
            <div className="ma-type-btns">
              {['mains','advanced','practice'].map(t=>(
                <button key={t} className={`ma-type-btn${form.test_type===t?' active':''}`} onClick={()=>setForm(p=>({...p,test_type:t}))}>{t}</button>
              ))}
            </div>
          </div>
          <div className="ma-field"><label>Date</label><input type="date" value={form.test_date} onChange={e=>setForm(p=>({...p,test_date:e.target.value}))}/></div>
          <div style={{marginBottom:8}}><span style={{fontSize:9,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)'}}>Subject Marks</span></div>
          <div className="ma-scores-grid">
            {SUBJS.map(s=>{
              const perSubjMax = Math.floor((+form.max_marks||300) / 3);
              return (
                <div key={s.id} className="ma-score-field">
                  <span className="ma-score-label" title={`Max: ${perSubjMax}`}>{s.label} <span style={{fontWeight:400,opacity:0.6}}>(/{perSubjMax})</span></span>
                  <input className="ma-score-input" type="number" min="0" max={perSubjMax} value={form[s.id]}
                    onChange={e=>{
                      const val = Math.min(Math.max(0, +e.target.value||0), perSubjMax);
                      setForm(p=>({...p,[s.id]:val}));
                    }}
                    onBlur={e=>{
                      const val = Math.min(Math.max(0, +e.target.value||0), perSubjMax);
                      setForm(p=>({...p,[s.id]:val}));
                    }}
                    style={+form[s.id] > perSubjMax ? {borderColor:'var(--err)'} : {}}
                  />
                </div>
              );
            })}
            <div className="ma-score-field">
              <span className="ma-score-label">Max Marks</span>
              <input className="ma-score-input" type="number" min="1" value={form.max_marks}
                onChange={e=>{
                  const newMax = +e.target.value||300;
                  const cap = Math.floor(newMax/3);
                  setForm(p=>({
                    ...p,
                    max_marks: e.target.value,
                    marks_maths: Math.min(+p.marks_maths, cap),
                    marks_physics: Math.min(+p.marks_physics, cap),
                    marks_chemistry: Math.min(+p.marks_chemistry, cap),
                  }));
                }}
              />
            </div>
          </div>
          <div className="ma-live-total">
            <div><div style={{fontSize:9,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)'}}>Total</div><div className="ma-live-num">{liveTotal}/{form.max_marks}</div></div>
            <div style={{fontSize:24,fontFamily:'Libre Caslon Text,serif',fontWeight:700,color:livePct>=70?'#16a34a':livePct>=40?'#ea580c':'var(--err)'}}>{livePct}%</div>
          </div>
          <div className="ma-field"><label>Notes (optional)</label><textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Reflections, weak areas..."/></div>
          <button className="ma-submit-btn" disabled={saving||!form.test_name.trim()} onClick={handleSubmit}>
            {saving?<span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/>:null}
            Save Mock
          </button>
        </div>
      </div>

      {/* Right: analytics */}
      <div className="ma-right">
        {/* Summary stats */}
        <div className="ma-stats-strip">
          {[{num:count,lbl:'Tests Logged'},{num:avgPct+'%',lbl:'Avg Score %'},{num:bestPct+'%',lbl:'Best Score'},{num:avgMarks,lbl:'Avg Marks'}].map((s,i)=>(
            <div key={i} className="ma-stat"><div className="ma-stat-num">{s.num}</div><div className="ma-stat-lbl">{s.lbl}</div></div>
          ))}
        </div>

        {/* Subject bars */}
        <div className="ma-subj-perf">
          <div className="ma-subj-perf-title">Avg % by Subject</div>
          {SUBJS.map(s=>(
            <div key={s.key} className="ma-perf-row">
              <span className="ma-perf-label">{s.label}</span>
              <div className="ma-perf-bar-wrap"><div className="ma-perf-bar" style={{width:`${subjAvgs[s.key]}%`}}/></div>
              <span className="ma-perf-val">{subjAvgs[s.key]}%</span>
            </div>
          ))}
        </div>

        {/* Chart */}
        <div className="ma-chart-wrap">
          <div className="ma-chart-title">
            Performance Trend
            <div className="ma-chart-filters">
              {['all','mains','advanced','practice'].map(f=>(
                <button key={f} className={`ma-chart-filter${chartFilter===f?' active':''}`} onClick={()=>setChartFilter(f)}>{f==='all'?'All':f}</button>
              ))}
            </div>
          </div>
          {mocks.filter(m=>chartFilter==='all'||m.test_type===chartFilter).length < 2
            ? <div className="ma-chart-empty">Add at least 2 tests to see the trend</div>
            : <canvas ref={canvasRef} className="ma-chart-canvas" style={{display:'block',width:'100%',height:160}}/>
          }
        </div>

        {/* History cards */}
        <div className="ma-history">
          <div className="ma-history-title">All Mocks ({count})</div>
          {count === 0 ? (
            <div className="ma-empty"><span className="icon">bar_chart</span>No mock tests logged yet.</div>
          ) : (
            <div className="ma-cards-grid">
              {[...mocks].reverse().map(m=>{
                const pct = Math.round(m.total_marks/m.max_marks*100);
                return (
                  <div key={m.id} className={`ma-card ${tierClass(pct)}`}>
                    <div className="ma-card-top">
                      <div className="ma-card-name">{m.test_name}</div>
                      <div className="ma-card-date">{fmtDate(m.test_date)}</div>
                      <div className={`ma-card-pct ${pctClass(pct)}`}>{pct}%</div>
                      <div className="ma-card-marks">{m.total_marks} / {m.max_marks} marks</div>
                    </div>
                    <div className="ma-card-tags">
                      <span className="ma-card-tag">Maths: {m.marks_maths||0}</span>
                      <span className="ma-card-tag">Physics: {m.marks_physics||0}</span>
                      <span className="ma-card-tag">Chemistry: {mockChem(m)}</span>
                    </div>
                    {m.notes && <div className="ma-card-notes">{m.notes}</div>}
                    <div className="ma-card-footer">
                      <span className={`ma-card-type-badge ${badgeClass(m.test_type)}`}>{m.test_type}</span>
                      <button className="ma-card-del" onClick={()=>handleDelete(m.id)}><span className="icon">delete</span></button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ===================== REPORT GENERATOR =====================
function ReportGenerator({ user, showToast }) {
  const [startDate, setStartDate] = useState(() => {
    const d = new Date(); d.setMonth(d.getMonth() - 1);
    return d.toISOString().slice(0,10);
  });
  const [endDate, setEndDate] = useState(() => today());
  const [reportData, setReportData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [generating, setGenerating] = useState(false);

  async function fetchReport() {
    if (!startDate || !endDate || startDate > endDate) {
      showToast('Please set a valid date range', 'error'); return;
    }
    setLoading(true);
    setReportData(null);
    try {
      const [chkRes, revRes, qRes, mockRes, conRes] = await Promise.all([
        sb.from('studex_checked').select('chapter_id,checked_at').eq('user_id', user.id)
          .gte('checked_at', startDate).lte('checked_at', endDate).order('checked_at'),
        sb.from('studex_rev_done').select('rev_id').eq('user_id', user.id),
        sb.from('question_logs').select('*').eq('user_id', user.id)
          .gte('logged_at', startDate + 'T00:00:00').lte('logged_at', endDate + 'T23:59:59').order('logged_at',{ascending:false}),
        sb.from('mock_tests').select('*').eq('user_id', user.id)
          .gte('test_date', startDate).lte('test_date', endDate).order('test_date'),
        sb.from('consistency_days').select('day_date,status').eq('user_id', user.id)
          .gte('day_date', startDate).lte('day_date', endDate).order('day_date'),
      ]);

      const doneRevIds = new Set((revRes.data||[]).map(r=>r.rev_id));
      const chapters = (chkRes.data||[]).map(r => {
        const subj = CH_TO_SUBJ[r.chapter_id];
        const ch = subj?.chapters.find(c=>c.id===r.chapter_id);
        return { id: r.chapter_id, name: ch?.name||r.chapter_id, subject: subj?.label||'', color: subj?.color||'#000', date: r.checked_at };
      });

      // Count revisions done in range — we approximate by checking if the rev_id exists
      const revsInRange = chapters.flatMap(c =>
        REV_DAYS.map(d => ({ revId: `${c.id}_r${d}`, day: d, chapterName: c.name, subject: c.subject }))
      ).filter(r => doneRevIds.has(r.revId));

      const questions = qRes.data||[];
      const mocks = mockRes.data||[];
      const consistency = conRes.data||[];

      const studiedDays = consistency.filter(d=>d.status==='studied').length;
      const missedDays = consistency.filter(d=>d.status==='missed').length;
      const totalQ = questions.reduce((a,q)=>a+q.count,0);

      setReportData({ startDate, endDate, chapters, revsInRange, questions, mocks, consistency, studiedDays, missedDays, totalQ });
    } catch(e) { showToast('Failed to load data', 'error'); }
    setLoading(false);
  }

  function fmtDateShort(d) {
    return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }

  function generatePDF() {
    if (!reportData) return;
    setGenerating(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      const W = 210, H = 297;
      const margin = 18;
      let y = margin;

      const INK = [0,0,0];
      const MUTED = [93,94,102];
      const RULE = [220,215,216];
      const ERR = [186,26,26];
      const GREEN = [22,163,74];

      function checkPage(needed=10) {
        if (y + needed > H - margin) {
          doc.addPage();
          y = margin;
          // header bar on new pages
          doc.setFillColor(...INK);
          doc.rect(0, 0, W, 8, 'F');
          doc.setFontSize(7); doc.setTextColor(255,255,255);
          doc.setFont('helvetica','bold');
          doc.text('STUDEX — JEE Preparation Report', margin, 5.5);
          doc.text(`${fmtDateShort(reportData.startDate)} – ${fmtDateShort(reportData.endDate)}`, W-margin, 5.5, {align:'right'});
          y = 16;
        }
      }

      // ── COVER HEADER ──
      doc.setFillColor(...INK);
      doc.rect(0, 0, W, 38, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(22); doc.setTextColor(255,255,255);
      doc.text('STUDEX', margin, 18);
      doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.setTextColor(200,200,200);
      doc.text('JEE PREPARATION — PROGRESS REPORT', margin, 25);
      doc.setFontSize(10); doc.setTextColor(255,255,255);
      doc.text(`${fmtDateShort(reportData.startDate)}  →  ${fmtDateShort(reportData.endDate)}`, margin, 33);
      y = 48;

      // ── SUMMARY STATS ──
      doc.setFont('helvetica','bold'); doc.setFontSize(8);
      doc.setTextColor(...MUTED);
      doc.text('SUMMARY', margin, y); y += 5;

      const stats = [
        { num: String(reportData.chapters.length), lbl: 'Chapters Studied' },
        { num: String(reportData.revsInRange.length), lbl: 'Revisions Done' },
        { num: String(reportData.totalQ), lbl: 'Questions Solved' },
        { num: String(reportData.mocks.length), lbl: 'Mock Tests' },
        { num: String(reportData.studiedDays), lbl: 'Days Studied' },
        { num: String(reportData.missedDays), lbl: 'Days Missed' },
      ];
      const bw = (W - margin*2 - 5*4) / 6;
      stats.forEach((s,i) => {
        const bx = margin + i*(bw+4);
        doc.setFillColor(245,245,245);
        doc.rect(bx, y, bw, 18, 'F');
        doc.setFillColor(...INK);
        doc.rect(bx, y, bw, 1.5, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(16);
        doc.setTextColor(...INK);
        doc.text(s.num, bx+bw/2, y+11, {align:'center'});
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
        doc.setTextColor(...MUTED);
        doc.text(s.lbl, bx+bw/2, y+16.5, {align:'center'});
      });
      y += 26;

      // helper: section header
      function sectionHeader(title, count) {
        checkPage(12);
        doc.setFillColor(...INK);
        doc.rect(margin, y, W - margin*2, 7, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8);
        doc.setTextColor(255,255,255);
        doc.text(title.toUpperCase(), margin+4, y+4.8);
        if (count != null) doc.text(String(count), W-margin-4, y+4.8, {align:'right'});
        y += 11;
      }

      // ── CHAPTERS STUDIED ──
      sectionHeader('Chapters Studied', reportData.chapters.length);
      if (reportData.chapters.length === 0) {
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text('No chapters studied in this period.', margin+2, y); y += 8;
      } else {
        // Group by subject
        const bySubj = {};
        reportData.chapters.forEach(c => {
          if (!bySubj[c.subject]) bySubj[c.subject] = { color: c.color, chapters: [] };
          bySubj[c.subject].chapters.push(c);
        });
        Object.entries(bySubj).forEach(([subj, sd]) => {
          checkPage(10);
          doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
          doc.setTextColor(...INK);
          doc.text(subj, margin+4, y); 
          doc.setFont('helvetica','normal'); doc.setFontSize(8);
          doc.setTextColor(...MUTED);
          doc.text(`(${sd.chapters.length})`, margin + doc.getTextWidth(subj) + 7, y);
          y += 5;
          doc.setDrawColor(...RULE); doc.line(margin, y, W-margin, y); y += 3;
          sd.chapters.forEach((ch,i) => {
            checkPage(7);
            const rowY = y;
            // left color accent
            doc.setFillColor(...hexToRgb(ch.color));
            doc.rect(margin, rowY-0.5, 2, 5.5, 'F');
            doc.setFont('helvetica','normal'); doc.setFontSize(9);
            doc.setTextColor(...INK);
            const chName = doc.splitTextToSize(ch.name, W - margin*2 - 40);
            doc.text(chName, margin+5, rowY+3.5);
            doc.setFontSize(8); doc.setTextColor(...MUTED);
            doc.text(fmtDateShort(ch.date), W-margin, rowY+3.5, {align:'right'});
            y += chName.length > 1 ? chName.length*5 + 2 : 7;
            if (i < sd.chapters.length-1) {
              doc.setDrawColor(238,238,238); doc.line(margin+4, y-1, W-margin, y-1);
            }
          });
          y += 4;
        });
      }

      // ── QUESTION LOGS ──
      sectionHeader('Questions Solved', reportData.totalQ);
      if (reportData.questions.length === 0) {
        checkPage(8);
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text('No questions logged in this period.', margin+2, y); y += 8;
      } else {
        // Summary by subject
        const qBySubj = {};
        const qByType = {};
        reportData.questions.forEach(q => {
          qBySubj[q.subject] = (qBySubj[q.subject]||0) + q.count;
          qByType[q.question_type] = (qByType[q.question_type]||0) + q.count;
        });
        checkPage(14);
        const subjColors = {maths:'#2563eb',physics:'#dc2626',organic:'#16a34a',inorganic:'#9333ea',physical:'#ea580c'};
        const subjLabels = {maths:'Maths',physics:'Physics',organic:'Organic',inorganic:'Inorganic',physical:'Physical'};
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...MUTED);
        doc.text('BY SUBJECT', margin+2, y); y += 5;
        const maxQ = Math.max(...Object.values(qBySubj));
        Object.entries(qBySubj).forEach(([subj, cnt]) => {
          checkPage(7);
          const rgb = hexToRgb(subjColors[subj]||'#000');
          doc.setFillColor(...rgb);
          doc.rect(margin+2, y, 3, 4, 'F');
          doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
          doc.text(subjLabels[subj]||subj, margin+8, y+3.2);
          // bar
          const barX = margin+46, barW = W-margin-46-margin-16;
          doc.setFillColor(232,232,232);
          doc.rect(barX, y+1, barW, 2.5, 'F');
          doc.setFillColor(...rgb);
          doc.rect(barX, y+1, barW*(cnt/maxQ), 2.5, 'F');
          doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
          doc.text(String(cnt), W-margin, y+3.2, {align:'right'});
          y += 7;
        });
        y += 3;
        // type summary
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...MUTED);
        checkPage(8);
        doc.text('BY TYPE', margin+2, y); y += 5;
        const typeLabels = {mains:'JEE Mains',advanced:'JEE Advanced',practice:'Practice'};
        Object.entries(qByType).forEach(([t,cnt]) => {
          checkPage(7);
          doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
          doc.text((typeLabels[t]||t), margin+8, y+3.2);
          doc.setFont('helvetica','bold');
          doc.text(String(cnt), W-margin, y+3.2, {align:'right'});
          y += 7;
        });
        y += 2;
      }

      // ── MOCK TESTS ──
      sectionHeader('Mock Tests', reportData.mocks.length);
      if (reportData.mocks.length === 0) {
        checkPage(8);
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text('No mock tests in this period.', margin+2, y); y += 8;
      } else {
        // Table header
        checkPage(10);
        doc.setFillColor(232,232,232);
        doc.rect(margin, y, W-margin*2, 6, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
        const cols = [margin+2, margin+60, margin+90, margin+118, margin+142, margin+160];
        ['Test Name','Date','Type','Score','Marks','%'].forEach((h,i)=>doc.text(h, cols[i], y+4));
        y += 8;
        reportData.mocks.forEach((m,i) => {
          checkPage(8);
          const pct = Math.round(m.total_marks/m.max_marks*100);
          const rowBg = i%2===0 ? [255,255,255] : [249,249,249];
          doc.setFillColor(...rowBg); doc.rect(margin, y, W-margin*2, 7, 'F');
          // pct color accent strip
          const stripColor = pct>=70 ? GREEN : pct>=40 ? [234,88,12] : ERR;
          doc.setFillColor(...stripColor); doc.rect(margin, y, 2, 7, 'F');
          doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(...INK);
          const nameTrunc = m.test_name.length > 22 ? m.test_name.slice(0,22)+'…' : m.test_name;
          doc.text(nameTrunc, cols[0]+2, y+4.5);
          doc.setFontSize(8); doc.setTextColor(...MUTED);
          doc.text(fmtDateShort(m.test_date), cols[1], y+4.5);
          doc.text(m.test_type, cols[2], y+4.5);
          doc.setTextColor(...INK);
          doc.text(`${m.total_marks}/${m.max_marks}`, cols[3], y+4.5);
          doc.text(`M:${m.marks_maths||0} P:${m.marks_physics||0}`, cols[4], y+4.5);
          doc.setFont('helvetica','bold');
          doc.setTextColor(...stripColor);
          doc.text(pct+'%', cols[5], y+4.5);
          y += 7;
        });
        y += 4;
        // avg
        checkPage(8);
        const avgPct = Math.round(reportData.mocks.reduce((a,m)=>a+m.total_marks/m.max_marks*100,0)/reportData.mocks.length);
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
        doc.text(`Average: ${avgPct}%`, W-margin, y, {align:'right'});
        y += 8;
      }

      // ── CONSISTENCY ──
      sectionHeader('Consistency', null);
      checkPage(14);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
      const totalTracked = reportData.consistency.length;
      const studPct = totalTracked > 0 ? Math.round(reportData.studiedDays/totalTracked*100) : 0;
      doc.text(`Studied: ${reportData.studiedDays} days   Missed: ${reportData.missedDays} days   Tracked: ${totalTracked} days   Consistency: ${studPct}%`, margin+2, y); y += 8;
      if (reportData.consistency.length > 0) {
        // simple colour strip calendar
        const cellSize = 5, gap = 1.5;
        const cols7 = Math.floor((W - margin*2) / (cellSize+gap));
        let cx = margin, cy = y;
        reportData.consistency.forEach((d,i) => {
          if (i > 0 && i % cols7 === 0) { cx = margin; cy += cellSize + gap; }
          const color = d.status==='studied' ? INK : ERR;
          doc.setFillColor(...color);
          doc.rect(cx, cy, cellSize, cellSize, 'F');
          cx += cellSize + gap;
        });
        y = cy + cellSize + 8;
      }

      // ── FOOTER ──
      const pages = doc.getNumberOfPages();
      for (let p=1; p<=pages; p++) {
        doc.setPage(p);
        doc.setFillColor(245,245,245);
        doc.rect(0, H-10, W, 10, 'F');
        doc.setDrawColor(...RULE); doc.line(0, H-10, W, H-10);
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...MUTED);
        doc.text('Generated by STUDEX', margin, H-4);
        doc.text(`Page ${p} of ${pages}`, W-margin, H-4, {align:'right'});
        doc.text(new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}), W/2, H-4, {align:'center'});
      }

      const fname = `STUDEX_Report_${reportData.startDate}_to_${reportData.endDate}.pdf`;
      doc.save(fname);
      showToast('PDF downloaded!', 'picture_as_pdf');
    } catch(e) {
      console.error(e);
      showToast('PDF generation failed', 'error');
    }
    setGenerating(false);
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }

  return (
    <div className="rg-layout">
      {/* Left: controls */}
      <div className="rg-left">
        <div className="rg-form">
          <div className="rg-form-title">Progress Report</div>
          <div className="rg-form-sub">Select a date range to generate a PDF report of everything you accomplished — chapters studied, revisions, questions solved, and mock tests.</div>
          <div className="rg-field">
            <label>From</label>
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
          </div>
          <div className="rg-field">
            <label>To</label>
            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}/>
          </div>
          <button className="rg-generate-btn" disabled={loading||!startDate||!endDate||startDate>endDate} onClick={fetchReport}>
            {loading ? <span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/> : <span className="icon" style={{fontSize:18}}>search</span>}
            Load Report
          </button>

          {reportData && (
            <>
              <div className="rg-divider"/>
              <div className="rg-preview-title">Summary</div>
              <div className="rg-stat-grid">
                {[
                  {num:reportData.chapters.length, lbl:'Chapters Studied'},
                  {num:reportData.revsInRange.length, lbl:'Revisions Done'},
                  {num:reportData.totalQ, lbl:'Questions Solved'},
                  {num:reportData.mocks.length, lbl:'Mock Tests'},
                  {num:reportData.studiedDays, lbl:'Days Studied'},
                  {num:reportData.missedDays, lbl:'Days Missed'},
                ].map((s,i)=>(
                  <div key={i} className="rg-stat-box">
                    <div className="rg-stat-box-num">{s.num}</div>
                    <div className="rg-stat-box-lbl">{s.lbl}</div>
                  </div>
                ))}
              </div>
              <div className="rg-divider"/>
              <button className="rg-generate-btn" disabled={generating} onClick={generatePDF}>
                {generating ? <span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/> : <span className="icon" style={{fontSize:18}}>picture_as_pdf</span>}
                Download PDF
              </button>
            </>
          )}
        </div>
      </div>

      {/* Right: preview */}
      <div className="rg-right">
        {!reportData ? (
          <div className="rg-no-data">
            <span className="icon">summarize</span>
            <h3>No report loaded</h3>
            <p>Set a date range and click Load Report to preview your progress before downloading.</p>
          </div>
        ) : (
          <>
            {/* Chapters */}
            <div className="rg-section">
              <div className="rg-section-head">
                Chapters Studied
                <span className="rg-section-head-count">{reportData.chapters.length}</span>
              </div>
              {reportData.chapters.length === 0
                ? <div className="rg-empty-section">No chapters studied in this period.</div>
                : reportData.chapters.map((ch,i)=>(
                  <div key={i} className="rg-chapter-row">
                    <div className="rg-ch-dot" style={{background:ch.color}}/>
                    <span className="rg-ch-name">{ch.name}</span>
                    <span style={{fontSize:9,color:ch.color,fontWeight:600,marginRight:6}}>{ch.subject}</span>
                    <span className="rg-ch-date">{fmtDate(ch.date)}</span>
                  </div>
                ))
              }
            </div>

            {/* Revisions */}
            <div className="rg-section">
              <div className="rg-section-head">
                Revisions Completed
                <span className="rg-section-head-count">{reportData.revsInRange.length}</span>
              </div>
              {reportData.revsInRange.length === 0
                ? <div className="rg-empty-section">No revisions completed for chapters studied in this period.</div>
                : reportData.revsInRange.map((r,i)=>(
                  <div key={i} className="rg-chapter-row">
                    <span className="rg-ch-name">{r.chapterName}</span>
                    <span style={{fontSize:9,color:'var(--muted)',fontWeight:600,padding:'2px 6px',border:'1px solid var(--s-dim)'}}>R{r.day===7?1:r.day===15?2:3} · Day {r.day}</span>
                  </div>
                ))
              }
            </div>

            {/* Questions */}
            <div className="rg-section">
              <div className="rg-section-head">
                Questions Solved
                <span className="rg-section-head-count">{reportData.totalQ}</span>
              </div>
              {reportData.questions.length === 0
                ? <div className="rg-empty-section">No questions logged in this period.</div>
                : reportData.questions.map((q,i)=>(
                  <div key={i} className="rg-q-row">
                    <span className="rg-q-count">{q.count}</span>
                    <div className="rg-q-info">
                      <span style={{fontWeight:600}}>{q.subject}</span>
                      <span style={{color:'var(--muted)',marginLeft:6}}>{q.question_type}</span>
                    </div>
                    <span style={{fontSize:10,color:'var(--muted)'}}>{new Date(q.logged_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>
                  </div>
                ))
              }
            </div>

            {/* Mocks */}
            <div className="rg-section">
              <div className="rg-section-head">
                Mock Tests
                <span className="rg-section-head-count">{reportData.mocks.length}</span>
              </div>
              {reportData.mocks.length === 0
                ? <div className="rg-empty-section">No mock tests in this period.</div>
                : reportData.mocks.map((m,i)=>{
                  const pct = Math.round(m.total_marks/m.max_marks*100);
                  return (
                    <div key={i} className="rg-mock-row">
                      <div className="rg-mock-name">{m.test_name}</div>
                      <div className="rg-mock-meta">
                        {fmtDate(m.test_date)} · {m.test_type} ·&nbsp;
                        <span style={{fontWeight:700,color:pct>=70?'#16a34a':pct>=40?'#ea580c':'var(--err)'}}>{m.total_marks}/{m.max_marks} ({pct}%)</span>
                      </div>
                    </div>
                  );
                })
              }
            </div>

            {/* Consistency */}
            <div className="rg-section">
              <div className="rg-section-head">Consistency</div>
              <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
                {[
                  {num:reportData.studiedDays, lbl:'Days Studied', color:'var(--ink)'},
                  {num:reportData.missedDays, lbl:'Days Missed', color:'var(--err)'},
                  {num:reportData.consistency.length, lbl:'Days Tracked'},
                  {num: reportData.consistency.length ? Math.round(reportData.studiedDays/reportData.consistency.length*100)+'%' : '—', lbl:'Consistency Rate'},
                ].map((s,i)=>(
                  <div key={i} style={{minWidth:80}}>
                    <div style={{fontFamily:"'Libre Caslon Text',serif",fontSize:28,fontWeight:700,color:s.color||'var(--ink)',lineHeight:1}}>{s.num}</div>
                    <div style={{fontSize:9,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginTop:2}}>{s.lbl}</div>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// Main App
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('syllabus');
  const [checkedMap, setCheckedMap] = useState({});
  const [doneSet, setDoneSet] = useState(new Set());
  const [diffMap, setDiffMap] = useState({});
  const [notesMap, setNotesMap] = useState({});
  const [toast, setToast] = useState(null);
  const [showFloatCal, setShowFloatCal] = useState(false);
  const [jumpDate, setJumpDate] = useState(null);
  const toastTimer = useRef(null);

  const floatCalRef = useRef(null);

  useEffect(()=>{
    if (!showFloatCal) return;
    function handleClickOutside(e) {
      if (floatCalRef.current && !floatCalRef.current.contains(e.target)) {
        setShowFloatCal(false);
      }
    }
    // small timeout so the button click that opened it doesn't immediately close it
    const id = setTimeout(()=>document.addEventListener('mousedown', handleClickOutside), 10);
    return ()=>{ clearTimeout(id); document.removeEventListener('mousedown', handleClickOutside); };
  }, [showFloatCal]);

  function showToast(msg, icon) {
    setToast({msg, icon});
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(null), 2800);
  }

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      if(data.session?.user) { setUser(data.session.user); loadData(data.session.user.id); }
      else setLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user) { setUser(session.user); loadData(session.user.id); }
      else { setUser(null); setLoading(false); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function loadData(uid) {
    setLoading(true);
    const [chk, rev, diff, notes] = await Promise.all([
      sb.from('studex_checked').select('chapter_id,checked_at').eq('user_id',uid),
      sb.from('studex_rev_done').select('rev_id').eq('user_id',uid),
      sb.from('studex_difficulty').select('chapter_id,difficulty').eq('user_id',uid),
      sb.from('studex_notes').select('chapter_id,note').eq('user_id',uid),
    ]);
    const cm = {}; (chk.data||[]).forEach(r=>{ cm[r.chapter_id]=r.checked_at; });
    const ds = new Set(); (rev.data||[]).forEach(r=>ds.add(r.rev_id));
    const dm = {}; (diff.data||[]).forEach(r=>{ dm[r.chapter_id]=r.difficulty; });
    const nm = {}; (notes.data||[]).forEach(r=>{ nm[r.chapter_id]=r.note; });
    setCheckedMap(cm); setDoneSet(ds); setDiffMap(dm); setNotesMap(nm);
    setLoading(false);
  }

  async function handleCheck(chId) {
    const uid = user.id;
    const d = today();
    await sb.from('studex_checked').upsert({user_id:uid,chapter_id:chId,checked_at:d},{onConflict:'user_id,chapter_id'});
    setCheckedMap(p=>({...p,[chId]:d}));
    showToast('Chapter marked as done','check_circle');
  }

  async function handleUncheck(chId) {
    const uid = user.id;
    await sb.from('studex_checked').delete().eq('user_id',uid).eq('chapter_id',chId);
    const revIds = REV_DAYS.map(d=>`${chId}_r${d}`);
    await sb.from('studex_rev_done').delete().eq('user_id',uid).in('rev_id',revIds);
    setCheckedMap(p=>{ const n={...p}; delete n[chId]; return n; });
    setDoneSet(p=>{ const n=new Set(p); revIds.forEach(id=>n.delete(id)); return n; });
    showToast('Chapter unchecked','remove_circle');
  }

  async function handleMarkDone(revId) {
    const uid = user.id;
    await sb.from('studex_rev_done').upsert({user_id:uid,rev_id:revId},{onConflict:'user_id,rev_id'});
    setDoneSet(p=>new Set([...p,revId]));
    showToast('Revision marked done','done_all');
  }

  async function handleUndo(revId) {
    const uid = user.id;
    await sb.from('studex_rev_done').delete().eq('user_id',uid).eq('rev_id',revId);
    setDoneSet(p=>{ const n=new Set(p); n.delete(revId); return n; });
    showToast('Revision undone','undo');
  }

  async function handleSaveNote(chId, note) {
    const uid = user.id;
    if (!note.trim()) {
      await sb.from('studex_notes').delete().eq('user_id',uid).eq('chapter_id',chId);
      setNotesMap(p=>{ const n={...p}; delete n[chId]; return n; });
    } else {
      await sb.from('studex_notes').upsert({user_id:uid,chapter_id:chId,note},{onConflict:'user_id,chapter_id'});
      setNotesMap(p=>({...p,[chId]:note}));
    }
    showToast('Note saved','save');
  }

  async function handleSetDifficulty(chId, difficulty) {
    const uid = user.id;
    await sb.from('studex_difficulty').upsert({user_id:uid,chapter_id:chId,difficulty},{onConflict:'user_id,chapter_id'});
    setDiffMap(p=>({...p,[chId]:difficulty}));
    showToast(`Chapter rated ${difficulty}`,'star');
  }

  // Listen for difficulty modal events
  useEffect(()=>{
    const handler = e=>handleSetDifficulty(e.detail.chapterId,e.detail.difficulty);
    document.addEventListener('setDifficulty',handler);
    return ()=>document.removeEventListener('setDifficulty',handler);
  },[user]);

  const revisions = useMemo(()=>buildRevisions(checkedMap,doneSet),[checkedMap,doneSet]);
  const syllBadge = SUBJECTS.reduce((a,s)=>a+s.chapters.length,0) - Object.keys(checkedMap).length;
  const t = today();
  const revBadge = revisions.filter(r=>!r.done && r.dueDate <= t).length;

  const initials = user?.email ? user.email.slice(0,2).toUpperCase() : '??';

  if (loading) return (
    <div className="loading-wrap">
      <div style={{width:48,height:48,background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:4}}>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="4" y="4" width="8" height="8" fill="white"/>
          <rect x="16" y="4" width="8" height="8" fill="white" opacity="0.5"/>
          <rect x="4" y="16" width="8" height="8" fill="white" opacity="0.5"/>
          <rect x="16" y="16" width="8" height="8" fill="white"/>
        </svg>
      </div>
      <div className="spinner"/>
    </div>
  );

  if (!user) return <AuthScreen onAuth={u=>{ setUser(u); loadData(u.id); }}/>;

  return (
    <div className="main">
      <nav className="nav">
        <div className="nav-top">
          <div className="nav-logo">
            <div className="logo-box">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="2" width="6" height="6" fill="white"/>
                <rect x="12" y="2" width="6" height="6" fill="white" opacity="0.5"/>
                <rect x="2" y="12" width="6" height="6" fill="white" opacity="0.5"/>
                <rect x="12" y="12" width="6" height="6" fill="white"/>
              </svg>
            </div>
            <div className="logo-text">
              <h1>STUDEX</h1>
              <p>JEE Preparation</p>
            </div>
          </div>
          <div className="nav-actions" style={{position:'relative'}} ref={floatCalRef}>
            <button className="nav-btn" onClick={()=>setShowFloatCal(p=>!p)}>
              <span className="icon">calendar_month</span>
            </button>
            <button className="nav-btn" title={user.email}>
              <div className="avatar-box">{initials}</div>
            </button>
            <button className="nav-btn" onClick={async()=>{ await sb.auth.signOut(); setUser(null); }} title="Sign out">
              <span className="icon">logout</span>
            </button>
            {showFloatCal && (
              <div className="float-cal">
                <div className="float-cal-body">
                  <MiniCalendar revisions={revisions} selectedDate={t} onSelectDate={d=>{
                    setJumpDate(d); setTab('revision'); setShowFloatCal(false);
                  }}/>
                </div>
                <div className="float-cal-footer">
                  <span className="float-cal-today">Today: {fmtDate(t)}</span>
                  <button className="float-cal-link" onClick={()=>{ setTab('revision'); setShowFloatCal(false); }}>Open Revision →</button>
                </div>
              </div>
            )}
          </div>
        </div>
        <div className="nav-bottom">
          <button className={`tab-btn${tab==='syllabus'?' active':''}`} onClick={()=>setTab('syllabus')}>
            <span className="icon">menu_book</span>Syllabus
            {syllBadge > 0 && <span className="tab-badge">{syllBadge}</span>}
          </button>
          <button className={`tab-btn${tab==='revision'?' active':''}`} onClick={()=>setTab('revision')}>
            <span className="icon">event_repeat</span>Revision
            {revBadge > 0 && <span className="tab-badge urgent">{revBadge}</span>}
          </button>
          <button className={`tab-btn${tab==='consistency'?' active':''}`} onClick={()=>setTab('consistency')}>
            <span className="icon">local_fire_department</span>Consistency
          </button>
          <button className={`tab-btn${tab==='questions'?' active':''}`} onClick={()=>setTab('questions')}>
            <span className="icon">calculate</span>Questions
          </button>
          <button className={`tab-btn${tab==='mocks'?' active':''}`} onClick={()=>setTab('mocks')}>
            <span className="icon">bar_chart</span>Mock Analysis
          </button>
          <button className={`tab-btn${tab==='report'?' active':''}`} onClick={()=>setTab('report')}>
            <span className="icon">summarize</span>Report
          </button>
        </div>
      </nav>

      <div className="page">
        {tab === 'syllabus'
          ? <Syllabus checkedMap={checkedMap} doneSet={doneSet} diffMap={diffMap} notesMap={notesMap}
              onCheck={handleCheck} onUncheck={handleUncheck} onSaveNote={handleSaveNote} revisions={revisions}/>
          : tab === 'revision'
          ? <Revision revisions={revisions} onMarkDone={handleMarkDone} onUndo={handleUndo}
              diffMap={diffMap} jumpDate={jumpDate} onJumpDate={d=>setJumpDate(d)}/>
          : tab === 'consistency'
          ? <ConsistencyTracker user={user} showToast={showToast}/>
          : tab === 'questions'
          ? <QuestionCounter user={user} showToast={showToast}/>
          : tab === 'mocks'
          ? <MockAnalysis user={user} showToast={showToast}/>
          : <ReportGenerator user={user} showToast={showToast}/>}
      </div>

      {toast && <Toast msg={toast.msg} icon={toast.icon}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
