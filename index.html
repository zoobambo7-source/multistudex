        {/* CTA — like the "Book Appointment →" button */}
        <button className="prof-right-cta" onClick={()=>{ setDraft({...profile}); setShowEdit(true); }}>
          <span className="icon">edit</span>Edit Profile
        </button>

      </div>

      {/* ══════════════ EDIT MODAL ══════════════ */}
      {showEdit && (
        <div className="prof-modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowEdit(false)}>
          <div className="prof-modal">
            <div className="prof-modal-head">
              <span className="prof-modal-title">Edit Profile</span>
              <button className="prof-modal-close" onClick={()=>setShowEdit(false)}><span className="icon">close</span></button>
            </div>
            <div className="prof-modal-body">

              {/* Avatar preview row */}
              <div style={{display:'flex',alignItems:'center',gap:14,padding:'0 0 16px',borderBottom:'1px solid var(--s-dim)',marginBottom:18}}>
                <div style={{width:52,height:52,borderRadius:'50%',overflow:'hidden',background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Libre Caslon Text',serif",fontSize:16,fontWeight:700,color:'var(--on-ink)',flexShrink:0}}>
                  {profile.avatar_url ? <img src={profile.avatar_url} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : initials}
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--ink)',marginBottom:2}}>Profile Photo</div>
                  <div style={{fontSize:10,color:'var(--muted)'}}>Click your avatar on the profile page to upload a new photo.</div>

              <div className="prof-form-section">
                <div className="prof-form-section-label">Identity</div>

// ===================== LEADERBOARD =====================
const TOTAL_JEE_CHAPTERS = 140;
const SEG_COLORS = [
  {key:'syllabus',  label:'Syllabus',   color:'#2563eb', max:20},
  {key:'consist',   label:'Consistency',color:'#ea580c', max:20},
  {key:'mocks',     label:'Mocks',      color:'#16a34a', max:25},
  {key:'revision',  label:'Revision',   color:'#9333ea', max:15},
  {key:'questions', label:'Questions',  color:'#0891b2', max:10},
  {key:'hours',     label:'Hours',      color:'#d97706', max:10},
];
const MEDAL = ['🥇','🥈','🥉'];

function calcScore(data) {
  const { checked, conDays, mockTests, revDone, questionLogs, hoursLog } = data;
  const todayStr = today();
  const todayDate = new Date(todayStr);
  const checkedCount = typeof checked === 'number' ? checked : (checked || 0);

  // ── helpers ──────────────────────────────────────────────
  const daysBetween = (isoA, isoB) =>
    Math.round((new Date(isoA) - new Date(isoB)) / 86400000);

  // ── current streak (walk back from today) ────────────────
  const studiedSet = new Set(
    conDays.filter(d=>d.status==='studied').map(d=>d.day_date||d.date)
  );
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(todayDate); d.setDate(d.getDate() - i);
    if (studiedSet.has(d.toISOString().slice(0,10))) streak++;
    else break;
  }

  // ── total active days (for new-user floor) ────────────────
  const activeDays = conDays.length;
  const newUserFloor = Math.min(activeDays / 7, 1); // ramps up over first week

  // 1. SYLLABUS — 20 pts
  const syllPts = Math.min(20, (checkedCount / TOTAL_JEE_CHAPTERS) * 20);

  // 2. CONSISTENCY — 20 pts  (rolling 30-day window, exponential decay)
  //    Each studied day contributes 0.95^daysAgo, summed then normalised
  //    against the theoretical max (30 perfect days of decay).
  const MAX_DECAY_SUM = Array.from({length:30},(_,i)=>Math.pow(0.95,i)).reduce((a,b)=>a+b,0);
  let decaySum = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date(todayDate); d.setDate(d.getDate() - i);
    if (studiedSet.has(d.toISOString().slice(0,10))) {
      decaySum += Math.pow(0.95, i);
    }
  }
  const conPts = (decaySum / MAX_DECAY_SUM) * 20;

  // 3. MOCKS — 25 pts  (recency-weighted average: last 3 = 60%, rest = 40%)
  let mockPts = 0;
  if (mockTests.length > 0) {
    const sorted = [...mockTests].sort((a,b) => a.test_date > b.test_date ? 1 : -1);
    const toRatio = m => m.total_marks / m.max_marks;
    if (sorted.length < 4) {
      // fewer than 4: simple average
      mockPts = (sorted.reduce((a,m)=>a+toRatio(m),0) / sorted.length) * 25;
    } else {
      const last3   = sorted.slice(-3);
      const earlier = sorted.slice(0,-3);
      const avgLast = last3.reduce((a,m)=>a+toRatio(m),0) / last3.length;
      const avgPrev = earlier.reduce((a,m)=>a+toRatio(m),0) / earlier.length;
      mockPts = (avgLast * 0.6 + avgPrev * 0.4) * 25;
    }
  }

  // 4. REVISION HEALTH — 15 pts
  //    Floor denominator at 10 to stop 1-chapter gaming.
  const maxExpectedRevs = Math.max(checkedCount * 3, 10);
  const revPts = Math.min((revDone.length / maxExpectedRevs) * 15, 15);

  // 5. QUESTIONS — 10 pts  (time-decayed: 7d=100%, 30d=70%, older=40%)
  let weightedQ = 0;
  for (const q of questionLogs) {
    const ts = q.logged_at || q.created_at || null;
    let weight = 0.4;
    if (ts) {
      const age = daysBetween(todayStr, ts.slice(0,10));
      if (age <= 7)  weight = 1.0;
      else if (age <= 30) weight = 0.7;
    }
    weightedQ += (q.count || 0) * weight;
  }
  const qPts = (Math.min(weightedQ, 3000) / 3000) * 10;

  // 6. STUDY HOURS — 10 pts  (total hours in last 30 days, cap 200)
  let recentHours = 0;
  for (const h of hoursLog) {
    const ts = h.log_date || h.logged_at || h.created_at || null;
    if (!ts) { recentHours += h.hours || 0; continue; }
    const age = daysBetween(todayStr, ts.slice(0,10));
    if (age <= 30) recentHours += h.hours || 0;
  }
  const hoursPts = (Math.min(recentHours, 200) / 200) * 10;

  const base = syllPts + conPts + mockPts + revPts + qPts + hoursPts;

  // ── BONUSES ──────────────────────────────────────────────

  // Streak: logarithmic scale instead of cliff — log2(streak+1) × 1.44, cap 4pts
  const streakBonus = parseFloat(Math.min(Math.log2(streak + 1) * 1.44, 4).toFixed(1));

  // Revision: ≥ 90% completion
  let revBonus = 0;
  const expectedRevs = checkedCount * 3;
  if (expectedRevs > 0 && revDone.length / expectedRevs >= 0.9) revBonus = 3;

  // Mock trend: last 3 > prev 3 (requires ≥ 6 mocks)
  let trendBonus = 0;
  if (mockTests.length >= 6) {
    const sm = [...mockTests].sort((a,b) => a.test_date > b.test_date ? 1 : -1);
    const toR = m => m.total_marks / m.max_marks;
    const avgL = sm.slice(-3).reduce((a,m)=>a+toR(m),0) / 3;
    const avgP = sm.slice(-6,-3).reduce((a,m)=>a+toR(m),0) / 3;
    if (avgL > avgP) trendBonus = 2;
  }

  // Apply new-user floor (ramps to full score over first 7 active days)
  const rawTotal = base + streakBonus + revBonus + trendBonus;
  const total = parseFloat((rawTotal * newUserFloor).toFixed(1));

  return {
    total,
    base: parseFloat((base * newUserFloor).toFixed(1)),
    segs: {
      syllabus: parseFloat((syllPts  * newUserFloor).toFixed(1)),
      consist:  parseFloat((conPts   * newUserFloor).toFixed(1)),
      mocks:    parseFloat((mockPts  * newUserFloor).toFixed(1)),
      revision: parseFloat((revPts   * newUserFloor).toFixed(1)),
      questions:parseFloat((qPts     * newUserFloor).toFixed(1)),
      hours:    parseFloat((hoursPts * newUserFloor).toFixed(1)),
    },
    bonuses: { streak: streakBonus, rev: revBonus, trend: trendBonus },
    streak,
    activeDays30: conDays.filter(d => {
      if (d.status !== 'studied') return false;
      const date = d.day_date || d.date;
      const age = Math.round((todayDate - new Date(date)) / 86400000);
      return age <= 30;
    }).length,
  };
}

  const currentStreak = row.streak || 0;

        {emoji

        }
        <span style={{fontSize:12,color:'var(--muted)',fontWeight:500}}>{label}</span>
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:3}}>
        <span style={{fontSize:18,fontWeight:700,fontFamily:"'Libre Caslon Text',serif",

          {value}

        {unit && <span style={{fontSize:10,color:'var(--muted)',fontWeight:500}}>{unit}</span>}
      </div>

          {/* Avatar */}
          <div style={{

            background:'rgba(255,255,255,0.15)',
            border:'3px solid rgba(255,255,255,0.2)',marginTop:8,

                  color:'#ea580c',lineHeight:1}}>{studyDays30}</span>
                <span style={{fontSize:10,color:'var(--muted)'}}>days</span>
              </div>
            </div>
            <div style={{padding:'10px 12px',background:'var(--s-low)',borderRadius:10,
              border:'1px solid var(--s-dim)',display:'flex',flexDirection:'column',gap:3}}>

                    <span style={{fontSize:20,fontWeight:700,fontFamily:"'Libre Caslon Text',serif",

          {/* Bonus badges */}
          {(streakBonus>0 || revBonus>0 || trendBonus>0) && (
            <div style={{display:'flex',gap:5,flexWrap:'wrap',paddingTop:2}}>

function Leaderboard({ user, showToast, switchTab, onScoreReady }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [spinning, setSpinning] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [myScore, setMyScore] = useState(null);
  const [selectedRow, setSelectedRow] = useState(null);

  useEffect(() => { fetchAll(); }, []);

  async function fetchAll() {
    setSpinning(true);
    setLoading(rows.length === 0);
    try {
      // 1. Get all profiles
      const { data: profiles, error: profErr } = await sb.from('user_profiles')
        .select('user_id,display_name,avatar_url');
      if (profErr) throw profErr;
      if (!profiles || profiles.length === 0) { setRows([]); setLoading(false); setSpinning(false); return; }

      const uids = profiles.map(p => p.user_id);

      // 2. Fetch all score tables in parallel (no user_id filter — we have leaderboard policies)
      const [chkRes, conRes, mockRes, revRes, qRes, hrRes] = await Promise.all([
        sb.from('studex_checked').select('user_id').in('user_id', uids),
        sb.from('consistency_days').select('user_id,day_date,status').in('user_id', uids),
        sb.from('mock_tests').select('user_id,total_marks,max_marks,test_date').in('user_id', uids),
        sb.from('studex_rev_done').select('user_id,rev_id').in('user_id', uids),
        sb.from('question_logs').select('user_id,count').in('user_id', uids),
        sb.from('study_hours_log').select('user_id,hours').in('user_id', uids),
      ]);

      // 3. Group by user
      const byUser = uid => ({
        checked:      (chkRes.data||[]).filter(r=>r.user_id===uid).length,
        conDays:      (conRes.data||[]).filter(r=>r.user_id===uid),
        mockTests:    (mockRes.data||[]).filter(r=>r.user_id===uid),
        revDone:      (revRes.data||[]).filter(r=>r.user_id===uid), // array of {rev_id}
        questionLogs: (qRes.data||[]).filter(r=>r.user_id===uid),
        hoursLog:     (hrRes.data||[]).filter(r=>r.user_id===uid),
      });

      // 4. Score each user
      const scored = profiles.map(p => ({
        user_id:      p.user_id,
        display_name: p.display_name || ('user_' + p.user_id.slice(0,6)),
        avatar_url:   p.avatar_url || '',
        isMe:         p.user_id === user.id,
        ...calcScore(byUser(p.user_id)),
      }));

      // 5. Sort descending, assign ranks (ties = same rank)
      scored.sort((a,b) => b.total - a.total);
      let rank = 1;
      for (let i = 0; i < scored.length; i++) {
        if (i > 0 && scored[i].total < scored[i-1].total) rank = i + 1;
        scored[i].rank = rank;
      }

      setRows(scored);
      const me = scored.find(r => r.isMe);
      if (me) { setMyScore(me.total); onScoreReady?.(me.total); }
      setLastUpdated(new Date());
    } catch(e) {
      console.error('Leaderboard fetch error:', e);
      showToast('Failed to load leaderboard', 'error');
    }
    setLoading(false);
    setSpinning(false);
  }

  const top3 = rows.filter(r => r.rank <= 3);
  const rest = rows.filter(r => r.rank > 3);
  const topScore = rows[0]?.base || 100;

  // Reorder top 3 for podium display: 2nd, 1st, 3rd
  const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);

  function BreakdownBar({ segs }) {
    return (
      <div className="lb-row-breakdown">
        {SEG_COLORS.map(s => (
          <div key={s.key} className="lb-breakdown-seg"
            style={{background:s.color, width:`${(segs[s.key]/s.max)*100}%`, minWidth: segs[s.key]>0?2:0}}
            title={`${s.label}: ${segs[s.key]}/${s.max}`}/>
        ))}
      </div>
    );
  }

  if (loading) return (
    <div className="lb-layout">
      <div className="lb-topbar">
        <div className="lb-title-block">
          <div className="lb-title">Leaderboard</div>
          <div className="lb-sub">Calculating scores…</div>
        </div>
      </div>
      <div className="lb-list">
        {[1,2,3,4,5].map(i=><div key={i} className="lb-skeleton-row"/>)}
      </div>
    </div>
  );

  const timeStr = lastUpdated ? lastUpdated.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';

  return (
    <div className="lb-layout">
      {/* Top bar */}
      <div className="lb-topbar">
        <div className="lb-title-block">
          <div className="lb-title">Leaderboard</div>
          <div className="lb-sub">{rows.length} student{rows.length!==1?'s':''} · {rows.length===0?'Be the first!':'Live scores'}</div>
        </div>
        <div className="lb-topbar-right">
          {lastUpdated && <span className="lb-last-updated">Updated {timeStr}</span>}
          <button className={`lb-refresh-btn${spinning?' spinning':''}`} onClick={fetchAll} disabled={spinning}>
            <span className="icon">refresh</span>
            {spinning ? 'Refreshing…' : 'Refresh'}
          </button>
        </div>
      </div>

      {/* Score legend */}
      <div className="lb-legend">
        <span className="lb-legend-label">Score breakdown:</span>
        {SEG_COLORS.map(s=>(
          <div key={s.key} className="lb-legend-item">
            <div className="lb-legend-dot" style={{background:s.color}}/>
            {s.label} <strong style={{marginLeft:2}}>{s.max}pts</strong>
          </div>
        ))}
      </div>

      {/* Content */}
      <div className="lb-list">
        {rows.length === 0 ? (
          <div className="lb-empty">
            <span className="icon">leaderboard</span>
            <h3>No scores yet</h3>
            <p>Complete your profile and start studying — your score will appear here once you log activity.</p>
          </div>
        ) : (<>

          {/* Podium (top 3) */}
          {top3.length > 0 && (
            <div className="lb-podium">
              {/* Reorder: 2nd | 1st | 3rd */}
              {[top3[1], top3[0], top3[2]].map((r,pi) => {
                if (!r) return <div key={pi}/>;
                const actualRank = r.rank;
                return (
                  <div key={r.user_id} className={`lb-podium-card rank-${actualRank}${r.isMe?' is-me':''}`}
                    onClick={()=>setSelectedRow(r)}>
                    {r.isMe && r.rank===1 && <div className="lb-rank-badge">★</div>}
                    <div className="lb-podium-medal">{MEDAL[actualRank-1]||''}</div>
                    <LbAvatar url={r.avatar_url} name={r.display_name} size={52}/>
                    <div className="lb-podium-name" title={r.display_name}>{r.display_name}</div>
                    <div className="lb-podium-score">{r.total}</div>
                    <div className="lb-podium-score-lbl">points</div>
                    <div className="lb-podium-bar">
                      <div className="lb-podium-bar-fill" style={{width:`${Math.min(r.base/topScore*100,100)}%`}}/>
                    </div>
                    <div className="lb-podium-bonus"><BonusBadges bonuses={r.bonuses}/></div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Rest of the list (rank 4+) */}
          {rest.length > 0 && (
            <>
              <div className="lb-rest-head">Rankings</div>
              {rest.map(r => (
                <div key={r.user_id} className={`lb-row${r.isMe?' is-me':''}`}
                  onClick={()=>setSelectedRow(r)}>
                  <div className="lb-row-rank">#{r.rank}</div>
                  <div className="lb-row-avatar">
                    <LbAvatar url={r.avatar_url} name={r.display_name} size={36}/>
                  </div>
                  <div className="lb-row-info">
                    <div className="lb-row-name">
                      {r.display_name}
                      {r.isMe && <span className="lb-me-badge">You</span>}
                    </div>
                    <BreakdownBar segs={r.segs}/>
                  </div>
                  <div className="lb-row-right">
                    <div className="lb-row-score">{r.total}</div>
                    <div className="lb-row-bonus-row"><BonusBadges bonuses={r.bonuses}/></div>
                  </div>
                </div>
              ))}
            </>
          )}

          {/* If user exists but isn't in top shown (shouldn't happen but just in case) */}
          {rows.length > 0 && !rows.find(r=>r.isMe) && (
            <div style={{padding:'12px 0',textAlign:'center',fontSize:11,color:'var(--muted)'}}>
              Complete your profile to appear on the leaderboard.
            </div>
          )}
        </>)}
      </div>

      {selectedRow && (
        <ProfileCard row={selectedRow} onClose={()=>setSelectedRow(null)}/>
      )}
    </div>
  );
}


// ===================== REPORT GENERATOR =====================
function ReportGenerator({ user, showToast }) {
  const [startDate, setStartDate] = useState(() => {
    const d = new Date(); d.setMonth(d.getMonth() - 1);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  });
  const [endDate, setEndDate] = useState(() => today());
  const [reportData, setReportData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [generating, setGenerating] = useState(false);

  async function fetchReport() {
    if (!startDate || !endDate || startDate > endDate) {
      showToast('Please set a valid date range', 'error'); return;
    }
    setLoading(true);
    setReportData(null);
    try {
      const [chkRes, revRes, qRes, mockRes, conRes] = await Promise.all([
        sb.from('studex_checked').select('chapter_id,checked_at').eq('user_id', user.id)
          .gte('checked_at', startDate).lte('checked_at', endDate).order('checked_at'),
        sb.from('studex_rev_done').select('rev_id').eq('user_id', user.id),
        sb.from('question_logs').select('*').eq('user_id', user.id)
          .gte('logged_at', startDate + 'T00:00:00').lte('logged_at', endDate + 'T23:59:59').order('logged_at',{ascending:false}),
        sb.from('mock_tests').select('*').eq('user_id', user.id)
          .gte('test_date', startDate).lte('test_date', endDate).order('test_date'),
        sb.from('consistency_days').select('day_date,status').eq('user_id', user.id)
          .gte('day_date', startDate).lte('day_date', endDate).order('day_date'),
      ]);

      const doneRevIds = new Set((revRes.data||[]).map(r=>r.rev_id));
      const chapters = (chkRes.data||[]).map(r => {
        const subj = CH_TO_SUBJ[r.chapter_id];
        const ch = subj?.chapters.find(c=>c.id===r.chapter_id);
        return { id: r.chapter_id, name: ch?.name||r.chapter_id, subject: subj?.label||'', color: subj?.color||'#000', date: r.checked_at };
      });

      // Count revisions done in range — we approximate by checking if the rev_id exists
      const revsInRange = chapters.flatMap(c =>
        REV_DAYS.map(d => ({ revId: `${c.id}_r${d}`, day: d, chapterName: c.name, subject: c.subject }))
      ).filter(r => doneRevIds.has(r.revId));

      const questions = qRes.data||[];
      const mocks = mockRes.data||[];
      const consistency = conRes.data||[];

      const studiedDays = consistency.filter(d=>d.status==='studied').length;
      const missedDays = consistency.filter(d=>d.status==='missed').length;
      const totalQ = questions.reduce((a,q)=>a+q.count,0);

      setReportData({ startDate, endDate, chapters, revsInRange, questions, mocks, consistency, studiedDays, missedDays, totalQ });
    } catch(e) { showToast('Failed to load data', 'error'); }
    setLoading(false);
  }

  function fmtDateShort(d) {
    return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }

  function generatePDF() {
    if (!reportData) return;
    setGenerating(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      const W = 210, H = 297;
      const margin = 18;
      let y = margin;

      const INK = [0,0,0];
      const MUTED = [93,94,102];
      const RULE = [220,215,216];
      const ERR = [186,26,26];
      const GREEN = [22,163,74];

      function checkPage(needed=10) {
        if (y + needed > H - margin) {
          doc.addPage();
          y = margin;
          // header bar on new pages
          doc.setFillColor(...INK);
          doc.rect(0, 0, W, 8, 'F');
          doc.setFontSize(7); doc.setTextColor(255,255,255);
          doc.setFont('helvetica','bold');
          doc.text('STUDEX — JEE Preparation Report', margin, 5.5);
          doc.text(`${fmtDateShort(reportData.startDate)} – ${fmtDateShort(reportData.endDate)}`, W-margin, 5.5, {align:'right'});
          y = 16;
        }
      }

      // ── COVER HEADER ──
      doc.setFillColor(...INK);
      doc.rect(0, 0, W, 38, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(22); doc.setTextColor(255,255,255);
      doc.text('STUDEX', margin, 18);
      doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.setTextColor(200,200,200);
      doc.text('JEE PREPARATION — PROGRESS REPORT', margin, 25);
      doc.setFontSize(10); doc.setTextColor(255,255,255);
      doc.text(`${fmtDateShort(reportData.startDate)}  →  ${fmtDateShort(reportData.endDate)}`, margin, 33);
      y = 48;

      // ── SUMMARY STATS ──
      doc.setFont('helvetica','bold'); doc.setFontSize(8);
      doc.setTextColor(...MUTED);
      doc.text('SUMMARY', margin, y); y += 5;

      const stats = [
        { num: String(reportData.chapters.length), lbl: 'Chapters Studied' },
        { num: String(reportData.revsInRange.length), lbl: 'Revisions Done' },
        { num: String(reportData.totalQ), lbl: 'Questions Solved' },
        { num: String(reportData.mocks.length), lbl: 'Mock Tests' },
        { num: String(reportData.studiedDays), lbl: 'Days Studied' },
        { num: String(reportData.missedDays), lbl: 'Days Missed' },
      ];
      const bw = (W - margin*2 - 5*4) / 6;
      stats.forEach((s,i) => {
        const bx = margin + i*(bw+4);
        doc.setFillColor(245,245,245);
        doc.rect(bx, y, bw, 18, 'F');
        doc.setFillColor(...INK);
        doc.rect(bx, y, bw, 1.5, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(16);
        doc.setTextColor(...INK);
        doc.text(s.num, bx+bw/2, y+11, {align:'center'});
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
        doc.setTextColor(...MUTED);
        doc.text(s.lbl, bx+bw/2, y+16.5, {align:'center'});
      });
      y += 26;

      // helper: section header
      function sectionHeader(title, count) {
        checkPage(12);
        doc.setFillColor(...INK);
        doc.rect(margin, y, W - margin*2, 7, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8);
        doc.setTextColor(255,255,255);
        doc.text(title.toUpperCase(), margin+4, y+4.8);
        if (count != null) doc.text(String(count), W-margin-4, y+4.8, {align:'right'});
        y += 11;
      }

      // ── CHAPTERS STUDIED ──
      sectionHeader('Chapters Studied', reportData.chapters.length);
      if (reportData.chapters.length === 0) {
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text('No chapters studied in this period.', margin+2, y); y += 8;
      } else {
        // Group by subject
        const bySubj = {};
        reportData.chapters.forEach(c => {
          if (!bySubj[c.subject]) bySubj[c.subject] = { color: c.color, chapters: [] };
          bySubj[c.subject].chapters.push(c);
        });
        Object.entries(bySubj).forEach(([subj, sd]) => {
          checkPage(10);
          doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
          doc.setTextColor(...INK);
          doc.text(subj, margin+4, y); 
          doc.setFont('helvetica','normal'); doc.setFontSize(8);
          doc.setTextColor(...MUTED);
          doc.text(`(${sd.chapters.length})`, margin + doc.getTextWidth(subj) + 7, y);
          y += 5;
          doc.setDrawColor(...RULE); doc.line(margin, y, W-margin, y); y += 3;
          sd.chapters.forEach((ch,i) => {
            checkPage(7);
            const rowY = y;
            // left color accent
            doc.setFillColor(...hexToRgb(ch.color));
            doc.rect(margin, rowY-0.5, 2, 5.5, 'F');
            doc.setFont('helvetica','normal'); doc.setFontSize(9);
            doc.setTextColor(...INK);
            const chName = doc.splitTextToSize(ch.name, W - margin*2 - 40);
            doc.text(chName, margin+5, rowY+3.5);
            doc.setFontSize(8); doc.setTextColor(...MUTED);
            doc.text(fmtDateShort(ch.date), W-margin, rowY+3.5, {align:'right'});
            y += chName.length > 1 ? chName.length*5 + 2 : 7;
            if (i < sd.chapters.length-1) {
              doc.setDrawColor(238,238,238); doc.line(margin+4, y-1, W-margin, y-1);
            }
          });
          y += 4;
        });
      }

      // ── QUESTION LOGS ──
      sectionHeader('Questions Solved', reportData.totalQ);
      if (reportData.questions.length === 0) {
        checkPage(8);
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text('No questions logged in this period.', margin+2, y); y += 8;
      } else {
        // Summary by subject
        const qBySubj = {};
        const qByType = {};
        reportData.questions.forEach(q => {
          qBySubj[q.subject] = (qBySubj[q.subject]||0) + q.count;
          qByType[q.question_type] = (qByType[q.question_type]||0) + q.count;
        });
        checkPage(14);
        const subjColors = {maths:'#2563eb',physics:'#dc2626',organic:'#16a34a',inorganic:'#9333ea',physical:'#ea580c'};
        const subjLabels = {maths:'Maths',physics:'Physics',organic:'Organic',inorganic:'Inorganic',physical:'Physical'};
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...MUTED);
        doc.text('BY SUBJECT', margin+2, y); y += 5;
        const maxQ = Math.max(...Object.values(qBySubj));
        Object.entries(qBySubj).forEach(([subj, cnt]) => {
          checkPage(7);
          const rgb = hexToRgb(subjColors[subj]||'#000');
          doc.setFillColor(...rgb);
          doc.rect(margin+2, y, 3, 4, 'F');
          doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
          doc.text(subjLabels[subj]||subj, margin+8, y+3.2);
          // bar
          const barX = margin+46, barW = W-margin-46-margin-16;
          doc.setFillColor(232,232,232);
          doc.rect(barX, y+1, barW, 2.5, 'F');
          doc.setFillColor(...rgb);
          doc.rect(barX, y+1, barW*(cnt/maxQ), 2.5, 'F');
          doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
          doc.text(String(cnt), W-margin, y+3.2, {align:'right'});
          y += 7;
        });
        y += 3;
        // type summary
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...MUTED);
        checkPage(8);
        doc.text('BY TYPE', margin+2, y); y += 5;
        const typeLabels = {mains:'JEE Mains',advanced:'JEE Advanced',practice:'Practice'};
        Object.entries(qByType).forEach(([t,cnt]) => {
          checkPage(7);
          doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
          doc.text((typeLabels[t]||t), margin+8, y+3.2);
          doc.setFont('helvetica','bold');
          doc.text(String(cnt), W-margin, y+3.2, {align:'right'});
          y += 7;
        });
        y += 2;
      }

      // ── MOCK TESTS ──
      sectionHeader('Mock Tests', reportData.mocks.length);
      if (reportData.mocks.length === 0) {
        checkPage(8);
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text('No mock tests in this period.', margin+2, y); y += 8;
      } else {
        // Table header
        checkPage(10);
        doc.setFillColor(232,232,232);
        doc.rect(margin, y, W-margin*2, 6, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
        const cols = [margin+2, margin+60, margin+90, margin+118, margin+142, margin+160];
        ['Test Name','Date','Type','Score','Marks','%'].forEach((h,i)=>doc.text(h, cols[i], y+4));
        y += 8;
        reportData.mocks.forEach((m,i) => {
          checkPage(8);
          const pct = Math.round(m.total_marks/m.max_marks*100);
          const rowBg = i%2===0 ? [255,255,255] : [249,249,249];
          doc.setFillColor(...rowBg); doc.rect(margin, y, W-margin*2, 7, 'F');
          // pct color accent strip
          const stripColor = pct>=70 ? GREEN : pct>=40 ? [234,88,12] : ERR;
          doc.setFillColor(...stripColor); doc.rect(margin, y, 2, 7, 'F');
          doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(...INK);
          const nameTrunc = m.test_name.length > 22 ? m.test_name.slice(0,22)+'…' : m.test_name;
          doc.text(nameTrunc, cols[0]+2, y+4.5);
          doc.setFontSize(8); doc.setTextColor(...MUTED);
          doc.text(fmtDateShort(m.test_date), cols[1], y+4.5);
          doc.text(m.test_type, cols[2], y+4.5);
          doc.setTextColor(...INK);
          doc.text(`${m.total_marks}/${m.max_marks}`, cols[3], y+4.5);
          doc.text(`M:${m.marks_maths||0} P:${m.marks_physics||0}`, cols[4], y+4.5);
          doc.setFont('helvetica','bold');
          doc.setTextColor(...stripColor);
          doc.text(pct+'%', cols[5], y+4.5);
          y += 7;
        });
        y += 4;
        // avg
        checkPage(8);
        const avgPct = Math.round(reportData.mocks.reduce((a,m)=>a+m.total_marks/m.max_marks*100,0)/reportData.mocks.length);
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
        doc.text(`Average: ${avgPct}%`, W-margin, y, {align:'right'});
        y += 8;
      }

      // ── CONSISTENCY ──
      sectionHeader('Consistency', null);
      checkPage(14);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
      const totalTracked = reportData.consistency.length;
      const studPct = totalTracked > 0 ? Math.round(reportData.studiedDays/totalTracked*100) : 0;
      doc.text(`Studied: ${reportData.studiedDays} days   Missed: ${reportData.missedDays} days   Tracked: ${totalTracked} days   Consistency: ${studPct}%`, margin+2, y); y += 8;
      if (reportData.consistency.length > 0) {
        // simple colour strip calendar
        const cellSize = 5, gap = 1.5;
        const cols7 = Math.floor((W - margin*2) / (cellSize+gap));
        let cx = margin, cy = y;
        reportData.consistency.forEach((d,i) => {
          if (i > 0 && i % cols7 === 0) { cx = margin; cy += cellSize + gap; }
          const color = d.status==='studied' ? INK : ERR;
          doc.setFillColor(...color);
          doc.rect(cx, cy, cellSize, cellSize, 'F');
          cx += cellSize + gap;
        });
        y = cy + cellSize + 8;
      }

      // ── FOOTER ──
      const pages = doc.getNumberOfPages();
      for (let p=1; p<=pages; p++) {
        doc.setPage(p);
        doc.setFillColor(245,245,245);
        doc.rect(0, H-10, W, 10, 'F');
        doc.setDrawColor(...RULE); doc.line(0, H-10, W, H-10);
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...MUTED);
        doc.text('Generated by STUDEX', margin, H-4);
        doc.text(`Page ${p} of ${pages}`, W-margin, H-4, {align:'right'});
        doc.text(new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}), W/2, H-4, {align:'center'});
      }

      const fname = `STUDEX_Report_${reportData.startDate}_to_${reportData.endDate}.pdf`;
      doc.save(fname);
      showToast('PDF downloaded!', 'picture_as_pdf');
    } catch(e) {
      console.error(e);
      showToast('PDF generation failed', 'error');
    }
    setGenerating(false);
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }

  return (
    <div className="rg-layout">
      {/* Left: controls */}
      <div className="rg-left">
        <div className="rg-left-header">
          <div className="rg-form-title">Progress Report</div>
          <div className="rg-form-sub">Select a date range to generate a PDF report of your progress — chapters, revisions, questions &amp; mock tests.</div>
        </div>
        <div className="rg-form">
          <div className="rg-field">
            <label>From</label>
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
          </div>
          <div className="rg-field">
            <label>To</label>
            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}/>
          </div>
          <button className="rg-generate-btn" disabled={loading||!startDate||!endDate||startDate>endDate} onClick={fetchReport}>
            {loading ? <span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/> : <span className="icon" style={{fontSize:16}}>search</span>}
            Load Report
          </button>

          {reportData && (
            <>
              <div className="rg-divider"/>
              <div className="rg-preview-title">Summary</div>
              <div className="rg-stat-grid">
                {[
                  {num:reportData.chapters.length, lbl:'Chapters Studied'},
                  {num:reportData.revsInRange.length, lbl:'Revisions Done'},
                  {num:reportData.totalQ, lbl:'Questions Solved'},
                  {num:reportData.mocks.length, lbl:'Mock Tests'},
                  {num:reportData.studiedDays, lbl:'Days Studied'},
                  {num:reportData.missedDays, lbl:'Days Missed'},
                ].map((s,i)=>(
                  <div key={i} className="rg-stat-box">
                    <div className="rg-stat-box-num">{s.num}</div>
                    <div className="rg-stat-box-lbl">{s.lbl}</div>
                  </div>
                ))}
              </div>
              <div className="rg-divider"/>
              <button className="rg-generate-btn" disabled={generating} onClick={generatePDF}>
                {generating ? <span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/> : <span className="icon" style={{fontSize:16}}>picture_as_pdf</span>}
                Download PDF
              </button>
            </>
          )}
        </div>
      </div>

      {/* Right: preview */}
      <div className="rg-right">
        {!reportData ? (
          <div className="rg-no-data">
            <span className="icon">summarize</span>
            <h3>No report loaded</h3>
            <p>Set a date range and click Load Report to preview your progress before downloading.</p>
          </div>
        ) : (
          <>
            {/* Chapters */}
            <div className="rg-section">
              <div className="rg-section-head">
                Chapters Studied
                <span className="rg-section-head-count">{reportData.chapters.length}</span>
              </div>
              {reportData.chapters.length === 0
                ? <div className="rg-empty-section"><span className="icon" style={{fontSize:16}}>menu_book</span>No chapters studied in this period.</div>
                : reportData.chapters.map((ch,i)=>(
                  <div key={i} className="rg-chapter-row">
                    <div className="rg-ch-dot" style={{background:ch.color}}/>
                    <span className="rg-ch-name">{ch.name}</span>
                    <span style={{fontSize:9,color:ch.color,fontWeight:600,marginRight:6,padding:'2px 6px',background:ch.color+'15',borderRadius:20}}>{ch.subject}</span>
                    <span className="rg-ch-date">{fmtDate(ch.date)}</span>
                  </div>
                ))
              }
            </div>

            {/* Revisions */}
            <div className="rg-section">
              <div className="rg-section-head">
                Revisions Completed
                <span className="rg-section-head-count">{reportData.revsInRange.length}</span>
              </div>
              {reportData.revsInRange.length === 0
                ? <div className="rg-empty-section"><span className="icon" style={{fontSize:16}}>event_repeat</span>No revisions completed for chapters studied in this period.</div>
                : reportData.revsInRange.map((r,i)=>(
                  <div key={i} className="rg-chapter-row">
                    <span className="rg-ch-name">{r.chapterName}</span>
                    <span className="rg-rev-badge">R{r.day===7?1:r.day===15?2:3} · Day {r.day}</span>
                  </div>
                ))
              }
            </div>

            {/* Questions */}
            <div className="rg-section">
              <div className="rg-section-head">
                Questions Solved
                <span className="rg-section-head-count">{reportData.totalQ}</span>
              </div>
              {reportData.questions.length === 0
                ? <div className="rg-empty-section"><span className="icon" style={{fontSize:16}}>calculate</span>No questions logged in this period.</div>
                : reportData.questions.map((q,i)=>(
                  <div key={i} className="rg-q-row">
                    <span className="rg-q-count">{q.count}</span>
                    <div className="rg-q-info">
                      <span style={{fontWeight:600}}>{q.subject}</span>
                      <span style={{color:'var(--muted)',marginLeft:6}}>{q.question_type}</span>
                    </div>
                    <span style={{fontSize:10,color:'var(--muted)'}}>{new Date(q.logged_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>
                  </div>
                ))

            </div>

            {/* Mocks */}
            <div className="rg-section">
              <div className="rg-section-head">
                Mock Tests
                <span className="rg-section-head-count">{reportData.mocks.length}</span>
              </div>
              {reportData.mocks.length === 0
                ? <div className="rg-empty-section"><span className="icon" style={{fontSize:16}}>bar_chart</span>No mock tests in this period.</div>
                : reportData.mocks.map((m,i)=>{
                  const pct = Math.round(m.total_marks/m.max_marks*100);

                    <div key={i} className="rg-mock-row">
                      <div className="rg-mock-name">{m.test_name}</div>
                      <div className="rg-mock-meta">
                        {fmtDate(m.test_date)} · {m.test_type} ·&nbsp;
                        <span style={{fontWeight:700,color:pct>=70?'#16a34a':pct>=40?'#ea580c':'var(--err)'}}>{m.total_marks}/{m.max_marks} ({pct}%)</span>
                      </div>
                    </div>

                })
              }
            </div>

            {/* Consistency */}
            <div className="rg-section">
              <div className="rg-section-head">Consistency</div>
              <div className="rg-con-grid">
                {[
                  {num:reportData.studiedDays, lbl:'Days Studied', color:'var(--ink)'},
                  {num:reportData.missedDays, lbl:'Days Missed', color:'var(--err)'},
                  {num:reportData.consistency.length, lbl:'Days Tracked'},
                  {num: reportData.consistency.length ? Math.round(reportData.studiedDays/reportData.consistency.length*100)+'%' : '—', lbl:'Consistency Rate', color:'#16a34a'},
                ].map((s,i)=>(
                  <div key={i} className="rg-con-cell">

                    <div style={{fontSize:9,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginTop:3}}>{s.lbl}</div>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}


// ===================== TASK MANAGER =====================
function TaskManager({ user, showToast }) {
  const [tasks, setTasks] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selDate, setSelDate] = useState(today());
  const [input, setInput] = useState('');
  const [saving, setSaving] = useState(false);
  const [showTplInput, setShowTplInput] = useState(false);
  const [tplInput, setTplInput] = useState('');
  const [calView, setCalView] = useState(()=>{ const d=new Date(); return {year:d.getFullYear(),month:d.getMonth()}; });
  const inputRef = useRef(null);

  // Load tasks + templates on mount
  useEffect(()=>{
    if (!user) return;
    Promise.all([
      sb.from('studex_tasks').select('*').eq('user_id',user.id).order('created_at'),
      sb.from('studex_task_templates').select('*').eq('user_id',user.id).order('sort_order').order('created_at'),
    ]).then(([t,tp])=>{
      setTasks(t.data||[]);
      setTemplates(tp.data||[]);
      setLoading(false);
    });
  },[user]);

  // Auto-apply templates for today if not yet done
  useEffect(()=>{
    if (!user || loading) return;
    const t = today();
    sb.from('studex_template_applied').select('id').eq('user_id',user.id).eq('applied_date',t).maybeSingle()
      .then(async({data,error})=>{
        if (data) return; // already applied today
        if (!templates.length) return;
        // Insert one task per template for today
        const inserts = templates.map(tp=>({ user_id:user.id, title:tp.title, status:'todo', due_date:t, description:'', priority:'medium' }));
        const {data:newTasks} = await sb.from('studex_tasks').insert(inserts).select();
        if (newTasks?.length) {
          setTasks(p=>[...p,...newTasks]);
          await sb.from('studex_template_applied').insert({user_id:user.id,applied_date:t});
          showToast(`${newTasks.length} repeated task${newTasks.length>1?'s':''} added for today`,'repeat');
        }
      });
  },[user, loading, templates]);

  async function handleAdd(e) {
    e.preventDefault();
    const title = input.trim();
    if (!title || saving) return;
    setSaving(true);
    const {data,error} = await sb.from('studex_tasks')
      .insert({user_id:user.id, title, status:'todo', due_date:selDate, description:'', priority:'medium'})
      .select().single();
    if (!error) { setTasks(p=>[...p,data]); setInput(''); }
    setSaving(false);
    inputRef.current?.focus();
  }

  async function handleToggle(task) {
    const ns = task.status==='done'?'todo':'done';
    const {data,error} = await sb.from('studex_tasks').update({status:ns}).eq('id',task.id).select().single();
    if (!error) setTasks(p=>p.map(t=>t.id===data.id?data:t));
  }

  async function handleDelete(id) {
    await sb.from('studex_tasks').delete().eq('id',id);
    setTasks(p=>p.filter(t=>t.id!==id));
    showToast('Deleted','delete');
  }

  async function handleAddTemplate(e) {
    e.preventDefault();
    const title = tplInput.trim();
    if (!title) return;
    const {data,error} = await sb.from('studex_task_templates')
      .insert({user_id:user.id,title,sort_order:templates.length}).select().single();
    if (!error) { setTemplates(p=>[...p,data]); setTplInput(''); setShowTplInput(false); showToast('Repeated task saved','repeat'); }
  }

  async function handleDeleteTemplate(id) {
    await sb.from('studex_task_templates').delete().eq('id',id);
    setTemplates(p=>p.filter(t=>t.id!==id));
    showToast('Repeated task removed','delete');
  }

  // Tasks for selected date
  const selTasks = useMemo(()=>tasks.filter(t=>t.due_date===selDate),[tasks,selDate]);
  const selDone  = selTasks.filter(t=>t.status==='done').length;
  const selPct   = selTasks.length ? Math.round(selDone/selTasks.length*100) : 0;

  // All dates that have tasks (for calendar dots)
  const taskDates = useMemo(()=>{
    const m={};
    tasks.forEach(t=>{ if(!m[t.due_date]) m[t.due_date]={total:0,done:0}; m[t.due_date].total++; if(t.status==='done') m[t.due_date].done++; });
    return m;
  },[tasks]);

  // Date navigation
  function prevDay(){ const d=new Date(selDate+'T00:00:00'); d.setDate(d.getDate()-1); setSelDate(d.toISOString().slice(0,10)); }
  function nextDay(){ const d=new Date(selDate+'T00:00:00'); d.setDate(d.getDate()+1); setSelDate(d.toISOString().slice(0,10)); }

  // Calendar rendering
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const t0 = today();
  const daysInMonth = new Date(calView.year,calView.month+1,0).getDate();
  const firstDow = new Date(calView.year,calView.month,1).getDay();
  const calCells=[];
  for(let i=0;i<firstDow;i++){const d=new Date(calView.year,calView.month,-(firstDow-i-1));calCells.push({date:d.toISOString().slice(0,10),day:d.getDate(),other:true});}
  for(let d=1;d<=daysInMonth;d++){const dt=`${calView.year}-${String(calView.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;calCells.push({date:dt,day:d,other:false});}
  while(calCells.length%7!==0){const prev=calCells[calCells.length-1];const nd=new Date(prev.date+'T00:00:00');nd.setDate(nd.getDate()+1);calCells.push({date:nd.toISOString().slice(0,10),day:nd.getDate(),other:true});}

  const selDateObj = new Date(selDate+'T00:00:00');
  const selLabel   = selDate===t0?'Today':selDate===addDays(t0,1)?'Tomorrow':selDate===addDays(t0,-1)?'Yesterday':fmtDate(selDate);

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="tm-layout">
      {/* LEFT: calendar + progress + templates */}
      <div className="tm-left">
        {/* Mini calendar */}
        <div className="tm-cal-wrap">
          <div className="cal-nav">
            <button className="cal-nav-btn" onClick={()=>setCalView(v=>v.month===0?{year:v.year-1,month:11}:{year:v.year,month:v.month-1})}>
              <span className="icon" style={{fontSize:14}}>chevron_left</span>
            </button>
            <span className="cal-month">{MONTHS[calView.month]} {calView.year}</span>
            <button className="cal-nav-btn" onClick={()=>setCalView(v=>v.month===11?{year:v.year+1,month:0}:{year:v.year,month:v.month+1})}>
              <span className="icon" style={{fontSize:14}}>chevron_right</span>
            </button>
          </div>
          <div className="cal-grid">
            {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} className="cal-dow">{d}</div>)}
            {calCells.map((c,i)=>{
              const info=taskDates[c.date];
              const isToday=c.date===t0;
              const isSel=c.date===selDate;
              const allDone=info&&info.done===info.total&&info.total>0;
              return(
                <div key={i} className={`cal-day${c.other?' other-month':''}${isToday?' is-today':''}${isSel?' selected':''}`}
                  onClick={()=>setSelDate(c.date)}>
                  <span className="day-num">{c.day}</span>
                  {info&&info.total>0&&(allDone?<span className="day-dot done-dot"/>:<span className="day-dot pending"/>)}
                </div>
              );
            })}
          </div>
        </div>

        {/* Today's progress */}
        <div className="tm-prog-section">
          <div className="tm-prog-label">
            <span>Today's Progress</span>
            <span style={{fontFamily:"'Libre Caslon Text',serif",fontSize:14,fontWeight:700,color:'var(--ink)'}}>
              {(()=>{const td=tasks.filter(t=>t.due_date===t0);const dn=td.filter(t=>t.status==='done').length;return td.length?`${dn}/${td.length}`:'—'})()}
            </span>
          </div>
          <div className="tm-prog-bar-bg">
            <div className="tm-prog-bar-fill" style={{width:(()=>{const td=tasks.filter(t=>t.due_date===t0);return td.length?`${Math.round(tasks.filter(t=>t.due_date===t0&&t.status==='done').length/td.length*100)}%`:'0%'})(),
              background:(()=>{const td=tasks.filter(t=>t.due_date===t0);const pct=td.length?Math.round(tasks.filter(t=>t.due_date===t0&&t.status==='done').length/td.length*100):0;return pct===100?'#16a34a':'var(--ink)'})()
            }}/>
          </div>
        </div>

        {/* Repeated Tasks */}
        <div className="tm-tpl-section">
          <div className="tm-tpl-head">
            <span className="tm-tpl-title">Repeated Tasks</span>
            <button className="tm-tpl-add-btn" onClick={()=>setShowTplInput(p=>!p)} title="Add repeated task">
              <span className="icon">{showTplInput?'close':'add'}</span>
            </button>
          </div>
          {showTplInput&&(
            <form className="tm-tpl-input-row" onSubmit={handleAddTemplate}>
              <input className="tm-tpl-input" value={tplInput} onChange={e=>setTplInput(e.target.value)}
                placeholder="Task name…" autoFocus/>
              <button type="submit" className="tm-tpl-save-btn" disabled={!tplInput.trim()}>Add</button>
            </form>
          )}
          {templates.length===0
            ? <div className="tm-tpl-empty">No repeated tasks yet.<br/><span style={{fontSize:10}}>Tasks added here repeat every day automatically.</span></div>
            : templates.map(tp=>(
              <div key={tp.id} className="tm-tpl-item">
                <div className="tm-tpl-bullet"/>
                <span className="tm-tpl-item-name">{tp.title}</span>
                <button className="tm-tpl-del" onClick={()=>handleDeleteTemplate(tp.id)}><span className="icon">close</span></button>
              </div>
            ))
          }
          {templates.length>0&&<div className="tm-tpl-hint">These tasks are automatically added every day.</div>}
        </div>
      </div>

      {/* RIGHT: task view */}
      <div className="tm-right">
        {/* Top bar: date nav + add input */}
        <div className="tm-top-bar">
          <div className="tm-date-nav">
            <button className="tm-date-nav-btn" onClick={prevDay}><span className="icon" style={{fontSize:16}}>chevron_left</span></button>
            <div className="tm-date-label">
              <div className="tm-date-label-main">{selLabel}</div>
              <div className="tm-date-label-sub">{fmtDate(selDate).toUpperCase()}</div>
            </div>
            <button className="tm-date-nav-btn" onClick={nextDay}><span className="icon" style={{fontSize:16}}>chevron_right</span></button>
            {selDate!==t0&&<button className="tm-today-btn" onClick={()=>setSelDate(t0)}>Today</button>}
          </div>
          <form className="tm-add-row" onSubmit={handleAdd}>
            <input ref={inputRef} className="tm-add-input" value={input}
              onChange={e=>setInput(e.target.value)} placeholder={`Add task for ${selLabel}…`}/>
            <button type="submit" className="tm-add-btn" disabled={!input.trim()||saving}>
              {saving ? <span className="spinner" style={{width:12,height:12,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/> : 'ADD'}
            </button>
          </form>
        </div>

        {/* Progress strip for selected date */}
        <div className="tm-prog-strip">
          <span className="tm-prog-strip-pct" style={{color:selPct===100?'#16a34a':'var(--ink)'}}>{selPct}%</span>
          <div className="tm-prog-strip-bar">
            <div className="tm-prog-strip-fill" style={{width:`${selPct}%`,background:selPct===100?'#16a34a':'var(--ink)'}}/>
          </div>
          <span className="tm-prog-strip-txt">{selTasks.length===0?'No tasks':selDone===selTasks.length&&selTasks.length>0?'All done!': `${selDone} of ${selTasks.length} done`}</span>
        </div>

        {/* Tasks for selected date */}
        <div className="tm-task-list">
          {selTasks.length===0 ? (
            <div className="tm-empty-day">
              <span className="icon" style={{fontSize:36,color:'var(--s-dim)',display:'block',marginBottom:14}}>check_circle</span>
              <h3>No tasks for {selLabel}</h3>
              <p>Type a task above and press ADD.</p>
              {templates.length>0&&<p style={{marginTop:6,fontSize:11,color:'var(--faint)'}}>Repeated tasks will appear automatically.</p>}
            </div>
          ) : (
            <>
              {/* To-do tasks */}
              {selTasks.filter(t=>t.status==='todo').length>0&&(
                <div className="tm-date-group-head">
                  <span className="tm-date-group-label">To Do</span>
                  <span className="tm-date-group-pct">{selTasks.filter(t=>t.status==='todo').length} remaining</span>
                </div>
              )}
              {selTasks.filter(t=>t.status==='todo').map(task=>{
                const isRepeat = templates.some(tp=>tp.title===task.title);
                return (
                  <div key={task.id} className="tm-row">
                    <div className="tm-check" onClick={()=>handleToggle(task)}/>
                    <span className="tm-row-title">{task.title}</span>
                    {isRepeat&&<span className="tm-tpl-badge">repeat</span>}
                    <button className="tm-row-del" onClick={()=>handleDelete(task.id)}><span className="icon">delete</span></button>
                  </div>
                );
              })}
              {/* Done tasks */}
              {selTasks.filter(t=>t.status==='done').length>0&&(
                <div className="tm-date-group-head" style={{marginTop:selTasks.filter(t=>t.status==='todo').length===0?0:2}}>
                  <span className="tm-date-group-label" style={{color:'#16a34a'}}>Done</span>
                  <span className="tm-date-group-pct">{selDone} completed</span>
                </div>
              )}
              {selTasks.filter(t=>t.status==='done').map(task=>{
                const isRepeat = templates.some(tp=>tp.title===task.title);
                return (
                  <div key={task.id} className="tm-row done-row">
                    <div className="tm-check checked" onClick={()=>handleToggle(task)}><span className="icon">check</span></div>
                    <span className="tm-row-title">{task.title}</span>
                    {isRepeat&&<span className="tm-tpl-badge" style={{opacity:0.5}}>repeat</span>}
                    <button className="tm-row-del" onClick={()=>handleDelete(task.id)}><span className="icon">delete</span></button>
                  </div>
                );
              })}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  const [mocks, setMocks] = useState([]); // for profile stats
  const [profileData, setProfileData] = useState(null); // avatar_url for topbar
  const [myScore, setMyScore] = useState(null); // leaderboard score for topbar pill
  const [toast, setToast] = useState(null);
  const [showFloatCal, setShowFloatCal] = useState(false);
  const [jumpDate, setJumpDate] = useState(null);
  const [darkMode, setDarkMode] = useState(()=>localStorage.getItem('studex_theme')==='dark');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const toastTimer = useRef(null);

  function toggleTheme() {
    const next = darkMode ? 'light' : 'dark';
    setDarkMode(!darkMode);
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('studex_theme', next);
    // Re-apply saved settings for the new theme variant
    if (user) {
      sb.from('user_settings').select('settings').eq('user_id', user.id).maybeSingle()
        .then(({ data }) => {
          const merged = { ...SETTINGS_DEFAULTS, ...(data?.settings || {}) };
          applySettings(merged);
        });
    }
  }

  const floatCalRef = useRef(null);

  useEffect(()=>{
    if (!showFloatCal) return;
    function handleClickOutside(e) {
      if (floatCalRef.current && !floatCalRef.current.contains(e.target)) {
        setShowFloatCal(false);
      }
    }
    // small timeout so the button click that opened it doesn't immediately close it
    const id = setTimeout(()=>document.addEventListener('mousedown', handleClickOutside), 10);
    return ()=>{ clearTimeout(id); document.removeEventListener('mousedown', handleClickOutside); };
  }, [showFloatCal]);

  function showToast(msg, icon) {
    setToast({msg, icon});
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(null), 2800);
  }

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      if(data.session?.user) { setUser(data.session.user); loadData(data.session.user.id); }
      else setLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user) { setUser(session.user); loadData(session.user.id); }
      else { setUser(null); setLoading(false); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function loadData(uid) {
    setLoading(true);
    const [chk, rev, diff, notes, mocksRes, profRes, settRes] = await Promise.all([
      sb.from('studex_checked').select('chapter_id,checked_at').eq('user_id',uid),
      sb.from('studex_rev_done').select('rev_id').eq('user_id',uid),
      sb.from('studex_difficulty').select('chapter_id,difficulty').eq('user_id',uid),
      sb.from('studex_notes').select('chapter_id,note').eq('user_id',uid),
      sb.from('mock_tests').select('*').eq('user_id',uid),
      sb.from('user_profiles').select('avatar_url,display_name').eq('user_id',uid).maybeSingle(),
      sb.from('user_settings').select('settings').eq('user_id',uid).maybeSingle(),
    ]);
    const cm = {}; (chk.data||[]).forEach(r=>{ cm[r.chapter_id]=r.checked_at; });
    const ds = new Set(); (rev.data||[]).forEach(r=>ds.add(r.rev_id));
    const dm = {}; (diff.data||[]).forEach(r=>{ dm[r.chapter_id]=r.difficulty; });
    const nm = {}; (notes.data||[]).forEach(r=>{ nm[r.chapter_id]=r.note; });
    setCheckedMap(cm); setDoneSet(ds); setDiffMap(dm); setNotesMap(nm);
    setMocks(mocksRes.data||[]);
    setProfileData(profRes.data||null);
    // Apply saved settings immediately so ALL tabs get the right colors from the start
    if (settRes.data?.settings) {
      const merged = { ...SETTINGS_DEFAULTS, ...settRes.data.settings };
      applySettings(merged);
    }
    setLoading(false);
  }

  async function handleCheck(chId) {
    const uid = user.id;
    const d = today();
    await sb.from('studex_checked').upsert({user_id:uid,chapter_id:chId,checked_at:d},{onConflict:'user_id,chapter_id'});
    setCheckedMap(p=>({...p,[chId]:d}));
    showToast('Chapter marked as done','check_circle');
  }

  async function handleUncheck(chId) {
    const uid = user.id;
    await sb.from('studex_checked').delete().eq('user_id',uid).eq('chapter_id',chId);
    const revIds = REV_DAYS.map(d=>`${chId}_r${d}`);
    await sb.from('studex_rev_done').delete().eq('user_id',uid).in('rev_id',revIds);
    setCheckedMap(p=>{ const n={...p}; delete n[chId]; return n; });
    setDoneSet(p=>{ const n=new Set(p); revIds.forEach(id=>n.delete(id)); return n; });
    showToast('Chapter unchecked','remove_circle');
  }

  async function handleMarkDone(revId) {
    const uid = user.id;
    await sb.from('studex_rev_done').upsert({user_id:uid,rev_id:revId},{onConflict:'user_id,rev_id'});
    setDoneSet(p=>new Set([...p,revId]));
    showToast('Revision marked done','done_all');
  }

  async function handleUndo(revId) {
    const uid = user.id;
    await sb.from('studex_rev_done').delete().eq('user_id',uid).eq('rev_id',revId);
    setDoneSet(p=>{ const n=new Set(p); n.delete(revId); return n; });
    showToast('Revision undone','undo');
  }

  async function handleSaveNote(chId, note) {
    const uid = user.id;
    if (!note.trim()) {
      await sb.from('studex_notes').delete().eq('user_id',uid).eq('chapter_id',chId);
      setNotesMap(p=>{ const n={...p}; delete n[chId]; return n; });
    } else {
      await sb.from('studex_notes').upsert({user_id:uid,chapter_id:chId,note},{onConflict:'user_id,chapter_id'});
      setNotesMap(p=>({...p,[chId]:note}));
    }
    showToast('Note saved','save');
  }

  async function handleSetDifficulty(chId, difficulty) {
    const uid = user.id;
    await sb.from('studex_difficulty').upsert({user_id:uid,chapter_id:chId,difficulty},{onConflict:'user_id,chapter_id'});
    setDiffMap(p=>({...p,[chId]:difficulty}));
    showToast(`Chapter rated ${difficulty}`,'star');
  }

  // Listen for difficulty modal events
  useEffect(()=>{
    const handler = e=>handleSetDifficulty(e.detail.chapterId,e.detail.difficulty);
    document.addEventListener('setDifficulty',handler);
    return ()=>document.removeEventListener('setDifficulty',handler);
  },[user]);

  const revisions = useMemo(()=>buildRevisions(checkedMap,doneSet),[checkedMap,doneSet]);
  const syllBadge = SUBJECTS.reduce((a,s)=>a+s.chapters.length,0) - Object.keys(checkedMap).length;
  const t = today();
  const revBadge = revisions.filter(r=>!r.done && r.dueDate <= t).length;

  const initials = user?.email ? user.email.slice(0,2).toUpperCase() : '??';

  const TAB_ITEMS = [
    { id:'syllabus',    icon:'menu_book',             label:'Syllabus',     color:'#2563eb', badge: syllBadge > 0 ? syllBadge : null, badgeUrgent: false },
    { id:'revision',    icon:'event_repeat',           label:'Revision',     color:'#7c3aed', badge: revBadge > 0 ? revBadge : null,  badgeUrgent: true  },
    { id:'consistency', icon:'local_fire_department',  label:'Consistency',  color:'#ea580c', badge: null, badgeUrgent: false },
    { id:'questions',   icon:'calculate',              label:'Questions',    color:'#0891b2', badge: null, badgeUrgent: false },
    { id:'mocks',       icon:'bar_chart',              label:'Mock Analysis',color:'#16a34a', badge: null, badgeUrgent: false },
    { id:'dpp',         icon:'book_2',                 label:'DPP Analysis', color:'#d97706', badge: null, badgeUrgent: false },
    { id:'tasks',       icon:'task_alt',               label:'Tasks',        color:'#0d9488', badge: null, badgeUrgent: false },
    { id:'notes',       icon:'sticky_note_2',          label:'Notes',        color:'#db2777', badge: null, badgeUrgent: false },
    { id:'hours',       icon:'schedule',               label:'Study Hours',  color:'#65a30d', badge: null, badgeUrgent: false },
    { id:'report',      icon:'summarize',              label:'Report',       color:'#475569', badge: null, badgeUrgent: false },
    { id:'settings',    icon:'settings',               label:'Settings',     color:'#64748b', badge: null, badgeUrgent: false },
    { id:'profile',     icon:'account_circle',         label:'Profile',      color:'#9333ea', badge: null, badgeUrgent: false },
    { id:'leaderboard',  icon:'leaderboard',            label:'Leaderboard',  color:'#f59e0b', badge: null, badgeUrgent: false },
  ];

  const currentTabLabel = TAB_ITEMS.find(x=>x.id===tab)?.label || '';
  const TAB_ICONS = Object.fromEntries(TAB_ITEMS.map(x=>[x.id, x.icon]));

  function switchTab(id) {
    setTab(id);
    setTimeout(()=>setSidebarOpen(false), 120);
  }

  if (loading) return (
    <div className="loading-wrap">
      <div style={{width:48,height:48,background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:4}}>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="4" y="4" width="8" height="8" fill="var(--on-ink)"/>
          <rect x="16" y="4" width="8" height="8" fill="var(--on-ink)" opacity="0.5"/>
          <rect x="4" y="16" width="8" height="8" fill="var(--on-ink)" opacity="0.5"/>
          <rect x="16" y="16" width="8" height="8" fill="var(--on-ink)"/>
        </svg>
      </div>
      <div className="spinner"/>
    </div>
  );

  if (!user) return <AuthScreen onAuth={u=>{ setUser(u); loadData(u.id); }}/>;

  return (
    <div className="main">

      {/* ── SLIM TOP BAR ── */}
      <header className="topbar">
        {/* LEFT: hamburger + logo + current tab crumb */}
        <div className="topbar-left">
          <button className={`hamburger${sidebarOpen?' open':''}`} onClick={()=>setSidebarOpen(p=>!p)} aria-label="Menu">
            <span className="hamburger-line"/>
            <span className="hamburger-line"/>
            <span className="hamburger-line"/>
          </button>
          <div className="topbar-logo">
            <div className="logo-box">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" className="logo-svg">
                <rect x="2" y="2" width="6" height="6" fill="var(--on-ink)"/>
                <rect x="12" y="2" width="6" height="6" fill="var(--on-ink)" opacity="0.5"/>
                <rect x="2" y="12" width="6" height="6" fill="var(--on-ink)" opacity="0.5"/>
                <rect x="12" y="12" width="6" height="6" fill="var(--on-ink)"/>
              </svg>
            </div>
            <div className="logo-text">
              <h1>STUDEX</h1>
              <p>JEE Preparation</p>
            </div>
          </div>
          {/* Current tab breadcrumb — on the left, subtle */}
          {currentTabLabel && (
            <div className="topbar-tab-crumb">
              <span className="icon">{TAB_ICONS[tab]||'grid_view'}</span>
              {currentTabLabel}
            </div>
          )}
        </div>

        {/* RIGHT: tools | score | avatar */}
        <div className="topbar-right">

          {/* Tool buttons group */}
          <button className="nav-btn btn-theme" onClick={toggleTheme} title={darkMode?'Switch to light mode':'Switch to dark mode'}>
            <span className="icon">{darkMode ? 'light_mode' : 'dark_mode'}</span>
          </button>

          <div style={{position:'relative'}} ref={floatCalRef}>
            <button className="nav-btn btn-cal" onClick={()=>setShowFloatCal(p=>!p)} title="Quick calendar">
              <span className="icon">calendar_month</span>
            </button>
            {showFloatCal && (
              <div className="float-cal">
                <div className="float-cal-body">
                  <MiniCalendar revisions={revisions} selectedDate={t} onSelectDate={d=>{
                    setJumpDate(d); setTab('revision'); setShowFloatCal(false);
                  }}/>
                </div>
                <div className="float-cal-footer">
                  <span className="float-cal-today">Today: {fmtDate(t)}</span>
                  <button className="float-cal-link" onClick={()=>{ setTab('revision'); setShowFloatCal(false); }}>Open Revision →</button>
                </div>
              </div>
            )}
          </div>

          <button className="nav-btn btn-notes" onClick={()=>switchTab('notes')} title="Notes">
            <span className="icon">sticky_note_2</span>
          </button>

          <button className="nav-btn btn-settings" onClick={()=>switchTab('settings')} title="Settings">
            <span className="icon">settings</span>
          </button>

          {/* Divider */}
          <div className="topbar-divider"/>

          {/* Score pill → leaderboard */}
          <button className="score-pill" onClick={()=>switchTab('leaderboard')} title="View Leaderboard">
            <span className="icon">emoji_events</span>
            {myScore !== null ? myScore + ' pts' : '— pts'}
          </button>

          {/* Divider */}
          <div className="topbar-divider"/>

          {/* Avatar → profile */}
          <button className="nav-btn-avatar" onClick={()=>switchTab('profile')} title="My Profile">
            {profileData?.avatar_url
              ? <img src={profileData.avatar_url} alt="avatar"/>
              : <div className="avatar-box">{initials}</div>
            }
          </button>
        </div>
      </header>

      {/* ── SLIDE SIDEBAR ── */}
      <div className={`sidebar-overlay${sidebarOpen?' open':''}`}>
        {/* backdrop — click to close */}
        <div className="sidebar-backdrop" onClick={()=>setSidebarOpen(false)}/>

        <div className="sidebar-panel">
          {/* Panel header */}
          <div className="sidebar-head">
            <div className="sidebar-logo">
              <div className="logo-box" style={{width:28,height:28,borderRadius:4}}>
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="2" width="6" height="6" fill="white"/>
                  <rect x="12" y="2" width="6" height="6" fill="white" opacity="0.5"/>
                  <rect x="2" y="12" width="6" height="6" fill="white" opacity="0.5"/>
                  <rect x="12" y="12" width="6" height="6" fill="white"/>
                </svg>
              </div>
              <div className="logo-text">
                <h1 style={{fontSize:13}}>STUDEX</h1>
                <p style={{fontSize:8}}>JEE Preparation</p>
              </div>
            </div>
            <button className="sidebar-close" onClick={()=>setSidebarOpen(false)}>
              <span className="icon">close</span>
            </button>
          </div>

          {/* Nav items */}
          <nav className="sidebar-nav">
            <div className="sidebar-section-label">Navigation</div>
            {TAB_ITEMS.map(item=>{
              const isActive = tab===item.id;
              return (
                <button key={item.id}
                  className={`sidebar-tab${isActive?' active':''}`}
                  style={isActive?{'--tab-color':item.color}:{}}
                  onClick={()=>switchTab(item.id)}>
                  <div className="sidebar-tab-icon"
                    style={{background: isActive ? item.color : item.color+'22'}}>
                    <span className="icon"
                      style={{
                        color: isActive ? '#fff' : item.color,
                        fontVariationSettings: isActive ? "'FILL' 1,'wght' 600" : "'FILL' 0,'wght' 400"
                      }}>
                      {item.icon}
                    </span>
                  </div>
                  <span className="sidebar-tab-name">{item.label}</span>
                  {item.badge != null && (
                    <span className={`sidebar-badge${item.badgeUrgent?' urgent':''}`}>{item.badge}</span>
                  )}
                </button>
              );
            })}
          </nav>

          {/* Footer: user + actions */}
          <div className="sidebar-footer">
            <div className="sidebar-user" style={{cursor:'pointer'}} onClick={()=>switchTab('profile')}>
              <div className="sidebar-avatar" style={{overflow:'hidden',padding:0}}>
                {profileData?.avatar_url
                  ? <img src={profileData.avatar_url} style={{width:32,height:32,objectFit:'cover',borderRadius:'50%',display:'block'}} alt="avatar"/>
                  : <span>{initials}</span>
                }
              </div>
              <div className="sidebar-user-info">
                <div style={{fontSize:12,fontWeight:600,color:'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  {profileData?.display_name || user.email?.split('@')[0] || 'Student'}
                </div>
                <div className="sidebar-user-email">{user.email}</div>
              </div>
              <span className="icon" style={{fontSize:14,color:'var(--muted)'}}>chevron_right</span>
            </div>
            <div className="sidebar-footer-btns">
              <button className="sidebar-footer-btn" onClick={toggleTheme}>
                <span className="icon">{darkMode?'light_mode':'dark_mode'}</span>
                {darkMode?'Light':'Dark'}
              </button>
              <button className="sidebar-footer-btn danger" onClick={async()=>{ await sb.auth.signOut(); setUser(null); setSidebarOpen(false); }}>
                <span className="icon">logout</span>
                Sign out
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* ── PAGE CONTENT ── */}
      <div className="page">
        {tab === 'syllabus'
          ? <Syllabus checkedMap={checkedMap} doneSet={doneSet} diffMap={diffMap} notesMap={notesMap}
              onCheck={handleCheck} onUncheck={handleUncheck} onSaveNote={handleSaveNote} revisions={revisions}/>
          : tab === 'revision'
          ? <Revision revisions={revisions} onMarkDone={handleMarkDone} onUndo={handleUndo}
              diffMap={diffMap} jumpDate={jumpDate} onJumpDate={d=>setJumpDate(d)}/>
          : tab === 'consistency'
          ? <ConsistencyTracker user={user} showToast={showToast}/>
          : tab === 'questions'
          ? <QuestionCounter user={user} showToast={showToast}/>
          : tab === 'mocks'
          ? <MockAnalysis user={user} showToast={showToast}/>
          : tab === 'dpp'
          ? <DppAnalysis user={user} showToast={showToast}/>
          : tab === 'tasks'
          ? <TaskManager user={user} showToast={showToast}/>
          : tab === 'notes'
          ? <NotesManager user={user} showToast={showToast}/>
          : tab === 'hours'
          ? <StudyHoursAnalysis user={user} showToast={showToast} darkMode={darkMode}/>
          : tab === 'settings'
          ? <SettingsManager user={user} showToast={showToast} darkMode={darkMode} onThemeChange={toggleTheme}/>
          : tab === 'profile'
          ? <UserProfile user={user} showToast={showToast} checkedMap={checkedMap} doneSet={doneSet} mocks={mocks} onProfileUpdate={p=>setProfileData(p)}/>
          : tab === 'leaderboard'
          ? <Leaderboard user={user} showToast={showToast} switchTab={switchTab} onScoreReady={s=>setMyScore(s)}/>
          : <ReportGenerator user={user} showToast={showToast}/>}
      </div>

      {toast && <Toast msg={toast.msg} icon={toast.icon}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
