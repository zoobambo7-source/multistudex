<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STUDEX — JEE Preparation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f9f9;--surface:#fff;--s-low:#f3f3f3;--s-mid:#eeeeee;--s-high:#e8e8e8;--s-dim:#dadada;
  --ink:#000;--on-ink:#fff;--muted:#5d5e66;--faint:#7e7576;--rule:#cfc4c5;--err:#ba1a1a;
  --c-maths:#2563eb;--c-physics:#dc2626;--c-organic:#16a34a;--c-inorganic:#9333ea;--c-physical:#ea580c;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
}
[data-theme="dark"]{
  --bg:#0d0d0d;--surface:#141414;--s-low:#1a1a1a;--s-mid:#1f1f1f;--s-high:#252525;--s-dim:#2e2e2e;
  --ink:#f0f0f0;--on-ink:#0d0d0d;--muted:#888;--faint:#666;--rule:#2e2e2e;--err:#f87171;
  --c-maths:#60a5fa;--c-physics:#f87171;--c-organic:#4ade80;--c-inorganic:#c084fc;--c-physical:#fb923c;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}
[data-theme="dark"] .auth-err{background:#2a1010}
[data-theme="dark"] .status-chip.overdue{background:#2a1010}
[data-theme="dark"] .date-rev-badge.overdue-badge{background:#2a1010}
[data-theme="dark"] .pipeline-step.overdue{background:#2a1010}
[data-theme="dark"] .gap-warning{background:#2a1010;border-color:var(--err)}
[data-theme="dark"] .week-day[data-status="missed"]{background:#2a1010}
[data-theme="dark"] .ma-card-notes{background:var(--s-low)}
[data-theme="dark"] .rev-row:hover{background:var(--s-low)}
[data-theme="dark"] .heatmap-cell[data-status="studied"]{background:#4ade80 !important}
[data-theme="dark"] .heatmap-cell[data-status="missed"]{background:#f87171 !important}
[data-theme="dark"] .heatmap-popup{border-color:var(--s-dim);background:var(--surface)}
[data-theme="dark"] .week-day[data-status="studied"]{background:#16532e;border-color:#16532e}
[data-theme="dark"] .week-day[data-status="missed"]{background:#7f1d1d;border-color:#7f1d1d}
[data-theme="dark"] .sh-heatmap-card,[data-theme="dark"] .sh-chart-card,[data-theme="dark"] .sh-log-card{background:var(--surface)}
[data-theme="dark"] .sh-modal,[data-theme="dark"] .sh-sett-modal{background:var(--surface)}
[data-theme="dark"] input[type="date"]{color-scheme:dark}
[data-theme="dark"] canvas:not(.chartjs-canvas){filter:invert(0.85) hue-rotate(180deg)}
html,body,#root{height:100%;background:var(--bg)}
/* THEME TOGGLE */
.theme-btn{width:36px;height:36px;border:1px solid var(--s-dim);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s,background 0.15s}
.theme-btn:hover{background:var(--s-low);border-color:var(--ink)}
body{font-family:'Geist',sans-serif;font-size:14px;color:var(--ink);-webkit-font-smoothing:antialiased}
h1,h2,h3,.serif{font-family:'Libre Caslon Text',serif}
.icon{font-family:'Material Symbols Outlined';font-weight:300;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-smoothing:antialiased;user-select:none}

/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s-dim)}

/* ── TOP BAR (slim, always visible) ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;background:var(--surface);border-bottom:1px solid var(--s-dim);display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:3px}
.topbar-divider{width:1px;height:22px;background:var(--s-dim);margin:0 5px;flex-shrink:0}
.hamburger{width:36px;height:36px;border:1px solid var(--s-dim);border-radius:6px;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:border-color 0.15s,background 0.15s;flex-shrink:0}
.hamburger:hover{border-color:var(--ink);background:var(--s-low)}
.hamburger-line{width:16px;height:1.5px;background:var(--ink);border-radius:2px;transition:all 0.28s cubic-bezier(0.4,0,0.2,1);transform-origin:center}
.hamburger.open .hamburger-line:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.hamburger.open .hamburger-line:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open .hamburger-line:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.topbar-logo{display:flex;align-items:center;gap:9px;cursor:default}
.logo-box{width:32px;height:32px;background:var(--ink);display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;transition:background 0.2s}
.logo-box svg rect{transition:fill 0.2s}
[data-theme="dark"] .logo-box{background:var(--ink);box-shadow:0 0 0 1px rgba(255,255,255,0.08)}
.logo-text h1{font-family:'Libre Caslon Text',serif;font-size:15px;font-weight:700;letter-spacing:0.05em;line-height:1;color:var(--ink)}
.logo-text p{font-size:9px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-top:1px}

/* Current tab breadcrumb — left side, subtle */
.topbar-tab-crumb{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);padding:0 6px;height:26px;border-left:2px solid var(--s-dim);margin-left:4px}
.topbar-tab-crumb .icon{font-size:14px}

/* Generic icon button */
.nav-btn{width:34px;height:34px;border:1px solid transparent;border-radius:7px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s,background 0.15s,color 0.15s;position:relative;color:var(--muted)}
.nav-btn:hover{background:var(--s-low);border-color:var(--s-dim);color:var(--ink)}
.nav-btn .icon{font-size:18px}

/* Individual icon colours */
.nav-btn.btn-theme .icon{color:#f59e0b}
.nav-btn.btn-theme:hover{background:#fffbeb;border-color:#f59e0b}
[data-theme="dark"] .nav-btn.btn-theme:hover{background:#292108;border-color:#92400e}

.nav-btn.btn-cal .icon{color:#3b82f6}
.nav-btn.btn-cal:hover{background:#eff6ff;border-color:#3b82f6}
[data-theme="dark"] .nav-btn.btn-cal:hover{background:#0c1a2e;border-color:#1d4ed8}

.nav-btn.btn-notes .icon{color:#8b5cf6}
.nav-btn.btn-notes:hover{background:#f5f3ff;border-color:#8b5cf6}
[data-theme="dark"] .nav-btn.btn-notes:hover{background:#1e1b4b;border-color:#4c1d95}

.nav-btn.btn-settings .icon{color:var(--muted)}
.nav-btn.btn-settings:hover{background:var(--s-low);border-color:var(--s-dim);color:var(--ink)}

/* Score pill — leaderboard shortcut */
.score-pill{display:inline-flex;align-items:center;gap:5px;padding:0 11px;height:30px;border:1px solid #f59e0b;background:linear-gradient(135deg,#fffbeb,#fef3c7);border-radius:20px;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:700;color:#92400e;transition:all 0.15s;letter-spacing:0.02em;white-space:nowrap;flex-shrink:0}
.score-pill:hover{background:linear-gradient(135deg,#fef3c7,#fde68a);box-shadow:0 2px 8px rgba(245,158,11,0.3)}
.score-pill .icon{font-size:14px;color:#f59e0b}
[data-theme="dark"] .score-pill{background:linear-gradient(135deg,#292108,#362a0a);color:#fcd34d;border-color:#92400e}
[data-theme="dark"] .score-pill:hover{background:linear-gradient(135deg,#362a0a,#3d2f0d);box-shadow:0 2px 8px rgba(146,64,14,0.4)}

/* Avatar button */
.nav-btn-avatar{width:34px;height:34px;border:2px solid var(--s-dim);border-radius:50%;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s,box-shadow 0.15s;flex-shrink:0;background:none;padding:0}
.nav-btn-avatar:hover{border-color:var(--ink);box-shadow:0 0 0 2px var(--s-dim)}
.nav-btn-avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%}
.avatar-box{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--ink);color:var(--on-ink);border-radius:50%}

/* ── SIDEBAR OVERLAY ── */
.sidebar-overlay{position:fixed;inset:0;z-index:300;pointer-events:none}
.sidebar-overlay.open{pointer-events:auto}
.sidebar-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background 0.32s ease;cursor:pointer}
.sidebar-overlay.open .sidebar-backdrop{background:rgba(0,0,0,0.32)}
[data-theme="dark"] .sidebar-overlay.open .sidebar-backdrop{background:rgba(0,0,0,0.55)}

/* The panel itself */
.sidebar-panel{position:absolute;top:0;left:0;bottom:0;width:272px;background:var(--surface);border-right:1px solid var(--s-dim);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);box-shadow:4px 0 32px rgba(0,0,0,0);will-change:transform}
.sidebar-overlay.open .sidebar-panel{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,0.12)}
[data-theme="dark"] .sidebar-overlay.open .sidebar-panel{box-shadow:4px 0 40px rgba(0,0,0,0.5)}

/* Sidebar header */
.sidebar-head{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--s-dim);flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:9px}
.sidebar-close{width:30px;height:30px;border:1px solid var(--s-dim);border-radius:6px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.15s}
.sidebar-close:hover{border-color:var(--ink);color:var(--ink);background:var(--s-low)}
.sidebar-close .icon{font-size:16px}

/* Nav items */
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 10px 0}
.sidebar-section-label{font-size:8px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);padding:10px 10px 6px}
.sidebar-tab{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:8px;margin-bottom:2px;background:none;border:1px solid transparent;cursor:pointer;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;color:var(--muted);width:100%;text-align:left;transition:all 0.15s;position:relative}
.sidebar-tab:hover{background:var(--s-low);border-color:var(--s-dim);color:var(--ink)}
.sidebar-tab.active{background:var(--s-low);border-color:var(--s-dim);color:var(--ink);font-weight:600}
.sidebar-tab-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;background:var(--s-high);transition:background 0.15s,box-shadow 0.15s}
.sidebar-tab-icon .icon{font-size:17px;color:var(--muted);transition:color 0.15s,font-variation-settings 0.15s}
.sidebar-tab:hover .sidebar-tab-icon{filter:brightness(1.08)}
.sidebar-tab:hover .sidebar-tab-icon .icon{color:#fff}
.sidebar-tab.active .sidebar-tab-icon .icon{color:#fff;font-variation-settings:'FILL' 1,'wght' 600}
.sidebar-tab.active .sidebar-tab-icon{box-shadow:0 2px 8px rgba(0,0,0,0.18)}
.sidebar-tab-name{flex:1;letter-spacing:0.01em}
.sidebar-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;font-size:9px;font-weight:700;background:var(--s-high);color:var(--muted);border-radius:20px;letter-spacing:0;flex-shrink:0}
.sidebar-badge.urgent{background:var(--err);color:#fff}
/* Active left accent bar */
.sidebar-tab.active::before{content:'';position:absolute;left:-10px;top:8px;bottom:8px;width:3px;background:var(--tab-color,var(--ink));border-radius:0 3px 3px 0}

/* Divider */
.sidebar-divider{height:1px;background:var(--s-dim);margin:8px 10px}

/* Sidebar footer */
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--s-dim);flex-shrink:0}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--s-low);border:1px solid var(--s-dim);margin-bottom:8px}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--ink);color:var(--on-ink);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sidebar-user-info{flex:1;min-width:0}
.sidebar-user-email{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-role{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);margin-top:1px}
.sidebar-footer-btns{display:flex;gap:6px}
.sidebar-footer-btn{flex:1;height:34px;border:1px solid var(--s-dim);border-radius:7px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Geist',sans-serif;font-size:11px;font-weight:500;color:var(--muted);transition:all 0.15s}
.sidebar-footer-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--s-low)}
.sidebar-footer-btn .icon{font-size:16px}
.sidebar-footer-btn.danger:hover{border-color:var(--err);color:var(--err);background:rgba(186,26,26,0.04)}

/* Calendar mini inside sidebar */
.sidebar-cal-wrap{padding:0 10px 10px}

/* ── MAIN LAYOUT ── */
.main{padding-top:52px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.page{flex:1;display:flex;width:100%;overflow:hidden}
.page > *{width:100%;min-width:0}

/* float cal (keep existing) */
.nav-actions{display:flex;align-items:center;gap:4px;position:relative}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;font-size:9px;font-weight:700;background:var(--s-high);color:var(--muted);letter-spacing:0}
.tab-badge.urgent{background:var(--err);color:#fff}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--ink);padding:40px 32px}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px}
.auth-title{font-family:'Libre Caslon Text',serif;font-size:22px;font-weight:700}
.auth-sub{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.auth-toggle{display:flex;margin-bottom:24px;border:1px solid var(--ink)}
.auth-toggle button{flex:1;padding:8px;background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);transition:background 0.15s,color 0.15s}
.auth-toggle button.active{background:var(--ink);color:var(--on-ink)}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input{width:100%;height:38px;border:1px solid var(--s-dim);background:var(--s-low);padding:0 10px;font-family:'Geist',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color 0.15s}
.field input:focus{border-color:var(--ink);background:var(--surface)}
.btn-primary{width:100%;height:40px;background:var(--ink);color:var(--on-ink);border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity 0.15s}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.auth-err{font-size:12px;color:var(--err);margin-bottom:12px;padding:8px;border:1px solid var(--err);background:#fff0f0}

/* SYLLABUS */
.syl-layout{display:flex;width:100%;height:100%}

/* Sidebar — clean card-style */
.syl-sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--s-dim);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.syl-sidebar-head{padding:14px 16px 12px;border-bottom:1px solid var(--s-dim);background:var(--surface)}
.syl-sidebar-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.search-box{display:flex;align-items:center;gap:6px;border:1px solid var(--s-dim);padding:0 10px;height:34px;background:var(--s-low);border-radius:6px;transition:border-color 0.15s}
.search-box:focus-within{border-color:var(--ink);background:var(--surface)}
.search-box input{flex:1;border:none;background:none;font-family:'Geist',sans-serif;font-size:13px;color:var(--ink);outline:none}
.search-box .icon{font-size:16px;color:var(--muted)}

/* Subject list items — pill-accent design */
.subj-list{flex:1;overflow-y:auto;padding:8px}
.subj-row{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:8px;margin-bottom:3px;transition:background 0.12s;position:relative;border:1px solid transparent}
.subj-row:hover{background:var(--s-low);border-color:var(--s-dim)}
.subj-row.active{background:var(--s-low);border-color:var(--s-dim);box-shadow:inset 3px 0 0 var(--subj-color,#000)}
.subj-accent{display:none}
.subj-icon{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.subj-info{flex:1;min-width:0}
.subj-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.subj-prog{font-size:10px;color:var(--muted);margin-top:1px}
.prog-ring{flex-shrink:0}

/* Mini progress bar inside subj-row */
.subj-bar-wrap{height:2px;background:var(--s-dim);border-radius:1px;margin-top:5px}
.subj-bar-fill{height:100%;border-radius:1px;transition:width 0.3s}

/* Footer — cleaner */
.syl-footer{border-top:1px solid var(--s-dim);padding:14px 16px;background:var(--surface)}
.footer-stats{display:flex;gap:0;margin-bottom:10px;background:var(--s-low);border-radius:8px;overflow:hidden;border:1px solid var(--s-dim)}
.stat-block{flex:1;padding:10px 12px;text-align:center}
.stat-block + .stat-block{border-left:1px solid var(--s-dim)}
.stat-num{font-family:'Libre Caslon Text',serif;font-size:22px;font-weight:700;line-height:1;color:var(--ink)}
.stat-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.prog-bar-wrap{height:5px;background:var(--s-dim);margin-bottom:7px;border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--ink);transition:width 0.3s;border-radius:3px}
.footer-meta{display:flex;justify-content:space-between;align-items:center}
.footer-meta span{font-size:10px;color:var(--muted)}
.btn-ghost{background:none;border:1px solid var(--s-dim);padding:5px 10px;font-family:'Geist',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:border-color 0.15s,background 0.15s;color:var(--ink);border-radius:5px}
.btn-ghost:hover{border-color:var(--ink);background:var(--s-low)}

/* SYLLABUS MAIN */
.syl-main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Subject header — colored left-border accent, no full-width color bar */
.syl-subj-header{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--s-dim)}
.subj-color-bar{height:3px}
.subj-header-inner{padding:14px 20px 10px}
.subj-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.subj-header-title{font-family:'Libre Caslon Text',serif;font-size:19px;font-weight:700}
.subj-header-sub{font-size:11px;color:var(--muted)}
.subj-header-actions{display:flex;gap:6px}
.subj-prog-bar{height:4px;background:var(--s-dim);margin:10px 0 0;border-radius:2px;overflow:hidden}

/* Chapter table */
.ch-table{flex:1;overflow-y:auto}
.ch-header-row{display:grid;grid-template-columns:36px 28px 1fr 130px 36px;align-items:center;padding:7px 20px;border-bottom:1px solid var(--s-dim);background:var(--s-low);position:sticky;top:0;z-index:5}
.ch-header-row span{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}

/* Chapter row — card-like hover with rounded check */
.ch-row{display:grid;grid-template-columns:36px 28px 1fr 130px 36px;align-items:center;padding:9px 20px;border-bottom:1px solid var(--s-low);transition:background 0.1s;min-height:44px}
.ch-row:hover{background:var(--s-low)}
.ch-num{font-size:10px;color:var(--faint);font-weight:500}

/* Rounded checkbox */
.ch-check{width:18px;height:18px;border:1.5px solid var(--s-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;background:var(--surface);border-radius:5px}
.ch-check:hover{border-color:var(--ink)}
.ch-check.checked{background:var(--ink);border-color:var(--ink);border-radius:5px}
.ch-check .icon{font-size:12px;color:#fff;font-variation-settings:'FILL' 1,'wght' 700}

.ch-name{font-size:13px;padding:0 8px}
.ch-name.done{color:var(--muted);text-decoration:line-through}

/* Revision pills — rounded */
.rev-pills{display:flex;gap:4px}
.rev-pill{font-size:9px;font-weight:600;letter-spacing:0.04em;padding:3px 7px;border:1px solid var(--s-dim);color:var(--muted);line-height:1.4;border-radius:20px}
.rev-pill.done{background:var(--ink);border-color:var(--ink);color:#fff}
.rev-pill.overdue{border-color:var(--err);color:var(--err);background:#fff5f5}
.rev-pill.today{border-color:var(--ink);color:var(--ink);font-weight:700}

/* Note button */
.note-btn{width:30px;height:30px;border:1px solid transparent;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;margin:auto;border-radius:7px}
.note-btn:hover{background:var(--s-mid);border-color:var(--s-dim)}
.note-btn .icon{font-size:16px;color:var(--faint)}
.note-btn.has-note .icon{color:var(--ink);font-variation-settings:'FILL' 1}

/* Note panel — indented */
.note-panel{padding:10px 20px 12px calc(20px + 36px + 28px);background:var(--s-low);border-bottom:1px solid var(--s-dim)}
.note-panel textarea{width:100%;border:1px solid var(--s-dim);background:var(--surface);padding:8px 10px;font-family:'Geist',sans-serif;font-size:13px;resize:vertical;min-height:70px;outline:none;color:var(--ink);border-radius:6px}
.note-panel textarea:focus{border-color:var(--ink)}
.note-actions{display:flex;gap:6px;margin-top:7px}

/* DIFF BADGE */
.diff-badge{font-size:9px;font-weight:700;letter-spacing:0.04em;padding:2px 7px;border:1px solid;line-height:1.4;border-radius:20px}
.diff-badge.easy{border-color:#16a34a;color:#16a34a;background:#f0fdf4}
.diff-badge.medium{border-color:#ea580c;color:#ea580c;background:#fff7ed}
.diff-badge.hard{border-color:#ba1a1a;color:#ba1a1a;background:#fef2f2}

/* REVISION — two-column: calendar left + content right */
.rev-layout{display:flex;width:100%;height:100%;overflow:hidden}
.rev-left{width:272px;flex-shrink:0;border-right:1px solid var(--s-dim);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.rev-left-cal{flex-shrink:0}
.rev-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* DATE DETAIL PANEL — right-side panel, shown only on date click */
.date-detail-overlay{position:absolute;top:0;right:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--s-dim);display:flex;flex-direction:column;z-index:20;box-shadow:-4px 0 20px rgba(0,0,0,0.08);animation:slideInRight 0.18s ease}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.date-detail-head{padding:16px 18px 14px;background:var(--surface);border-bottom:1px solid var(--s-dim);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.date-detail-head-left{}
.date-detail-label{font-family:'Libre Caslon Text',serif;font-size:18px;font-weight:700;margin-bottom:3px;line-height:1.2}
.date-detail-sub{font-size:11px;color:var(--muted);letter-spacing:0.03em}
.date-detail-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;background:var(--ink);color:#fff;font-size:9px;font-weight:700;margin-left:7px;vertical-align:middle;border-radius:20px}
.date-detail-close{width:30px;height:30px;border:1px solid var(--s-dim);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.15s,background 0.15s;border-radius:6px;margin-top:2px}
.date-detail-close:hover{border-color:var(--ink);background:var(--s-low)}
.date-detail-close .icon{font-size:16px;color:var(--muted)}
.date-detail-scroll{flex:1;overflow-y:auto;padding:12px 14px 24px}
/* New full-detail revision cards in the panel */
.ddr-card{background:var(--bg);border:0.5px solid var(--s-dim);border-radius:10px;overflow:hidden;margin-bottom:10px;transition:box-shadow 0.15s}
.ddr-card:last-child{margin-bottom:0}
.ddr-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.07)}
.ddr-card-top{display:flex;align-items:stretch}
.ddr-accent{width:5px;flex-shrink:0}
.ddr-body{flex:1;padding:13px 14px 11px}
.ddr-ch-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
.ddr-subj{font-size:11px;font-weight:600;margin-bottom:6px}
.ddr-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ddr-rev-pill{font-size:9px;font-weight:700;letter-spacing:0.05em;padding:3px 9px;border:1.5px solid var(--s-dim);border-radius:20px;color:var(--muted);background:var(--surface)}
.ddr-rev-pill.done{background:var(--ink);border-color:var(--ink);color:#fff}
.ddr-rev-pill.overdue{border-color:var(--err);color:var(--err);background:#fff5f5}
.ddr-rev-pill.today{border-color:var(--ink);color:var(--ink);background:var(--s-low)}
.ddr-studied{font-size:10px;color:var(--faint)}
.ddr-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--s-low);background:var(--surface)}
.ddr-status-chip{font-size:9px;font-weight:700;letter-spacing:0.05em;padding:3px 9px;border:1.5px solid;border-radius:20px;text-transform:uppercase}
.ddr-status-chip.done{border-color:var(--s-dim);color:var(--faint);background:var(--s-low)}
.ddr-status-chip.overdue{border-color:var(--err);color:var(--err);background:#fff5f5}
.ddr-status-chip.today{border-color:var(--ink);color:var(--ink)}
.ddr-status-chip.upcoming{border-color:var(--s-dim);color:var(--muted)}
.ddr-btn-mark{height:30px;padding:0 14px;border:1.5px solid var(--ink);background:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;transition:background 0.15s,color 0.15s;white-space:nowrap;border-radius:5px}
.ddr-btn-mark:hover{background:var(--ink);color:#fff}
.ddr-btn-undo{height:28px;padding:0 10px;border:1px solid var(--s-dim);background:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;color:var(--muted);transition:border-color 0.15s;white-space:nowrap;border-radius:5px}
.ddr-btn-undo:hover{border-color:var(--ink);color:var(--ink)}
.ddr-empty{padding:40px 16px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.ddr-empty .icon{font-size:36px;margin-bottom:12px;color:var(--s-dim);display:block}
.ddr-empty-title{font-size:13px;font-weight:600;margin-bottom:4px}
.ddr-empty-sub{font-size:11px;color:var(--faint)}
/* Cal hint prompt inside calendar area */
.cal-date-hint{padding:10px 16px;border-top:1px solid var(--s-dim);text-align:center;font-size:10px;color:var(--faint);letter-spacing:0.04em}
.date-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:12px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.date-empty .icon{font-size:32px;margin-bottom:10px;color:var(--s-dim)}

/* TODAY BANNER */
.today-banner{background:var(--err);color:#fff;padding:11px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
.banner-text{flex:1;font-size:13px;font-weight:500;letter-spacing:0.01em}
.banner-btn{border:1.5px solid rgba(255,255,255,0.7);background:none;color:#fff;padding:5px 14px;font-family:'Geist',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:border-color 0.15s,background 0.15s;border-radius:5px}
.banner-btn:hover{border-color:#fff;background:rgba(255,255,255,0.15)}

/* CALENDAR */
.cal-wrap{padding:18px 16px 12px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-family:'Libre Caslon Text',serif;font-size:15px;font-weight:700}
.cal-nav-btn{width:26px;height:26px;border:1px solid var(--s-dim);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s,background 0.15s}
.cal-nav-btn:hover{border-color:var(--ink);background:var(--s-low)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:9px;letter-spacing:0.07em;text-transform:uppercase;color:var(--faint);padding:3px 0 6px;font-weight:600}
.cal-day{height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:12px;color:var(--muted);transition:color 0.1s}
.cal-day:hover .day-num{background:var(--s-mid)}
.cal-day.other-month{opacity:0.25}
.cal-day.has-revs{color:var(--ink)}
.cal-day.is-today .day-num{background:var(--ink);color:#fff;border-radius:50%}
.cal-day.selected:not(.is-today) .day-num{background:var(--c-maths);color:#fff;border-radius:50%;box-shadow:0 2px 8px rgba(37,99,235,0.35)}
.cal-day.is-today.selected .day-num{background:var(--ink);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.25)}
.cal-day.selected{color:var(--ink)}
.day-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.15s,box-shadow 0.15s;font-size:12px;font-weight:500}
.day-dot{width:5px;height:5px;border-radius:50%;position:absolute;bottom:1px}
.day-dot.pending{background:#2563eb}
.day-dot.overdue-dot{background:var(--err)}
.day-dot.done-dot{background:var(--s-dim)}
.cal-today-btn{width:100%;margin-top:10px;padding:7px;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;background:none;border:1px solid var(--s-dim);cursor:pointer;transition:border-color 0.15s,background 0.15s;color:var(--muted)}
.cal-today-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--s-low)}

/* STATS BAR — polished 4-column stat cards */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--s-dim);background:var(--bg);flex-shrink:0;padding:12px 16px;gap:10px}
.stat-cell{padding:12px 14px;border:0.5px solid var(--s-dim);display:flex;flex-direction:column;gap:4px;background:var(--surface);border-radius:8px;border-left:3px solid var(--s-dim)}
.stat-cell:first-child{border-left-color:var(--c-maths)}
.stat-cell:nth-child(2){border-left-color:var(--err)}
.stat-cell:nth-child(3){border-left-color:#16a34a}
.stat-cell:nth-child(4){border-left-color:var(--c-inorganic)}
.stat-big{font-family:'Libre Caslon Text',serif;font-size:28px;font-weight:700;line-height:1}
.stat-big.red{color:var(--err)}
.stat-cell-lbl{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.stat-cell-sub{font-size:10px;color:var(--faint)}

/* FILTER TABS — polished */
.filter-bar{display:flex;border-bottom:1px solid var(--s-dim);background:var(--surface);overflow-x:auto;flex-shrink:0;padding:0 8px}
.filter-btn{display:flex;align-items:center;gap:5px;padding:11px 16px;background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:color 0.15s,border-color 0.15s;position:relative}
.filter-btn.active{color:var(--ink);border-bottom-color:var(--ink)}
.filter-btn:hover:not(.active){color:var(--ink)}
.filter-count{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;font-size:9px;font-weight:700;background:var(--s-high);color:var(--muted);border-radius:20px;letter-spacing:0}
.filter-count.urgent{background:var(--err);color:#fff}

/* REVISION LIST */
.rev-list{flex:1;overflow-y:auto;padding:0 0 40px}
.rev-group-header{padding:10px 20px;background:var(--s-low);border-bottom:1px solid var(--s-dim);border-top:1px solid var(--s-dim);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.rev-group-date{font-size:12px;font-weight:700;letter-spacing:0.03em}
.rev-group-date.overdue{color:var(--err)}
.rev-group-meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px}
.rev-group-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:var(--s-dim);font-size:9px;font-weight:700;color:var(--muted);border-radius:20px}

/* REVISION ROW — polished */
.rev-row{display:flex;align-items:stretch;border-bottom:1px solid var(--s-low);background:var(--surface);transition:background 0.1s}
.rev-row:hover{background:var(--s-low)}
.rev-row-accent{width:4px;flex-shrink:0}
.rev-row-body{flex:1;padding:13px 16px;display:flex;align-items:center;gap:14px;min-width:0}
.rev-ch-name{font-size:13px;font-weight:600;line-height:1.3}
.rev-ch-sub{font-size:11px;color:var(--faint);margin-top:2px}
.rev-row-right{display:flex;align-items:center;gap:8px;padding:13px 16px 13px 0;flex-shrink:0}
.rev-type-badge{font-size:9px;font-weight:600;letter-spacing:0.04em;color:var(--muted);background:var(--s-low);border:0.5px solid var(--s-dim);padding:3px 8px;white-space:nowrap;border-radius:20px}
.status-chip{font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border:1.5px solid;white-space:nowrap;border-radius:20px}
.status-chip.done{border-color:var(--s-dim);color:var(--faint);background:var(--s-low)}
.status-chip.overdue{border-color:var(--err);color:var(--err);background:#fff5f5}
.status-chip.today{border-color:var(--ink);color:var(--ink);background:var(--s-low)}
.status-chip.upcoming{border-color:var(--s-dim);color:var(--muted)}
.btn-mark{height:30px;padding:0 14px;border:1.5px solid var(--ink);background:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;transition:background 0.15s,color 0.15s;white-space:nowrap;border-radius:5px}
.btn-mark:hover{background:var(--ink);color:#fff}
.btn-undo{height:28px;padding:0 10px;border:1px solid var(--s-dim);background:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;color:var(--muted);transition:border-color 0.15s;white-space:nowrap;border-radius:5px}
.btn-undo:hover{border-color:var(--ink);color:var(--ink)}

/* CHAPTER CARD (All view) — polished */
.ch-card{border:0.5px solid var(--s-dim);margin:8px 16px;background:var(--surface);transition:box-shadow 0.15s;border-radius:8px;overflow:hidden}
.ch-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.ch-card-header{display:flex;align-items:center;cursor:pointer;transition:background 0.1s}
.ch-card-header:hover{background:var(--s-low)}
.ch-card-accent{width:4px;align-self:stretch;flex-shrink:0}
.ch-card-info{flex:1;padding:12px 14px}
.ch-card-name{font-size:13px;font-weight:600;line-height:1.3}
.ch-card-sub{font-size:11px;color:var(--faint);margin-top:2px}
.ch-card-mini{display:flex;gap:6px;margin-top:7px;align-items:center;flex-wrap:wrap}
.ch-card-expand{padding:0 14px;color:var(--muted);display:flex;align-items:center}
.ch-card-rows{border-top:1px solid var(--s-low)}

/* PIPELINE */
.pipeline-ch{padding:12px 20px;border-bottom:1px solid var(--s-low)}
.pipeline-name{font-size:13px;font-weight:600;margin-bottom:10px}
.pipeline-flow{display:flex;align-items:stretch;gap:0}
.pipeline-step{flex:1;padding:10px;border:1px solid var(--s-dim);text-align:center;position:relative;border-radius:6px;margin:0 2px}
.pipeline-step.done{background:var(--ink);border-color:var(--ink);color:#fff}
.pipeline-step.overdue{border-color:var(--err);color:var(--err);background:#fff5f5}
.pipeline-step.today{border-color:var(--ink);background:var(--s-low)}
.pipeline-step-lbl{font-size:11px;font-weight:700}
.pipeline-step-date{font-size:10px;color:var(--muted);margin-top:3px}
.pipeline-step.done .pipeline-step-date{color:rgba(255,255,255,0.7)}
.pipeline-arrow{padding:0 2px;color:var(--s-dim);font-size:18px;display:flex;align-items:center}

/* SUBJECT GROUP */
.subj-group-header{padding:12px 24px;border-bottom:1px solid var(--s-dim);background:var(--s-low);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:4}
.subj-group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.subj-group-name{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.subj-group-count{margin-left:auto;font-size:10px;color:var(--muted)}

/* DONE GROUP */
.done-section{margin-bottom:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:500}
.modal{background:var(--surface);border:1px solid var(--ink);padding:28px 24px;width:100%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h3{font-family:'Libre Caslon Text',serif;font-size:18px;font-weight:700;margin-bottom:6px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-btns{display:flex;gap:8px;margin-bottom:12px}
.diff-btn{flex:1;padding:10px 8px;border:2px solid;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:none;transition:background 0.15s,color 0.15s}
.diff-btn.easy{border-color:#16a34a;color:#16a34a}
.diff-btn.easy:hover{background:#16a34a;color:#fff}
.diff-btn.medium{border-color:#ea580c;color:#ea580c}
.diff-btn.medium:hover{background:#ea580c;color:#fff}
.diff-btn.hard{border-color:#ba1a1a;color:#ba1a1a}
.diff-btn.hard:hover{background:#ba1a1a;color:#fff}
.skip-link{display:block;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;padding:4px;text-decoration:underline}
.skip-link:hover{color:var(--ink)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--on-ink);padding:10px 18px;display:flex;align-items:center;gap:9px;font-size:12px;font-weight:500;z-index:1000;animation:slideUp 0.25s ease;box-shadow:0 4px 20px rgba(0,0,0,0.25);white-space:nowrap;border-radius:8px;border:1px solid rgba(255,255,255,0.08);letter-spacing:0.01em}
.toast .icon{font-size:16px;flex-shrink:0;opacity:0.9}
[data-theme="dark"] .toast{background:#f0f0f0;color:#0d0d0d;border:1px solid rgba(0,0,0,0.06);box-shadow:0 4px 24px rgba(0,0,0,0.5)}
[data-theme="dark"] .toast .icon{color:#0d0d0d}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* FLOATING CALENDAR */
.float-cal{position:absolute;top:52px;right:8px;background:var(--surface);border:1px solid var(--ink);width:280px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.float-cal-body{padding:12px}
.float-cal-footer{border-top:1px solid var(--s-dim);padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.float-cal-today{font-size:11px;color:var(--muted)}
.float-cal-link{background:none;border:1px solid var(--s-dim);padding:4px 10px;font-family:'Geist',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:border-color 0.15s;color:var(--ink)}
.float-cal-link:hover{border-color:var(--ink)}

/* LOADING */
.loading-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)}
.spinner{width:24px;height:24px;border:2px solid var(--s-dim);border-top-color:var(--ink);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SEARCH RESULTS */
.search-divider{padding:6px 20px 4px;background:var(--s-low);border-bottom:1px solid var(--s-dim)}
.search-divider span{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.search-empty{padding:40px 20px;text-align:center;color:var(--muted)}
.search-empty .icon{font-size:32px;margin-bottom:8px;display:block}

/* RESPONSIVE */
@media(max-width:960px){
  .syl-sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--ink)}
  .syl-layout{flex-direction:column}
  .rev-left{width:240px}
}
@media(max-width:700px){
  .rev-left{display:none}
  .rev-right{width:100%}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .con-stats{grid-template-columns:repeat(3,1fr)}
}

/* ===================== CONSISTENCY TRACKER ===================== */
.con-layout{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden;background:var(--bg)}

/* TOP BAR */
.con-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid var(--s-dim);background:var(--surface);flex-shrink:0;gap:16px}
.con-title{font-family:'Libre Caslon Text',serif;font-size:15px;font-weight:700;line-height:1}
.con-subtitle{font-size:10px;color:var(--faint);margin-top:1px;letter-spacing:0.01em}
.con-date-controls{display:flex;align-items:center;gap:6px}
.con-date-field{display:flex;flex-direction:column;gap:2px}
.con-date-sep{font-size:13px;color:var(--s-high);line-height:1;padding:0 2px;margin-top:10px}
.con-exam-label{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint)}
.con-exam-input{height:28px;border:1px solid var(--s-dim);background:var(--s-low);padding:0 7px;font-family:'Geist',sans-serif;font-size:11px;color:var(--ink);outline:none;transition:border-color 0.15s;width:132px;border-radius:5px}
.con-exam-input:focus{border-color:var(--ink);background:var(--surface)}

/* STATS STRIP */
.con-stats{display:grid;grid-template-columns:repeat(6,1fr);background:var(--surface);flex-shrink:0;border-bottom:1px solid var(--s-dim);padding:10px 16px;gap:8px}
.con-stat{padding:11px 14px;display:flex;flex-direction:column;gap:3px;border:0.5px solid var(--s-dim);border-radius:8px;background:var(--bg);position:relative;overflow:hidden}
.con-stat-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0}
.con-stat-num{font-family:'Libre Caslon Text',serif;font-size:22px;font-weight:700;line-height:1.1}
.con-stat-lbl{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.con-stat-bar{height:2px;background:var(--s-dim);border-radius:2px;margin-top:5px;overflow:hidden}
.con-stat-bar-fill{height:100%;border-radius:2px;transition:width 0.4s}

/* BODY */
.con-body{flex:1;overflow-y:auto;min-height:0}

/* COUNTDOWN SECTION */
.con-countdown-section{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;border-bottom:1px solid var(--s-dim);background:var(--surface);flex-shrink:0;gap:10px}
.con-countdown-range{font-size:11px;color:var(--faint);letter-spacing:0.02em}
.con-countdown-units{display:flex;align-items:flex-end;gap:2px}
.flip-unit{display:flex;flex-direction:column;align-items:center;gap:4px}
.flip-num{font-family:'Libre Caslon Text',serif;font-size:52px;font-weight:700;line-height:1;min-width:80px;text-align:center;background:var(--ink);color:var(--on-ink);padding:8px 12px;border-radius:6px;letter-spacing:-0.02em}
.flip-label{font-size:8px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
.flip-sep{font-family:'Libre Caslon Text',serif;font-size:40px;font-weight:700;line-height:1;padding:0 4px 12px;color:var(--s-high);align-self:flex-end}
.con-no-exam{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 24px;background:var(--s-low);border-bottom:1px solid var(--s-dim);font-size:11px;color:var(--faint)}
.con-no-exam .icon{font-size:16px;color:var(--s-high)}

/* LOWER SECTION — full width, no side panel */
.con-lower{display:flex;flex-direction:column;padding:16px 24px;gap:0}
.con-heatmap-col{display:flex;flex-direction:column}

/* Week section — full width below heatmap */
.con-week-section{margin-top:20px;background:var(--surface);border:0.5px solid var(--s-dim);border-radius:8px;padding:16px}
.con-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

/* Gap chips row */
.con-gaps-strip{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:12px}
.con-gaps-strip-label{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.con-gap-chip{display:flex;align-items:center;gap:5px;padding:5px 9px;background:rgba(220,38,38,0.06);border:0.5px solid rgba(220,38,38,0.3);border-radius:20px;font-size:10px;color:var(--err);font-weight:500}
[data-theme="dark"] .con-gap-chip{background:rgba(220,38,38,0.12)}
.con-gap-chip .icon{font-size:12px;flex-shrink:0}

/* HEATMAP */
.con-heatmap-section{display:flex;flex-direction:column;height:100%}
.con-section-title{font-size:8px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.con-heatmap-legend{display:flex;align-items:center;gap:8px}
.con-legend-item{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--faint)}
.con-legend-dot{width:9px;height:9px;flex-shrink:0;border-radius:2px}
.heatmap-outer{overflow-x:auto;overflow-y:hidden}
.heatmap-container{display:flex;gap:3px;align-items:flex-start}
.heatmap-dow-labels{display:flex;flex-direction:column;gap:3px;padding-top:20px;flex-shrink:0}
.heatmap-dow-label{height:14px;width:11px;font-size:8px;font-weight:600;color:var(--faint);display:flex;align-items:center;justify-content:center}
.heatmap-col{display:flex;flex-direction:column;gap:3px;align-items:center}
.heatmap-month-label{font-size:8px;font-weight:600;letter-spacing:0.04em;color:var(--muted);height:18px;display:flex;align-items:center;white-space:nowrap}
.heatmap-cell{width:14px;height:14px;cursor:pointer;border:1px solid transparent;transition:border-color 0.1s,transform 0.1s;flex-shrink:0;border-radius:3px}
.heatmap-cell:hover{border-color:var(--ink);transform:scale(1.25);z-index:10}
.heatmap-cell.future{cursor:default;opacity:0.25}
.heatmap-cell.future:hover{border-color:transparent;transform:none}
.heatmap-cell.today-cell{outline:2px solid var(--ink);outline-offset:1px}
.heatmap-cell[data-status="studied"]{background:var(--ink)}
.heatmap-cell[data-status="missed"]{background:var(--err)}
.heatmap-cell[data-status="none"]{background:var(--s-high)}

/* Heatmap popup */
.heatmap-popup{position:fixed;z-index:300;background:var(--surface);border:1px solid var(--s-dim);box-shadow:0 6px 24px rgba(0,0,0,0.1);padding:0;min-width:148px;border-radius:8px;overflow:hidden}
.heatmap-popup-date{padding:9px 13px;font-size:11px;font-weight:600;border-bottom:1px solid var(--s-dim);color:var(--ink);background:var(--s-low)}
.heatmap-popup-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 13px;background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:12px;font-weight:500;text-align:left;transition:background 0.1s;color:var(--ink)}
.heatmap-popup-btn:hover{background:var(--s-low)}
.heatmap-popup-dot{width:9px;height:9px;flex-shrink:0;border-radius:2px}

/* SIDE PANEL — borderless sections */
.con-side-section{padding:16px 16px 14px;border-bottom:1px solid var(--s-dim)}
.con-side-section:last-child{border-bottom:none}
.con-side-sec-title{font-size:8px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.con-side-sec-sub{font-size:9px;color:var(--faint);font-weight:400;letter-spacing:0;text-transform:none}

/* This Week grid */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-day{display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;border:0.5px solid var(--s-dim);cursor:pointer;transition:background 0.1s,border-color 0.1s;background:var(--bg);gap:3px;border-radius:8px}
.week-day:hover:not(.week-future){background:var(--s-low);border-color:var(--ink)}
.week-day.week-future{cursor:default;opacity:0.4}
.week-day[data-status="studied"]{background:var(--ink);border-color:var(--ink);color:var(--on-ink)}
.week-day[data-status="missed"]{border-color:var(--err);background:#fff5f5}
.week-day-name{font-size:8px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;opacity:0.6}
.week-day-date{font-size:16px;font-weight:700;line-height:1}
.week-day-marker{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;border-radius:50%;margin-top:1px}
.week-day[data-status="missed"] .week-day-marker{background:var(--err);color:#fff}
.week-day[data-status="studied"] .week-day-marker{background:rgba(255,255,255,0.18);color:#fff}
.week-day-status-lbl{font-size:7px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;opacity:0.55}

/* Gap warnings */
.gap-warning{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.2);margin-bottom:5px;border-radius:6px}
.gap-warning:last-child{margin-bottom:0}
.gap-warning .icon{color:var(--err);font-size:14px;flex-shrink:0;margin-top:1px}
.gap-warning-text{font-size:10px;color:var(--err);font-weight:500;line-height:1.4}

/* How to use */
.con-howto-text{font-size:11px;color:var(--faint);line-height:1.65}

/* Study Hours Popup Modal */
.sh-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:600}
.sh-modal{background:var(--surface);border:1px solid var(--ink);padding:28px 26px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,0.18);border-radius:4px}
.sh-modal-title{font-family:'Libre Caslon Text',serif;font-size:19px;font-weight:700;margin-bottom:4px}
.sh-modal-sub{font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.sh-hours-wrap{display:flex;align-items:center;border:1px solid var(--s-dim);background:var(--surface);border-radius:8px;overflow:hidden;margin-bottom:14px;transition:border-color 0.15s}
.sh-hours-wrap:focus-within{border-color:var(--ink)}
.sh-stepper{width:44px;height:52px;border:none;background:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background 0.1s;color:var(--ink)}
.sh-stepper:hover{background:var(--s-low)}
.sh-hours-input{flex:1;height:52px;border:none;border-left:1px solid var(--s-dim);border-right:1px solid var(--s-dim);background:transparent;text-align:center;font-family:'Libre Caslon Text',serif;font-size:32px;font-weight:700;color:var(--ink);outline:none;-moz-appearance:textfield;appearance:textfield}
.sh-hours-input::-webkit-outer-spin-button,.sh-hours-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sh-presets{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.sh-preset{flex:1;min-width:36px;padding:5px 4px;background:var(--s-low);border:0.5px solid var(--s-dim);border-radius:20px;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;color:var(--muted);transition:all 0.12s;text-align:center}
.sh-preset:hover{border-color:var(--ink);color:var(--ink);background:var(--s-mid)}
.sh-modal-btns{display:flex;gap:8px}
.sh-modal-save{flex:1;height:40px;background:var(--ink);color:var(--on-ink);border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border-radius:6px}
.sh-modal-skip{height:40px;padding:0 16px;background:none;border:1px solid var(--s-dim);cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:500;color:var(--muted);border-radius:6px;transition:border-color 0.15s}
.sh-modal-skip:hover{border-color:var(--ink);color:var(--ink)}

/* ===================== STUDY HOURS ANALYSIS ===================== */
.sh-layout{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden;background:var(--bg)}
.sh-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--s-dim);background:var(--surface);flex-shrink:0;gap:12px;flex-wrap:wrap}
.sh-topbar-left{display:flex;flex-direction:column;gap:2px}
.sh-title{font-family:'Libre Caslon Text',serif;font-size:18px;font-weight:700;line-height:1}
.sh-subtitle{font-size:10px;color:var(--muted);letter-spacing:0.02em}
.sh-topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sh-settings-btn{display:flex;align-items:center;gap:6px;height:32px;padding:0 12px;border:1px solid var(--s-dim);background:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);border-radius:6px;transition:all 0.15s}
.sh-settings-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--s-low)}
.sh-settings-btn .icon{font-size:15px}

/* Stats strip */
.sh-stats{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--s-dim);padding:10px 14px;gap:8px}
.sh-stat{padding:10px 12px;border:0.5px solid var(--s-dim);display:flex;flex-direction:column;gap:2px;background:var(--surface);border-radius:8px}
.sh-stat:first-child{border-left:3px solid var(--c-maths)}
.sh-stat:nth-child(2){border-left:3px solid #16a34a}
.sh-stat:nth-child(3){border-left:3px solid var(--c-physical)}
.sh-stat:nth-child(4){border-left:3px solid var(--c-inorganic)}
.sh-stat:last-child{border-left:3px solid var(--c-physics)}
.sh-stat-num{font-family:'Libre Caslon Text',serif;font-size:22px;font-weight:700;line-height:1}
.sh-stat-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}

/* Body */
.sh-body{flex:1;overflow-y:auto;padding:16px 20px 40px;display:flex;flex-direction:column;gap:16px;min-height:0}

/* Heatmap card */
.sh-heatmap-card{background:var(--surface);border:0.5px solid var(--s-dim);border-radius:10px;padding:16px}
.sh-heatmap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-hm-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px}
.sh-hm-legend{display:flex;align-items:center;gap:8px}
.sh-hm-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.sh-hm-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Charts card */
.sh-chart-card{background:var(--surface);border:0.5px solid var(--s-dim);border-radius:10px;padding:16px}
.sh-chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-chart-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.sh-chart-tabs{display:flex;gap:4px}
.sh-chart-tab{padding:4px 10px;border:0.5px solid var(--s-dim);border-radius:20px;cursor:pointer;font-family:'Geist',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);background:var(--bg);transition:all 0.15s}
.sh-chart-tab.active{background:var(--ink);border-color:var(--ink);color:#fff}
.sh-chart-tab:hover:not(.active){border-color:var(--ink);color:var(--ink)}
.sh-chart-canvas-wrap{position:relative;height:200px;width:100%}

/* Settings modal */
.sh-sett-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:600}
.sh-sett-modal{background:var(--surface);border:1px solid var(--ink);padding:28px 26px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.18);border-radius:4px}
.sh-sett-title{font-family:'Libre Caslon Text',serif;font-size:18px;font-weight:700;margin-bottom:4px}
.sh-sett-sub{font-size:11px;color:var(--muted);margin-bottom:20px}
.sh-sett-field{margin-bottom:16px}
.sh-sett-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.sh-target-wrap{display:flex;align-items:center;border:1px solid var(--s-dim);border-radius:8px;overflow:hidden;background:var(--surface);transition:border-color 0.15s;width:160px}
.sh-target-wrap:focus-within{border-color:var(--ink)}
.sh-target-btn{width:36px;height:40px;border:none;background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background 0.1s;color:var(--ink)}
.sh-target-btn:hover{background:var(--s-low)}
.sh-target-input{flex:1;height:40px;border:none;border-left:1px solid var(--s-dim);border-right:1px solid var(--s-dim);background:transparent;text-align:center;font-family:'Libre Caslon Text',serif;font-size:22px;font-weight:700;color:var(--ink);outline:none}
.sh-color-row{display:flex;gap:12px;flex-wrap:wrap}
.sh-color-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:100px}
.sh-color-field label{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.sh-color-input{width:100%;height:36px;border:1px solid var(--s-dim);padding:2px;border-radius:6px;cursor:pointer;background:var(--s-low)}
.sh-sett-save{width:100%;height:40px;background:var(--ink);color:var(--on-ink);border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;border-radius:6px;margin-top:8px}
.sh-sett-cancel{width:100%;height:36px;background:none;border:1px solid var(--s-dim);cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:500;color:var(--muted);border-radius:6px;margin-top:6px;transition:border-color 0.15s}
.sh-sett-cancel:hover{border-color:var(--ink);color:var(--ink)}

/* Log entry row for hours */
.sh-log-card{background:var(--surface);border:0.5px solid var(--s-dim);border-radius:10px;overflow:hidden}
.sh-log-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--s-dim)}
.sh-log-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.sh-log-list{max-height:260px;overflow-y:auto}
.sh-log-row{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--s-low);transition:background 0.1s}
.sh-log-row:hover{background:var(--s-low)}
.sh-log-row:last-child{border-bottom:none}
.sh-log-hours{font-family:'Libre Caslon Text',serif;font-size:22px;font-weight:700;min-width:44px;line-height:1}
.sh-log-info{flex:1}
.sh-log-date{font-size:12px;font-weight:600}
.sh-log-meta{font-size:10px;color:var(--muted);margin-top:1px}
.sh-log-bar-wrap{flex:1;height:4px;background:var(--s-dim);border-radius:3px;overflow:hidden}
.sh-log-bar{height:100%;border-radius:3px;transition:width 0.3s}
.sh-log-del{width:26px;height:26px;border:0.5px solid var(--s-dim);border-radius:5px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.1s}
.sh-log-del:hover{border-color:var(--err)}
.sh-log-del:hover .icon{color:var(--err)}
.sh-log-del .icon{font-size:13px;color:var(--muted)}
.sh-empty{padding:40px 24px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center}
.sh-empty .icon{font-size:32px;margin-bottom:10px;color:var(--s-dim)}

/* ===================== QUESTION COUNTER ===================== */
.qc-layout{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden;background:var(--bg)}
/* Hero */
.qc-hero-bar{background:var(--surface);border-bottom:1px solid var(--s-dim);flex-shrink:0;padding:16px 24px 0}
.qc-hero-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;gap:24px;flex-wrap:wrap}
.qc-hero-left{}
.qc-total-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.qc-total{font-family:'Libre Caslon Text',serif;font-size:56px;font-weight:700;line-height:1;letter-spacing:-0.02em}
.qc-total-sub{font-size:11px;color:var(--muted);margin-top:4px}
.qc-type-legend{display:flex;gap:8px;align-items:stretch;padding-bottom:4px;flex-wrap:wrap}
.qc-type-item{display:flex;flex-direction:column;gap:2px;padding:8px 14px;border:0.5px solid var(--s-dim);border-radius:8px;background:var(--bg);min-width:80px}
.qc-type-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-bottom:2px}
.qc-type-name{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.qc-type-num{font-family:'Libre Caslon Text',serif;font-size:20px;font-weight:700;line-height:1;color:var(--ink)}
.qc-subjects{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--s-dim);background:var(--bg);padding:10px 12px;gap:8px}
.qc-subj-cell{padding:10px 12px;border:0.5px solid var(--s-dim);border-radius:8px;display:flex;flex-direction:column;gap:5px;background:var(--surface)}
.qc-subj-label{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.qc-subj-num{font-family:'Libre Caslon Text',serif;font-size:20px;font-weight:700;line-height:1}
.qc-subj-pct{font-size:9px;color:var(--faint)}
.qc-subj-bar-wrap{height:3px;background:var(--s-dim);border-radius:3px;overflow:hidden}
.qc-subj-bar{height:100%;transition:width 0.4s;border-radius:3px}
/* Body */
.qc-body{flex:1;display:flex;overflow:hidden;min-height:0}
.qc-left{width:300px;flex-shrink:0;border-right:1px solid var(--s-dim);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.qc-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* Left panel tabs */
.qc-left-tabs{display:flex;border-bottom:1px solid var(--s-dim);flex-shrink:0}
.qc-left-tab{flex:1;height:38px;border:none;background:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.qc-left-tab.active{color:var(--ink);border-bottom-color:var(--ink)}
.qc-left-tab:hover:not(.active){color:var(--ink)}
.qc-left-tab .icon{font-size:14px}
/* Log form — scrollable content area + sticky footer */
.qc-form{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.qc-form-scroll{padding:14px 16px 10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:0;min-height:0}
.qc-form-footer{padding:12px 16px;border-top:1px solid var(--s-dim);background:var(--surface);flex-shrink:0}
.qc-form-section{margin-bottom:14px}
.qc-form-section-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block}
.qc-count-wrap{display:flex;align-items:center;border:1px solid var(--s-dim);background:var(--surface);border-radius:8px;overflow:hidden;transition:border-color 0.15s}
.qc-count-wrap:focus-within{border-color:var(--ink)}
.qc-stepper{width:40px;height:46px;border:none;background:none;cursor:pointer;font-size:20px;font-family:'Geist',sans-serif;display:flex;align-items:center;justify-content:center;transition:background 0.1s;color:var(--ink);flex-shrink:0}
.qc-stepper:hover{background:var(--s-low)}
.qc-count-input{flex:1;height:46px;border:none;border-left:1px solid var(--s-dim);border-right:1px solid var(--s-dim);background:transparent;text-align:center;font-family:'Libre Caslon Text',serif;font-size:28px;font-weight:700;color:var(--ink);outline:none}
.qc-presets{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.qc-preset{flex:1;min-width:36px;padding:6px 4px;background:var(--s-low);border:0.5px solid var(--s-dim);border-radius:20px;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.04em;color:var(--muted);transition:all 0.12s;text-align:center}
.qc-preset:hover{border-color:var(--ink);color:var(--ink)}
.qc-chip-grid{display:flex;gap:5px;flex-wrap:wrap}
.qc-chip{padding:6px 10px;background:var(--s-low);border:0.5px solid var(--s-dim);border-radius:20px;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);transition:all 0.15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.qc-chip:hover{border-color:var(--ink);color:var(--ink)}
.qc-chip.selected{color:#fff}
.qc-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.qc-log-btn{width:100%;height:42px;background:var(--ink);color:var(--on-ink);border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:8px}
.qc-log-btn:disabled{opacity:0.35;cursor:not-allowed}
/* Settings panel */
.qc-settings{padding:14px 16px;overflow-y:auto;flex:1}
.qc-settings-section{margin-bottom:18px}
.qc-settings-head{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.qc-type-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--s-dim);border-radius:8px;background:var(--bg);margin-bottom:6px}
.qc-type-row-swatch{width:28px;height:28px;border-radius:6px;border:2px solid var(--s-dim);position:relative;overflow:hidden;cursor:pointer;flex-shrink:0;transition:border-color 0.15s}
.qc-type-row-swatch:hover{border-color:var(--ink)}
.qc-type-row-swatch input[type="color"]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);opacity:0;cursor:pointer}
.qc-type-row-name{flex:1;font-size:12px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qc-type-row-del{width:26px;height:26px;border:0.5px solid var(--s-dim);border-radius:5px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s}
.qc-type-row-del:hover{border-color:var(--err)}
.qc-type-row-del:hover .icon{color:var(--err)}
.qc-type-row-del .icon{font-size:13px;color:var(--muted)}
.qc-default-badge{font-size:8px;font-weight:700;letter-spacing:0.06em;padding:2px 6px;border:0.5px solid var(--s-dim);border-radius:10px;color:var(--faint);white-space:nowrap;flex-shrink:0}
.qc-add-type-form{display:flex;gap:6px;align-items:center;margin-top:4px}
.qc-add-type-input{flex:1;height:34px;border:1px solid var(--s-dim);background:var(--s-low);padding:0 10px;font-family:'Geist',sans-serif;font-size:12px;color:var(--ink);outline:none;border-radius:7px;transition:border-color 0.15s}
.qc-add-type-input:focus{border-color:var(--ink);background:var(--surface)}
.qc-add-type-swatch{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--s-dim);position:relative;overflow:hidden;cursor:pointer;flex-shrink:0;transition:border-color 0.15s}
.qc-add-type-swatch:hover{border-color:var(--ink)}
.qc-add-type-swatch input[type="color"]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);opacity:0;cursor:pointer}
.qc-add-type-btn{height:34px;padding:0 12px;background:var(--ink);color:var(--on-ink);border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border-radius:7px;transition:opacity 0.15s;white-space:nowrap}
.qc-add-type-btn:disabled{opacity:0.35;cursor:not-allowed}
/* History */
.qc-history{flex:1;overflow-y:auto;padding:0 0 40px}
.qc-history-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--s-dim);position:sticky;top:0;background:var(--surface);z-index:5}
.qc-history-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.qc-entry{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--s-low);transition:background 0.1s}
.qc-entry:hover{background:var(--s-low)}
.qc-entry-left{display:flex;flex-direction:column;align-items:center;min-width:52px;gap:2px}
.qc-entry-count{font-family:'Libre Caslon Text',serif;font-size:26px;font-weight:700;line-height:1}
.qc-entry-count-lbl{font-size:8px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint)}
.qc-entry-info{flex:1;min-width:0}
.qc-entry-subj{font-size:13px;font-weight:600}
.qc-entry-meta{font-size:10px;color:var(--muted);margin-top:2px}
.qc-entry-badge{font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 9px;border:1.5px solid;text-transform:uppercase;border-radius:20px;white-space:nowrap;flex-shrink:0}
.qc-del-btn{width:28px;height:28px;border:0.5px solid var(--s-dim);border-radius:6px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;flex-shrink:0}
.qc-del-btn:hover{border-color:var(--err)}
.qc-del-btn .icon{font-size:15px;color:var(--muted)}
.qc-del-btn:hover .icon{color:var(--err)}
.qc-empty{padding:48px 20px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:10px;font-size:12px;line-height:1.6}
.qc-empty .icon{font-size:36px;color:var(--s-dim)}

/* ===================== MOCK ANALYSIS ===================== */
.ma-layout{display:flex;width:100%;height:100%;overflow:hidden;background:var(--bg)}
.ma-left{width:300px;flex-shrink:0;border-right:1px solid var(--s-dim);background:var(--surface);display:flex;flex-direction:column;overflow-y:auto}
.ma-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ma-form-header{padding:14px 18px 12px;border-bottom:1px solid var(--s-dim);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.ma-form-header-left{}
.ma-form-header-title{font-family:'Libre Caslon Text',serif;font-size:16px;font-weight:700;margin-bottom:2px}
.ma-form-header-sub{font-size:10px;color:var(--muted)}
.ma-settings-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;background:none;border:1px solid var(--s-dim);border-radius:6px;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);transition:all 0.15s;flex-shrink:0}
.ma-settings-btn:hover{border-color:var(--ink);color:var(--ink)}
.ma-settings-btn .icon{font-size:14px}
.ma-form{padding:16px 18px}
.ma-form-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--s-dim)}
.ma-field{margin-bottom:12px}
.ma-field label{display:block;font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.ma-field input,.ma-field textarea{width:100%;border:1px solid var(--s-dim);background:var(--s-low);padding:0 10px;font-family:'Geist',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color 0.15s;height:36px;border-radius:6px}
.ma-field textarea{height:60px;padding:8px 10px;resize:vertical;border-radius:6px}
.ma-field input:focus,.ma-field textarea:focus{border-color:var(--ink);background:var(--surface)}
.ma-type-btns{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.ma-type-btn{flex:1;min-width:0;padding:6px 6px;background:var(--s-low);border:1.5px solid var(--s-dim);border-radius:20px;cursor:pointer;font-family:'Geist',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);transition:all 0.15s;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ma-type-btn:hover{color:var(--ink);background:var(--s-mid)}
.ma-type-btn.active{color:#fff}
.ma-scores-section-lbl{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ma-scores-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.ma-score-field{display:flex;flex-direction:column;gap:4px;background:var(--s-low);border-radius:8px;padding:10px;align-items:center}
.ma-score-label{font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);text-align:center}
.ma-score-input{height:40px;border:1px solid var(--s-dim);background:var(--surface);padding:0 8px;font-family:'Libre Caslon Text',serif;font-size:18px;font-weight:700;color:var(--ink);outline:none;width:100%;transition:border-color 0.15s;border-radius:6px;text-align:center}
.ma-score-input:focus{border-color:var(--ink)}
.ma-live-total{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--ink);border-radius:8px;margin-bottom:12px}
.ma-live-num{font-family:'Libre Caslon Text',serif;font-size:20px;font-weight:700;color:#fff}
.ma-live-label{font-size:9px;color:#888;letter-spacing:0.06em;text-transform:uppercase}
.ma-live-pct{font-size:22px;font-family:'Libre Caslon Text',serif;font-weight:700;color:#639922}
.ma-submit-btn{width:100%;height:40px;background:var(--ink);color:var(--on-ink);border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:6px;margin-top:4px}
.ma-submit-btn:disabled{opacity:0.35;cursor:not-allowed}
.ma-divider{height:1px;background:var(--s-dim);margin:0}
.ma-stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 20px;border-bottom:1px solid var(--s-dim);background:var(--bg);flex-shrink:0}
.ma-stat{background:var(--surface);border:0.5px solid var(--s-dim);border-radius:8px;padding:12px 14px;border-left:3px solid var(--s-dim);display:flex;flex-direction:column;gap:3px}
.ma-stat:nth-child(1){border-left-color:var(--c-maths)}
.ma-stat:nth-child(2){border-left-color:#16a34a}
.ma-stat:nth-child(3){border-left-color:#ea580c}
.ma-stat:nth-child(4){border-left-color:var(--c-inorganic)}
.ma-stat-num{font-family:'Libre Caslon Text',serif;font-size:24px;font-weight:700;line-height:1}
.ma-stat-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.ma-right-tabs{display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--s-dim);background:var(--surface);flex-shrink:0;gap:0}
.ma-right-tab{display:flex;align-items:center;gap:6px;padding:12px 16px 12px;background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;margin-bottom:-1px}
.ma-right-tab.active{color:var(--ink);border-bottom-color:var(--ink)}
.ma-right-tab:hover:not(.active){color:var(--ink)}
.ma-right-tab .icon{font-size:15px}
.ma-right-tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;font-size:9px;font-weight:700;background:var(--s-high);color:var(--muted);border-radius:20px;letter-spacing:0}
.ma-analytics-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.ma-subj-perf{padding:14px 20px;border-bottom:1px solid var(--s-dim);background:var(--surface);flex-shrink:0}
.ma-subj-perf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:9px;border-bottom:0.5px solid var(--s-dim)}
.ma-subj-perf-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.ma-subj-view-toggle{display:flex;gap:3px}
.ma-subj-view-btn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:0.5px solid var(--s-dim);background:none;border-radius:6px;cursor:pointer;transition:all 0.15s;color:var(--muted)}
.ma-subj-view-btn .icon{font-size:14px}
.ma-subj-view-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.ma-subj-view-btn:hover:not(.active){border-color:var(--ink);color:var(--ink)}
.ma-perf-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ma-perf-row:last-child{margin-bottom:0}
.ma-perf-label{font-size:10px;font-weight:600;width:68px;flex-shrink:0;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase}
.ma-perf-bar-wrap{flex:1;height:6px;background:var(--s-dim);border-radius:3px;overflow:hidden}
.ma-perf-bar{height:100%;background:var(--ink);transition:width 0.4s;border-radius:3px}
.ma-perf-val{font-family:'Libre Caslon Text',serif;font-size:13px;font-weight:700;width:38px;text-align:right;flex-shrink:0}
.ma-subj-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ma-subj-card{border-radius:10px;border:0.5px solid var(--s-dim);padding:12px 14px;background:var(--bg);display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.ma-subj-card-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.ma-subj-card-pct{font-family:'Libre Caslon Text',serif;font-size:28px;font-weight:700;line-height:1;color:var(--ink)}
.ma-subj-card-bar{height:3px;background:var(--s-dim);border-radius:2px;margin-top:6px;overflow:hidden}
.ma-subj-card-bar-fill{height:100%;border-radius:2px;transition:width 0.4s}
.ma-subj-card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.ma-chart-section{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--s-dim);flex-shrink:0}
.ma-chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.ma-chart-header-left{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.ma-chart-controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ma-pill-group{display:flex;gap:3px}
.ma-pill{padding:4px 9px;background:var(--s-low);border:0.5px solid var(--s-dim);border-radius:20px;cursor:pointer;font-family:'Geist',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);transition:all 0.15s}
.ma-pill:hover{border-color:var(--ink);color:var(--ink)}
.ma-pill.active{background:var(--ink);border-color:var(--ink);color:#fff}
.ma-chart-canvas-wrap{width:100%;height:220px;position:relative}
.ma-chart-canvas-wrap canvas{width:100%!important;height:100%!important}
.ma-chart-empty{height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--muted);gap:6px;background:var(--s-low);border-radius:8px;border:0.5px solid var(--s-dim)}
.ma-chart-empty .icon{font-size:24px;color:var(--s-high)}
.ma-history-panel{flex:1;overflow-y:auto;padding:16px 20px 40px;background:var(--bg)}
.ma-history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ma-history-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.ma-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.ma-card{background:var(--surface);border:0.5px solid var(--s-dim);border-radius:10px;border-left:4px solid var(--s-dim);overflow:hidden;transition:box-shadow 0.15s;position:relative}
.ma-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.07)}
