    const m = {};
    list.forEach(r=>{ if(!m[r.dueDate]) m[r.dueDate]=[]; m[r.dueDate].push(r); });
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  }

  function groupBySubject(list) {
    const m = {};
    list.forEach(r=>{ if(!m[r.subjectId]) m[r.subjectId]={label:r.subjectLabel,color:r.subjectColor,revs:[]}; m[r.subjectId].revs.push(r); });
    return Object.entries(m);
  }

  function RevRow({ rev }) {
    const overduedays = rev.status==='overdue' ? Math.round((new Date(t+'T00:00:00')-new Date(rev.dueDate+'T00:00:00'))/86400000) : 0;
    const statusLabel = rev.status==='overdue' ? `${overduedays}d overdue` : rev.status==='today' ? 'Today' : rev.status==='done' ? 'Done' : fmtDateLabel(rev.dueDate);
    const ordinal = rev.revNum===1?'1st':rev.revNum===2?'2nd':'3rd';
    return (
      <div className="rev-row">
        <div className="rev-row-accent" style={{background:rev.subjectColor}}/>
        <div className="rev-row-body">
          <div style={{flex:1,minWidth:0}}>
            <div className="rev-ch-name">{rev.chapterName}</div>
            <div className="rev-ch-sub">
              <span style={{color:rev.subjectColor,fontWeight:600}}>{rev.subjectLabel}</span>
              <span style={{margin:'0 5px',color:'var(--s-dim)'}}>·</span>
              Studied {fmtDate(rev.checkedDate)}
            </div>
          </div>
        </div>
        <div className="rev-row-right">
          {diffMap[rev.chapterId] && <span className={`diff-badge ${diffMap[rev.chapterId]}`}>{diffMap[rev.chapterId]}</span>}
          <span className="rev-type-badge">R{rev.revNum} · {ordinal} · Day {rev.day}</span>
          <span className={`status-chip ${rev.status}`}>{statusLabel}</span>
          {!rev.done
            ? <button className="btn-mark" onClick={()=>handleMarkDone(rev)}>Mark Done</button>
            : <button className="btn-undo" onClick={()=>onUndo(rev.id)}>↩ Undo</button>}
        </div>
      </div>
    );
  }

  function renderFiltered() {
    if (filter === 'all') {
      // Group by subject, then chapter
      const bySubj = {};
      revisions.forEach(r=>{
        if(!bySubj[r.subjectId]) bySubj[r.subjectId]={label:r.subjectLabel,color:r.subjectColor,byChapter:{}};
        const s = bySubj[r.subjectId];
        if(!s.byChapter[r.chapterId]) s.byChapter[r.chapterId]={name:r.chapterName,revs:[]};
        s.byChapter[r.chapterId].revs.push(r);
      });
      return Object.entries(bySubj).map(([sid,sd])=>(
        <React.Fragment key={sid}>
          <div className="subj-group-header">
            <div className="subj-group-dot" style={{background:sd.color}}/>
            <span className="subj-group-name" style={{color:sd.color}}>{sd.label}</span>
            <span className="subj-group-count">{Object.keys(sd.byChapter).length} chapter{Object.keys(sd.byChapter).length!==1?'s':''}</span>
          </div>
          {Object.entries(sd.byChapter).map(([cid,cd])=>{
            const exp = expandedCh[cid];
            const totalRevs = cd.revs.length;
            const doneRevs = cd.revs.filter(r=>r.done).length;
            const overdueRevs = cd.revs.filter(r=>r.status==='overdue').length;
            return (
              <div key={cid} className="ch-card">
                <div className="ch-card-header" onClick={()=>setExpandedCh(p=>({...p,[cid]:!p[cid]}))}>
                  <div className="ch-card-accent" style={{background:sd.color}}/>
                  <div className="ch-card-info">
                    <div className="ch-card-name">{cd.name}</div>
                    <div className="ch-card-sub">{sd.label}</div>
                    <div className="ch-card-mini">
                      {cd.revs.map(r=>(
                        <span key={r.id} className={`rev-pill ${r.status}`}>R{r.revNum}</span>
                      ))}
                      {overdueRevs>0 && <span style={{fontSize:9,color:'var(--err)',fontWeight:700}}>· {overdueRevs} overdue</span>}
                      {diffMap[cid] && <span className={`diff-badge ${diffMap[cid]}`}>{diffMap[cid]}</span>}
                    </div>
                  </div>
                  <span className="icon ch-card-expand">{exp?'expand_less':'expand_more'}</span>
                </div>
                {exp && <div className="ch-card-rows">{cd.revs.map(r=><RevRow key={r.id} rev={r}/>)}</div>}
              </div>
            );
          })}
        </React.Fragment>
      ));
    }

    if (filter === 'overdue') {
      return groupByDate(overdue).map(([date, revs])=>(
        <React.Fragment key={date}>
          <div className="rev-group-header">
            <span className="rev-group-date overdue">{Math.round((new Date(t+'T00:00:00')-new Date(date+'T00:00:00'))/86400000)} days overdue</span>
            <div className="rev-group-meta">
              <span>{fmtDate(date)}</span>
              <span className="rev-group-badge">{revs.length}</span>
            </div>
          </div>
          {revs.map(r=><RevRow key={r.id} rev={r}/>)}
        </React.Fragment>
      ));
    }

    if (filter === 'today') {
      return todayRevs.length === 0
        ? <div className="date-empty" style={{padding:'40px 20px'}}>
            <span className="icon" style={{fontSize:32,marginBottom:10,color:'var(--s-dim)'}}>check_circle</span>
            All caught up for today!
          </div>
        : todayRevs.map(r=><RevRow key={r.id} rev={r}/>);
    }

    if (filter === 'upcoming') {
      return groupByDate(upcoming).map(([date, revs])=>(
        <React.Fragment key={date}>
          <div className="rev-group-header">
            <span className="rev-group-date">{fmtDateLabel(date)}</span>
            <div className="rev-group-meta">
              <span>{fmtDate(date)}</span>
              <span className="rev-group-badge">{revs.length}</span>
            </div>
          </div>
          {revs.map(r=><RevRow key={r.id} rev={r}/>)}
        </React.Fragment>
      ));
    }

    if (filter === 'done') {
      return groupBySubject(done).map(([sid, sd])=>(
        <React.Fragment key={sid}>
          <div className="subj-group-header">
            <div className="subj-group-dot" style={{background:sd.color}}/>
            <span className="subj-group-name" style={{color:sd.color}}>{sd.label}</span>
            <span className="subj-group-count">{sd.revs.length} revision{sd.revs.length!==1?'s':''}</span>
          </div>
          {sd.revs.map(r=><RevRow key={r.id} rev={r}/>)}
        </React.Fragment>
      ));
    }

    if (filter === 'pipeline') {
      const byChapter = {};
      revisions.forEach(r=>{
        if(!byChapter[r.chapterId]) byChapter[r.chapterId]={name:r.chapterName,subj:r.subjectLabel,color:r.subjectColor,revs:[]};
        byChapter[r.chapterId].revs.push(r);
      });
      return Object.entries(byChapter).map(([cid,cd])=>(
        <div key={cid} className="pipeline-ch">
          <div className="pipeline-name" style={{borderLeft:`3px solid ${cd.color}`,paddingLeft:8}}>{cd.name} <span style={{fontSize:10,color:'var(--muted)',fontWeight:400}}>· {cd.subj}</span></div>
          <div className="pipeline-flow">
            {cd.revs.map((r,i)=>(
              <React.Fragment key={r.id}>
                {i>0 && <div className="pipeline-arrow">→</div>}
                <div className={`pipeline-step ${r.status}`}>
                  <div className="pipeline-step-lbl">R{r.revNum} · Day {r.day}</div>
                  <div className="pipeline-step-date">{r.done?'Done':fmtDate(r.dueDate)}</div>
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>
      ));
    }
  }

  // Date detail revisions
  const selDateRevs = selDate ? revisions.filter(r=>r.dueDate === selDate) : [];

  function dateDetailLabel() {
    if (!selDate) return '';
    const diff = Math.round((new Date(selDate+'T00:00:00') - new Date(t+'T00:00:00')) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    if (diff === -1) return 'Yesterday';
    if (diff < 0) return `${-diff} days ago`;
    return `In ${diff} days`;
  }

  function handleCalDateSelect(date) {
    setSelDate(prev => prev === date ? null : date); // toggle: click same date closes panel
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',width:'100%'}}>
      {urgent > 0 && (
        <div className="today-banner">
          <div className="pulse-dot"/>
          <span className="banner-text">You have {urgent} revision{urgent>1?'s':''} due</span>
          <button className="banner-btn" onClick={()=>setFilter('overdue')}>View Overdue</button>
        </div>
      )}
      <div style={{flex:1,overflow:'hidden',display:'flex',width:'100%',position:'relative'}}>

        {/* LEFT — Calendar only */}
        <div className="rev-left">
          <div className="rev-left-cal">
            <MiniCalendar revisions={revisions} selectedDate={selDate} onSelectDate={handleCalDateSelect}/>
          </div>
          {!selDate && (
            <div className="cal-date-hint">
              <span className="icon" style={{fontSize:14,verticalAlign:'middle',marginRight:4,color:'var(--s-dim)'}}>touch_app</span>
              Click a date to see revisions
            </div>
          )}
          {selDate && (
            <div className="cal-date-hint" style={{color:'var(--c-maths)',borderTop:'1px solid var(--s-dim)',background:'var(--s-low)'}}>
              <span className="icon" style={{fontSize:13,verticalAlign:'middle',marginRight:4}}>event</span>
              {fmtDate(selDate)} · {selDateRevs.length} revision{selDateRevs.length!==1?'s':''}
            </div>
          )}
        </div>

        {/* RIGHT — Stats + Filters + List */}
        <div className="rev-right">
          <div className="stats-bar">
            <div className="stat-cell">
              <div className="stat-cell-lbl">Total</div>
              <div className="stat-big">{revisions.length}</div>
              <div className="stat-cell-sub">{done.length} done · {revisions.length > 0 ? Math.round(done.length/revisions.length*100) : 0}%</div>
              <div style={{height:3,background:'var(--s-dim)',borderRadius:3,marginTop:6,overflow:'hidden'}}>
                <div style={{height:'100%',background:'var(--c-maths)',borderRadius:3,width:`${revisions.length>0?Math.round(done.length/revisions.length*100):0}%`,transition:'width 0.3s'}}/>
              </div>
            </div>
            <div className="stat-cell">
              <div className="stat-cell-lbl">Overdue</div>
              <div className={`stat-big${overdue.length>0?' red':''}`}>{overdue.length}</div>
              <div className="stat-cell-sub">{overdue.length>0?'Needs attention':'All caught up'}</div>
            </div>
            <div className="stat-cell">
              <div className="stat-cell-lbl">Today</div>
              <div className="stat-big">{todayRevs.length}</div>
              <div className="stat-cell-sub">{fmtDate(t)}</div>
            </div>
            <div className="stat-cell">
              <div className="stat-cell-lbl">Upcoming</div>
              <div className="stat-big">{upcoming.length}</div>
              <div className="stat-cell-sub">scheduled ahead</div>
            </div>
          </div>
          <div className="filter-bar">
            {[
              {id:'all', label:'All', count: revisions.length},
              {id:'overdue', label:'Overdue', count: overdue.length, urgent: overdue.length > 0},
              {id:'today', label:'Today', count: todayRevs.length, urgent: todayRevs.length > 0},
              {id:'upcoming', label:'Upcoming', count: upcoming.length},
              {id:'done', label:'Done', count: done.length},
              {id:'pipeline', label:'Pipeline'},
            ].map(f=>(
              <button key={f.id} className={`filter-btn${filter===f.id?' active':''}`} onClick={()=>setFilter(f.id)}>
                {f.label}
                {f.count != null && f.count > 0 && <span className={`filter-count${f.urgent?' urgent':''}`}>{f.count}</span>}
              </button>
            ))}
          </div>
          <div className="rev-list">
            {revisions.length === 0
              ? <div className="date-empty" style={{padding:'40px 20px'}}>
                  <span className="icon" style={{fontSize:32,marginBottom:10,color:'var(--s-dim)'}}>event_available</span>
                  Mark chapters done in Syllabus to schedule revisions.
                </div>
              : renderFiltered()}
          </div>
        </div>

        {/* DATE DETAIL OVERLAY — slides in from right when date is selected */}
        {selDate && (
          <div className="date-detail-overlay">
            <div className="date-detail-head">
              <div className="date-detail-head-left">
                <div className="date-detail-label">
                  {dateDetailLabel()}
                  {selDateRevs.length > 0 && <span className="date-detail-count">{selDateRevs.length}</span>}
                </div>
                <div className="date-detail-sub">{fmtDate(selDate)}</div>
              </div>
              <button className="date-detail-close" onClick={()=>setSelDate(null)}>
                <span className="icon">close</span>
              </button>
            </div>
            <div className="date-detail-scroll">
              {selDateRevs.length === 0 ? (
                <div className="ddr-empty">
                  <span className="icon">event_available</span>
                  <div className="ddr-empty-title">No revisions</div>
                  <div className="ddr-empty-sub">Nothing scheduled on this date</div>
                </div>
              ) : selDateRevs.map(r => {
                const ordinal = r.revNum===1?'1st':r.revNum===2?'2nd':'3rd';
                const statusLabel = r.done?'Done':r.status==='overdue'?'Overdue':r.status==='today'?'Today':fmtDateLabel(r.dueDate);
                const pillCls = r.done?'done':r.status==='overdue'?'overdue':r.status==='today'?'today':'upcoming';
                return (
                  <div key={r.id} className="ddr-card">
                    <div className="ddr-card-top">
                      <div className="ddr-accent" style={{background:r.subjectColor}}/>
                      <div className="ddr-body">
                        <div className="ddr-ch-name">{r.chapterName}</div>
                        <div className="ddr-subj" style={{color:r.subjectColor}}>{r.subjectLabel}</div>
                        <div className="ddr-meta-row">
                          <span className={`ddr-rev-pill ${pillCls}`}>R{r.revNum} · {ordinal} · Day {r.day}</span>
                          {diffMap[r.chapterId] && <span className={`diff-badge ${diffMap[r.chapterId]}`}>{diffMap[r.chapterId]}</span>}
                        </div>
                        <div className="ddr-studied" style={{marginTop:6}}>Studied {fmtDate(r.checkedDate)}</div>
                      </div>
                    </div>
                    <div className="ddr-footer">
                      <span className={`ddr-status-chip ${pillCls}`}>{statusLabel}</span>
                      {!r.done
                        ? <button className="ddr-btn-mark" onClick={()=>handleMarkDone(r)}>Mark Done</button>
                        : <button className="ddr-btn-undo" onClick={()=>onUndo(r.id)}>↩ Undo</button>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

      </div>

      {/* Difficulty Modal */}
      {diffModal && (
        <div className="modal-overlay">
          <div className="modal">
            <h3>Rate this chapter</h3>
            <p>How difficult was <strong>{diffModal.chapterName}</strong>?</p>
            <div className="modal-btns">
              {['easy','medium','hard'].map(d=>(
                <button key={d} className={`diff-btn ${d}`} onClick={()=>{
                  document.dispatchEvent(new CustomEvent('setDifficulty',{detail:{chapterId:diffModal.chapterId,difficulty:d}}));
                  setDiffModal(null);
                }}>{d}</button>
              ))}
            </div>
            <span className="skip-link" onClick={()=>setDiffModal(null)}>Skip</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== CONSISTENCY TRACKER =====================
function ConsistencyTracker({ user, showToast }) {
  const [examDate, setExamDate] = useState('');
  const [startDate, setStartDate] = useState('');
  const [daysMap, setDaysMap] = useState({}); // date -> 'studied'|'missed'
  const [loading, setLoading] = useState(true);
  const [popup, setPopup] = useState(null); // {date, x, y}
  const [countdown, setCountdown] = useState({d:0,h:0,m:0,s:0});
  const [studyHoursPopup, setStudyHoursPopup] = useState(null);
  const [shHours, setShHours] = useState(6);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [resetting, setResetting] = useState(false);
  const popupRef = useRef(null);

  useEffect(() => {
    if (!user) return;
    Promise.all([
      sb.from('consistency_settings').select('exam_date,start_date').eq('user_id', user.id).maybeSingle(),
      sb.from('consistency_days').select('day_date,status').eq('user_id', user.id)
    ]).then(([settRes, daysRes]) => {
      if (settRes.data?.exam_date) setExamDate(settRes.data.exam_date);
      if (settRes.data?.start_date) setStartDate(settRes.data.start_date);
      const m = {};
      (daysRes.data || []).forEach(r => { m[r.day_date] = r.status; });
      setDaysMap(m);
      setLoading(false);
    });
  }, [user]);

  useEffect(() => {
    if (!examDate) return;
    function tick() {
      const now = new Date();
      const target = new Date(examDate + 'T00:00:00');
      const diff = target - now;
      if (diff <= 0) { setCountdown({d:0,h:0,m:0,s:0}); return; }
      const d = Math.floor(diff/86400000);
      const h = Math.floor((diff%86400000)/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      setCountdown({d,h,m,s});
    }
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [examDate]);

  useEffect(() => {
    if (!popup) return;
    function handler(e) {
      if (popupRef.current && !popupRef.current.contains(e.target)) setPopup(null);
    }
    setTimeout(() => document.addEventListener('mousedown', handler), 10);
    return () => document.removeEventListener('mousedown', handler);
  }, [popup]);

  async function saveExamDate(val) {
    setExamDate(val);
    const { error } = await sb.from('consistency_settings').upsert(
      { user_id: user.id, exam_date: val, start_date: startDate || null, updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );
    if (error) showToast('Failed to save exam date', 'error');
    else showToast('Exam date saved', 'calendar_month');
  }

  async function saveStartDate(val) {
    setStartDate(val);
    const { error } = await sb.from('consistency_settings').upsert(
      { user_id: user.id, start_date: val, exam_date: examDate || null, updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );
    if (error) showToast('Failed to save start date', 'error');
    else showToast('Start date saved', 'calendar_month');
  }

  async function setDayStatus(date, status) {
    if (status === 'clear') {
      const { error } = await sb.from('consistency_days').delete().eq('user_id', user.id).eq('day_date', date);
      if (error) { showToast('Error clearing day', 'error'); return; }
      setDaysMap(p => { const n={...p}; delete n[date]; return n; });
    } else {
      const { error } = await sb.from('consistency_days').upsert({ user_id: user.id, day_date: date, status }, { onConflict: 'user_id,day_date' });
      if (error) { showToast('Error saving day', 'error'); return; }
      setDaysMap(p => ({ ...p, [date]: status }));
      showToast(status === 'studied' ? 'Marked as studied!' : 'Marked as missed', status === 'studied' ? 'check_circle' : 'cancel');
    }
    setPopup(null);
  }

  const todayStr = today();
  // Build grid from startDate to examDate (or fallback to 9mo back + 3mo ahead)
  const gridStart = new Date((startDate || todayStr) + 'T00:00:00');
  const gridEnd = examDate ? new Date(examDate + 'T00:00:00') : (() => { const d = new Date(todayStr+'T00:00:00'); d.setMonth(d.getMonth()+3); return d; })();
  // Align to Sunday
  while (gridStart.getDay() !== 0) gridStart.setDate(gridStart.getDate() - 1);
  const cells = [];
  const cur = new Date(gridStart);
  while (cur <= gridEnd || cells.length % 7 !== 0) {
    cells.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate() + 1);
    if (cells.length > 53*7) break; // safety cap
  }
  // Group into columns of 7
  const cols = [];
  for (let c = 0; c < Math.ceil(cells.length/7); c++) cols.push(cells.slice(c*7, c*7+7));

  // Compute stats
  const allDays = Object.entries(daysMap);
  const studied = allDays.filter(([,v])=>v==='studied');
  const missed = allDays.filter(([,v])=>v==='missed');
  const pastDays = allDays.filter(([d])=>d<=todayStr);
  const studyRate = pastDays.length === 0 ? 0 : Math.round(studied.filter(([d])=>d<=todayStr).length / pastDays.length * 100);
  // Streak
  let curStreak = 0, d = new Date(todayStr+'T00:00:00');
  while (true) {
    const ds = d.toISOString().slice(0,10);
    if (daysMap[ds] === 'studied') { curStreak++; d.setDate(d.getDate()-1); } else break;
  }
  let longestStreak = 0, run = 0;
  const sortedStudied = studied.map(([d])=>d).sort();
  if (sortedStudied.length) {
    let prev = null;
    for (const ds of sortedStudied) {
      if (!prev) { run=1; }
      else {
        const diff = Math.round((new Date(ds+'T00:00:00') - new Date(prev+'T00:00:00'))/86400000);
        if (diff === 1) run++; else run=1;
      }
      if (run > longestStreak) longestStreak = run;
      prev = ds;
    }
  }
  const daysLeft = examDate ? Math.max(0, Math.ceil((new Date(examDate+'T00:00:00') - new Date(todayStr+'T00:00:00'))/86400000)) : 0;
  const totalDays = (startDate && examDate) ? Math.max(0, Math.ceil((new Date(examDate+'T00:00:00') - new Date(startDate+'T00:00:00'))/86400000)) : 0;

  // Gap warnings — 3+ consecutive missed
  const warnings = [];
  const allDatesStr = Object.keys(daysMap).sort();
  let gapStart = null, gapLen = 0;
  for (const ds of allDatesStr) {
    if (daysMap[ds]==='missed') {
      if (!gapStart) gapStart = ds;
      gapLen++;
      if (gapLen >= 3) {
        if (!warnings.find(w=>w.start===gapStart)) warnings.push({start:gapStart, end:ds, len:gapLen});
        else warnings[warnings.length-1].end = ds, warnings[warnings.length-1].len = gapLen;
      }
    } else { gapStart=null; gapLen=0; }
  }

  // This week (Mon–Sun)
  const todayDate = new Date(todayStr+'T00:00:00');
  const dow = todayDate.getDay(); // 0=Sun
  const monOffset = dow === 0 ? -6 : 1 - dow;
  const weekDays = Array.from({length:7},(_,i)=>{
    const d2 = new Date(todayDate); d2.setDate(todayDate.getDate()+monOffset+i);
    const yy = d2.getFullYear();
    const mm = String(d2.getMonth()+1).padStart(2,'0');
    const dd = String(d2.getDate()).padStart(2,'0');
    return `${yy}-${mm}-${dd}`;
  });
  const DOW_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Month labels for heatmap
  function getMonthLabel(colCells) {
    const first = colCells[0];
    const d = new Date(first+'T00:00:00');
    if (d.getDate() <= 7) {
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return MONTHS[d.getMonth()];
    }
    return '';
  }

  async function handleReset() {
    setResetting(true);
    try {
      await sb.from('consistency_days').delete().eq('user_id', user.id);
      await sb.from('consistency_settings').delete().eq('user_id', user.id);
      await sb.from('study_hours_log').delete().eq('user_id', user.id);
      setDaysMap({});
      setExamDate('');
      setStartDate('');
      setShowResetConfirm(false);
      showToast('Grid reset! Set new dates to begin.', 'refresh');
    } catch(e) { showToast('Reset failed', 'error'); }
    setResetting(false);
  }

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  const pad2 = n => String(n).padStart(2,'0');
  const examDateLabel = examDate ? new Date(examDate+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '';
  const startDateLabel = startDate ? new Date(startDate+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : 'Not set';

  async function handleSaveStudyHours(date, hrs) {
    if (hrs > 0) {
      await sb.from('study_hours_log').upsert({ user_id: user.id, log_date: date, hours: hrs }, { onConflict: 'user_id,log_date' });
      showToast(`Logged ${hrs}h for today!`, 'schedule');
    }
    setStudyHoursPopup(null);
    setShHours(6);
  }

  async function setDayStatusWithPrompt(date, status) {
    await setDayStatus(date, status);
    if (status === 'studied' && date === todayStr) {
      setShHours(6);
      setStudyHoursPopup(date);
    }
  }

  function HeatmapGrid({ onCellClick }) {
    return (
      <div className="heatmap-outer">
        <div className="heatmap-container">
          <div className="heatmap-dow-labels">
            {['S','M','T','W','T','F','S'].map((l,i)=><div key={i} className="heatmap-dow-label">{l}</div>)}
          </div>
          {cols.map((col,ci)=>(
            <div key={ci} className="heatmap-col">
              <div className="heatmap-month-label">{getMonthLabel(col)}</div>
              {col.map(date=>{
                const isFuture = date > todayStr;
                const isToday = date === todayStr;
                const status = daysMap[date] || 'none';
                return (
                  <div
                    key={date}
                    className={`heatmap-cell${isFuture?' future':''}${isToday?' today-cell':''}`}
                    data-status={isFuture?'none':status}
                    title={`${date} — ${status}`}
                    onClick={e=>{
                      if (isFuture) return;
                      const rect = e.target.getBoundingClientRect();
                      onCellClick(date, rect.left, rect.bottom+4);
                    }}
                  />
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="con-layout">
      {/* Top bar */}
      <div className="con-topbar">
        <div>
          <div className="con-title">Consistency Tracker</div>
          <div className="con-subtitle">Track your daily study habit toward JEE</div>
        </div>
        <div className="con-date-controls">
          <div className="con-date-field">
            <span className="con-exam-label">Start Date</span>
            <input className="con-exam-input" type="date" value={startDate} onChange={e=>saveStartDate(e.target.value)}/>
          </div>
          <div className="con-date-sep">→</div>
          <div className="con-date-field">
            <span className="con-exam-label">Exam Date</span>
            <input className="con-exam-input" type="date" value={examDate} onChange={e=>saveExamDate(e.target.value)}/>
          </div>
          <button
            onClick={()=>setShowResetConfirm(true)}
            title="Reset grid, dates and study hours"
            style={{height:28,padding:'0 12px',border:'1px solid var(--err)',background:'none',cursor:'pointer',fontFamily:"'Geist',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--err)',borderRadius:5,display:'flex',alignItems:'center',gap:4,transition:'all 0.15s',flexShrink:0,marginLeft:4}}
            onMouseEnter={e=>{e.currentTarget.style.background='#fff0f0'}}
            onMouseLeave={e=>{e.currentTarget.style.background='none'}}
          >
            <span className="icon" style={{fontSize:14}}>restart_alt</span>Reset
          </button>
        </div>
      </div>

      {/* Stats strip */}
      <div className="con-stats">
        {[
          {num: totalDays||'—', lbl:'Total Days', color:'var(--c-maths)', pct:null},
          {num: studied.length, lbl:'Studied', color:'#16a34a', pct: totalDays?Math.round(studied.length/totalDays*100):null},
          {num: studyRate+'%', lbl:'Consistency', color:'var(--c-physical)', pct:studyRate},
          {num: curStreak, lbl:'Current Streak', color:'var(--c-inorganic)', pct:longestStreak?Math.round(curStreak/longestStreak*100):null},
          {num: longestStreak, lbl:'Best Streak', color:'var(--c-physics)', pct:null},
          {num: daysLeft, lbl:'Days Left', color:'var(--err)', pct:totalDays?Math.round((totalDays-daysLeft)/totalDays*100):null},
        ].map((s,i)=>(
          <div key={i} className="con-stat">
            <div className="con-stat-accent" style={{background:s.color}}/>
            <div className="con-stat-lbl">{s.lbl}</div>
            <div className="con-stat-num">{s.num}</div>
            {s.pct!=null && <div className="con-stat-bar"><div className="con-stat-bar-fill" style={{width:`${Math.min(s.pct,100)}%`,background:s.color}}/></div>}
          </div>
        ))}
      </div>

      {/* Scrollable body */}
      <div className="con-body">
        {/* Countdown */}
        {examDate ? (
          <div className="con-countdown-section">
            <div className="con-countdown-units">
              <div className="flip-unit"><div className="flip-num">{countdown.d}</div><div className="flip-label">Days</div></div>
              <div className="flip-sep">:</div>
              <div className="flip-unit"><div className="flip-num">{pad2(countdown.h)}</div><div className="flip-label">Hours</div></div>
              <div className="flip-sep">:</div>
              <div className="flip-unit"><div className="flip-num">{pad2(countdown.m)}</div><div className="flip-label">Mins</div></div>
              <div className="flip-sep">:</div>
              <div className="flip-unit"><div className="flip-num">{pad2(countdown.s)}</div><div className="flip-label">Secs</div></div>
            </div>
            <div className="con-countdown-range">{startDate?startDateLabel:'Today'} → {examDateLabel}{totalDays>0?` · ${totalDays} days`:''}</div>
          </div>
        ) : (
          <div className="con-no-exam">
            <span className="icon">info</span>
            Set your start date and exam date above to begin tracking.
          </div>
        )}

        {/* Full-width content column */}
        <div className="con-lower">
          {/* Heatmap — full width */}
          <div className="con-heatmap-col">
            <div className="con-section-title">
              Activity Heatmap
              <div className="con-heatmap-legend">
                <div className="con-legend-item"><div className="con-legend-dot" style={{background:'var(--s-high)'}}/>Not marked</div>
                <div className="con-legend-item"><div className="con-legend-dot" style={{background:'var(--ink)'}}/>Studied</div>
                <div className="con-legend-item"><div className="con-legend-dot" style={{background:'var(--err)'}}/>Missed</div>
              </div>
            </div>
            <HeatmapGrid onCellClick={(date,x,y)=>setPopup({date,x,y})}/>
          </div>

          {/* This Week — full width card */}
          <div className="con-week-section">
            <div className="con-section-title">
              This Week
              <span style={{fontWeight:400,fontSize:9,color:'var(--faint)',textTransform:'none',letterSpacing:0}}>
                {new Date(weekDays[0]+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})} – {new Date(weekDays[6]+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
              </span>
            </div>
            <div className="week-grid">
              {weekDays.map((date,i)=>{
                const isFuture = date > todayStr;
                const isToday = date === todayStr;
                const status = daysMap[date]||'none';
                const markerLabel = isFuture?'—':status==='studied'?'S':status==='missed'?'M':'·';
                const statusLbl = isFuture?'future':status==='none'?'—':status;
                return (
                  <div key={date}
                    className={`week-day${isFuture?' week-future':''}`}
                    data-status={isFuture?'none':status}
                    style={isToday&&status==='none'?{outline:'2px solid var(--ink)',outlineOffset:'-1px'}:{}}
                    onClick={()=>{ if(isFuture)return; const x=window.innerWidth/2,y=300; setPopup({date,x,y}); }}
                  >
                    <div className="week-day-name">{DOW_NAMES[i]}</div>
                    <div className="week-day-date">{new Date(date+'T00:00:00').getDate()}</div>
                    <div className="week-day-marker">{markerLabel}</div>
                    <div className="week-day-status-lbl">{statusLbl}</div>
                  </div>
                );
              })}
            </div>

            {/* Gap warnings as inline chips */}
            {warnings.length > 0 && (
              <div className="con-gaps-strip">
                <span className="con-gaps-strip-label">Gaps</span>
                {warnings.map((w,i)=>(
                  <div key={i} className="con-gap-chip">
                    <span className="icon">warning</span>
                    {w.len} missed · {fmtDate(w.start)} → {fmtDate(w.end)}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Heatmap popup */}
      {popup && (
        <div ref={popupRef} className="heatmap-popup" style={{top:Math.min(popup.y,window.innerHeight-160),left:Math.min(popup.x,window.innerWidth-160)}}>
          <div className="heatmap-popup-date">{fmtDate(popup.date)}</div>
          <button className="heatmap-popup-btn" onClick={()=>setDayStatusWithPrompt(popup.date,'studied')}>
            <div className="heatmap-popup-dot" style={{background:'var(--ink)'}}/>Studied
          </button>
          <button className="heatmap-popup-btn" onClick={()=>setDayStatus(popup.date,'missed')}>
            <div className="heatmap-popup-dot" style={{background:'var(--err)'}}/>Missed
          </button>
          <button className="heatmap-popup-btn" onClick={()=>setDayStatus(popup.date,'clear')}>
            <div className="heatmap-popup-dot" style={{background:'var(--s-high)'}}/>Clear
          </button>
        </div>
      )}

      {/* Study Hours prompt modal */}
      {studyHoursPopup && (
        <div className="sh-modal-overlay">
          <div className="sh-modal">
            <div className="sh-modal-title">Log Today's Study Hours</div>
            <div className="sh-modal-sub">Great job studying today! How many hours did you study? This will be saved to your Study Hours tracker.</div>
            <div className="sh-hours-wrap">
              <button className="sh-stepper" onClick={()=>setShHours(h=>+(Math.max(0.5,parseFloat(h)||0 - 0.5).toFixed(1)))}>−</button>
              <input
                className="sh-hours-input"
                type="text"
                inputMode="decimal"
                value={shHours}
                onChange={e=>setShHours(e.target.value)}
                onBlur={e=>{
                  const v = parseFloat(e.target.value);
                  setShHours(isNaN(v) ? 1 : +(Math.min(24, Math.max(0.5, v)).toFixed(1)));
                }}
              />
              <button className="sh-stepper" onClick={()=>setShHours(h=>+(Math.min(24,parseFloat(h)||0 + 0.5).toFixed(1)))}>+</button>
            </div>
            <div className="sh-presets">
              {[1,2,3,4,5,6,7,8].map(n=>(
                <button key={n} className="sh-preset" onClick={()=>setShHours(n)}>{n}h</button>
              ))}
            </div>
            <div className="sh-modal-btns">
              <button className="sh-modal-save" onClick={()=>{
                const v = parseFloat(shHours);
                handleSaveStudyHours(studyHoursPopup, isNaN(v) ? 1 : +(Math.min(24,Math.max(0.5,v)).toFixed(1)));
              }}>Save {shHours}h</button>
              <button className="sh-modal-skip" onClick={()=>{ setStudyHoursPopup(null); setShHours(6); }}>Skip</button>
            </div>
          </div>
        </div>
      )}
      {/* Reset confirm modal */}
      {showResetConfirm && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:700,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--s-dim)',borderRadius:10,padding:'24px 26px',width:'100%',maxWidth:380,boxShadow:'0 12px 40px rgba(0,0,0,0.2)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <span className="icon" style={{fontSize:22,color:'var(--err)'}}>warning</span>
              <span style={{fontFamily:"'Libre Caslon Text',serif",fontSize:17,fontWeight:700}}>Reset Grid?</span>
            </div>
            <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6,margin:'0 0 18px'}}>
              This will permanently delete:<br/>
              • All consistency day marks (studied / missed)<br/>
              • Your start date and exam date<br/>
              • All study hours logs<br/><br/>
              You can then set new dates to start fresh.
            </p>
            <div style={{display:'flex',gap:8}}>
              <button
                onClick={handleReset}
                disabled={resetting}
                style={{flex:1,height:38,background:'var(--err)',color:'#fff',border:'none',borderRadius:7,fontFamily:"'Geist',sans-serif",fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',cursor:resetting?'not-allowed':'pointer',opacity:resetting?0.6:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}
              >
                {resetting && <span className="spinner" style={{width:12,height:12,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/>}
                {resetting ? 'Resetting…' : 'Yes, Reset Everything'}
              </button>
              <button
                onClick={()=>setShowResetConfirm(false)}
                style={{height:38,padding:'0 16px',background:'none',border:'1px solid var(--s-dim)',borderRadius:7,fontFamily:"'Geist',sans-serif",fontSize:11,fontWeight:500,color:'var(--muted)',cursor:'pointer'}}
              >
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== STUDY HOURS ANALYSIS =====================
function StudyHoursAnalysis({ user, showToast, darkMode }) {
  const [logs, setLogs] = useState([]); // [{id, log_date, hours}]
  const [settings, setSettings] = useState({
    target_hours: 6,
    color_met: '#16a34a',
    color_unmet: '#dc2626',
    color_met_dark: '#4ade80',
    color_unmet_dark: '#f87171',
  });
  const [conStartDate, setConStartDate] = useState(''); // from consistency_settings
  const [conExamDate, setConExamDate] = useState('');   // from consistency_settings
  const [loading, setLoading] = useState(true);
  const [showSettings, setShowSettings] = useState(false);
  const [settForm, setSettForm] = useState(null);
  const [chartType, setChartType] = useState('bar'); // 'bar'|'line'
  const [chartRange, setChartRange] = useState('30'); // '7'|'30'|'all'
  const [popup, setPopup] = useState(null);
  const [logHours, setLogHours] = useState(6);
  const popupRef = useRef(null);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  const todayStr = today();

  useEffect(() => {
    if (!user) return;
    Promise.all([
      sb.from('study_hours_log').select('*').eq('user_id', user.id).order('log_date', {ascending: false}),
      sb.from('study_hours_settings').select('*').eq('user_id', user.id).maybeSingle(),
      sb.from('consistency_settings').select('exam_date,start_date').eq('user_id', user.id).maybeSingle(),
    ]).then(([logsRes, settRes, conRes]) => {
      setLogs(logsRes.data || []);
      if (settRes.data) setSettings(settRes.data);
      if (conRes.data?.start_date) setConStartDate(conRes.data.start_date);
      if (conRes.data?.exam_date) setConExamDate(conRes.data.exam_date);
      setLoading(false);
    });
  }, [user]);

  // Close popup on outside click
  useEffect(() => {
    if (!popup) return;
    function h(e) { if (popupRef.current && !popupRef.current.contains(e.target)) setPopup(null); }
    setTimeout(() => document.addEventListener('mousedown', h), 10);
    return () => document.removeEventListener('mousedown', h);
  }, [popup]);

  // Draw chart
  useEffect(() => {
    if (loading || !chartRef.current) return;
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const colorMet = isDark ? settings.color_met_dark : settings.color_met;
    const colorUnmet = isDark ? settings.color_unmet_dark : settings.color_unmet;
    const target = +settings.target_hours;

    // Build date range
    const sortedLogs = [...logs].sort((a,b) => a.log_date.localeCompare(b.log_date));
    let dataLogs = sortedLogs;
    if (chartRange !== 'all') {
      const cutoff = new Date(todayStr + 'T00:00:00');
      cutoff.setDate(cutoff.getDate() - parseInt(chartRange));
      const cutoffStr = cutoff.toISOString().slice(0,10);
      dataLogs = sortedLogs.filter(l => l.log_date >= cutoffStr);
    }
    const labels = dataLogs.map(l => {
      const d = new Date(l.log_date+'T00:00:00');
      return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    });
    const hours = dataLogs.map(l => +l.hours);
    const bgColors = hours.map(h => h >= target ? colorMet + 'cc' : colorUnmet + 'cc');
    const borderColors = hours.map(h => h >= target ? colorMet : colorUnmet);

    if (chartInstance.current) { try { chartInstance.current.destroy(); } catch(e){} }
    const ctx = chartRef.current.getContext('2d');
    const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#888' : '#666';

    if (chartType === 'bar') {
      chartInstance.current = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{
          label: 'Study Hours',
          data: hours,
          backgroundColor: bgColors,
          borderColor: borderColors,
          borderWidth: 1.5,
          borderRadius: 4,
        }]},
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: { legend: { display: false }, tooltip: {
            callbacks: { label: ctx => `${ctx.raw}h ${ctx.raw >= target ? '✓ Met target' : `· ${(target - ctx.raw).toFixed(1)}h short`}` }
          }},
          scales: {
            x: { grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Geist', size: 10 }, maxRotation: 45 }},
            y: { grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Geist', size: 10 }, callback: v => v+'h' },
              min: 0,
              afterDataLimits(scale) { scale.max = Math.max(scale.max, target + 1); }
            }
          }
        }
      });
      // Draw target line manually after render
    } else {
      chartInstance.current = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [{
          label: 'Study Hours',
          data: hours,
          borderColor: colorMet,
          backgroundColor: colorMet + '22',
          borderWidth: 2.5,
          pointBackgroundColor: borderColors,
          pointBorderColor: borderColors,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          tension: 0.3,
        }, {
          label: `Target (${target}h)`,
          data: labels.map(() => target),
          borderColor: textColor,
          borderWidth: 1.5,
          borderDash: [5,5],
          pointRadius: 0,
          fill: false,
        }]},
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: { legend: { display: true, position: 'top', labels: { color: textColor, font: { family: 'Geist', size: 10 }, boxWidth: 12, boxHeight: 12 }},
            tooltip: { callbacks: { label: ctx => ctx.datasetIndex===0 ? `${ctx.raw}h ${ctx.raw >= target ? '✓' : `(${(target-ctx.raw).toFixed(1)}h short)`}` : `Target: ${ctx.raw}h` }}
          },
          scales: {
            x: { grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Geist', size: 10 }, maxRotation: 45 }},
            y: { grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Geist', size: 10 }, callback: v => v+'h' }, min: 0 }
          }
        }
      });
    }
  }, [logs, settings, chartType, chartRange, loading, darkMode]);

  async function handleLogHours(date, hrs) {
    const existing = logs.find(l => l.log_date === date);
    if (existing) {
      const { error } = await sb.from('study_hours_log').update({ hours: hrs }).eq('id', existing.id);
      if (error) { showToast('Failed to save', 'error'); return; }
      setLogs(p => p.map(l => l.id === existing.id ? {...l, hours: hrs} : l));
    } else {
      const { data, error } = await sb.from('study_hours_log').insert({ user_id: user.id, log_date: date, hours: hrs }).select().single();
      if (error) { showToast('Failed to save', 'error'); return; }
      setLogs(p => [data, ...p]);
    }
    showToast(`Saved ${hrs}h for ${fmtDate(date)}`, 'schedule');
    setPopup(null);
  }

  async function handleDelete(id) {
    const { error } = await sb.from('study_hours_log').delete().eq('id', id);
    if (error) { showToast('Delete failed', 'error'); return; }
    setLogs(p => p.filter(l => l.id !== id));
    showToast('Entry deleted', 'delete');
  }

  async function saveSettings(s) {
    const { error } = await sb.from('study_hours_settings').upsert({ user_id: user.id, ...s }, { onConflict: 'user_id' });
    if (error) { showToast('Failed to save settings', 'error'); return; }
    setSettings(s);
    setShowSettings(false);
    showToast('Settings saved', 'settings');
  }

  // Build heatmap grid — EXACTLY same logic as ConsistencyTracker using same startDate/examDate
  const shGridStart = new Date((conStartDate || todayStr) + 'T00:00:00');
  const shGridEnd = conExamDate
    ? new Date(conExamDate + 'T00:00:00')
    : (() => { const d = new Date(todayStr+'T00:00:00'); d.setMonth(d.getMonth()+3); return d; })();
  while (shGridStart.getDay() !== 0) shGridStart.setDate(shGridStart.getDate() - 1);
  const cells2 = [];
  const cur2 = new Date(shGridStart);
  while (cur2 <= shGridEnd || cells2.length % 7 !== 0) {
    cells2.push(cur2.toISOString().slice(0,10));
    cur2.setDate(cur2.getDate() + 1);
    if (cells2.length > 53*7) break;
  }
  const hmCols = [];
  for (let c = 0; c < Math.ceil(cells2.length/7); c++) hmCols.push(cells2.slice(c*7, c*7+7));

  const logsMap = {}; // date -> hours
  logs.forEach(l => { logsMap[l.log_date] = +l.hours; });

  const isDark = darkMode;
  const colorMet = isDark ? settings.color_met_dark : settings.color_met;
  const colorUnmet = isDark ? settings.color_unmet_dark : settings.color_unmet;
  const target = +settings.target_hours;

  function getCellColor(date) {
    const hrs = logsMap[date];
    if (!hrs) return 'var(--s-high)';
    return hrs >= target ? colorMet : colorUnmet;
  }

  function getMonthLabel(col) {
    const first = col[0];
    const d = new Date(first+'T00:00:00');
    if (d.getDate() <= 7) {
      return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    }
    return '';
  }

  // Stats
  const totalHours = logs.reduce((a,l) => a + +l.hours, 0);
  const daysLogged = logs.length;
  const avgHours = daysLogged > 0 ? (totalHours / daysLogged).toFixed(1) : 0;
  const metTarget = logs.filter(l => +l.hours >= target).length;
  const streak7 = (() => {
    let s = 0;
    const d = new Date(todayStr+'T00:00:00');
    while (true) {
      const ds = d.toISOString().slice(0,10);
      if (logsMap[ds] !== undefined) { s++; d.setDate(d.getDate()-1); } else break;
    }
    return s;
  })();

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="sh-layout">
      {/* Top bar */}
      <div className="sh-topbar">
        <div className="sh-topbar-left">
          <div className="sh-title">Study Hours</div>
          <div className="sh-subtitle">Track how many hours you study each day</div>
        </div>
        <div className="sh-topbar-right">
          <button className="sh-settings-btn" onClick={()=>{ setSettForm({...settings}); setShowSettings(true); }}>
            <span className="icon">tune</span>Settings
          </button>
        </div>
      </div>

      {/* Stats */}
      <div className="sh-stats">
        {[
          {num: totalHours.toFixed(1)+'h', lbl: 'Total Hours'},
          {num: avgHours+'h', lbl: 'Daily Avg'},
          {num: target+'h', lbl: 'Daily Target'},
          {num: metTarget, lbl: 'Target Met'},
          {num: streak7, lbl: 'Day Streak'},
        ].map((s,i) => (
          <div key={i} className="sh-stat">
            <div className="sh-stat-lbl">{s.lbl}</div>
            <div className="sh-stat-num">{s.num}</div>
          </div>
        ))}
      </div>

      {/* Scrollable body */}
      <div className="sh-body">

        {/* Heatmap card */}
        <div className="sh-heatmap-card">
          <div className="sh-heatmap-head">
            <div className="sh-hm-title">
              Hours Heatmap
              <div className="sh-hm-legend">
                <div className="sh-hm-leg-item"><div className="sh-hm-leg-dot" style={{background:'var(--s-high)'}}/>No log</div>
                <div className="sh-hm-leg-item"><div className="sh-hm-leg-dot" style={{background:colorUnmet}}/>Below target</div>
                <div className="sh-hm-leg-item"><div className="sh-hm-leg-dot" style={{background:colorMet}}/>Target met</div>
              </div>
            </div>
            <div style={{fontSize:10,color:'var(--muted)'}}>Click any past day to log hours</div>
          </div>
          <div className="heatmap-outer">
            <div className="heatmap-container">
              <div className="heatmap-dow-labels">
                {['S','M','T','W','T','F','S'].map((l,i)=><div key={i} className="heatmap-dow-label">{l}</div>)}
              </div>
              {hmCols.map((col,ci)=>(
                <div key={ci} className="heatmap-col">
                  <div className="heatmap-month-label">{getMonthLabel(col)}</div>
                  {col.map(date=>{
                    const isFuture = date > todayStr;
                    const isToday = date === todayStr;
                    const hrs = logsMap[date];
                    const bgColor = isFuture ? 'var(--s-high)' : getCellColor(date);
                    return (
                      <div
                        key={date}
                        className={`heatmap-cell${isFuture?' future':''}${isToday?' today-cell':''}`}
                        style={{background: bgColor}}
                        title={date + (hrs ? ` — ${hrs}h` : ' — no log')}
                        onClick={e=>{
                          if (isFuture) return;
                          const rect = e.target.getBoundingClientRect();
                          setLogHours(hrs || 6);
                          setPopup({date, x: rect.left, y: rect.bottom+4, existing: hrs});
                        }}
                      />
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Chart card */}
        <div className="sh-chart-card">
          <div className="sh-chart-head">
            <div className="sh-chart-title">Daily Study Hours</div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <div className="sh-chart-tabs">
                {[{id:'7',lbl:'7D'},{id:'30',lbl:'30D'},{id:'all',lbl:'All'}].map(r=>(
                  <button key={r.id} className={`sh-chart-tab${chartRange===r.id?' active':''}`} onClick={()=>setChartRange(r.id)}>{r.lbl}</button>
                ))}
              </div>
              <div className="sh-chart-tabs">
                {[{id:'bar',lbl:'Bar',icon:'bar_chart'},{id:'line',lbl:'Line',icon:'show_chart'}].map(t=>(
                  <button key={t.id} className={`sh-chart-tab${chartType===t.id?' active':''}`} onClick={()=>setChartType(t.id)}>
                    <span className="icon" style={{fontSize:13,verticalAlign:'middle',marginRight:3}}>{t.icon}</span>{t.lbl}
                  </button>
                ))}
              </div>
            </div>
          </div>
          {logs.length === 0 ? (
            <div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',flexDirection:'column',gap:8,background:'var(--s-low)',borderRadius:8}}>
              <span className="icon" style={{fontSize:28,color:'var(--s-dim)'}}>schedule</span>
              <span style={{fontSize:12}}>No hours logged yet. Click a cell in the heatmap to add.</span>
            </div>
          ) : (
            <div className="sh-chart-canvas-wrap">
              <canvas ref={chartRef} className="chartjs-canvas"/>
            </div>
          )}
        </div>

        {/* Log history */}
        <div className="sh-log-card">
          <div className="sh-log-head">
            <div className="sh-log-title">Log History ({logs.length} entries)</div>
            <div style={{display:'flex',gap:6}}>
              <div style={{fontSize:10,color:'var(--muted)',display:'flex',alignItems:'center',gap:4}}>
                <div style={{width:10,height:10,borderRadius:2,background:colorMet}}/>≥ {target}h
                <div style={{width:10,height:10,borderRadius:2,background:colorUnmet,marginLeft:6}}/>Below
              </div>
            </div>
          </div>
          {logs.length === 0 ? (
            <div className="sh-empty">
              <span className="icon">schedule</span>
              <div style={{fontSize:12,marginTop:4}}>No hours logged yet.</div>
            </div>
          ) : (
            <div className="sh-log-list">
              {[...logs].sort((a,b)=>b.log_date.localeCompare(a.log_date)).map(l => {
                const hrs = +l.hours;
                const met = hrs >= target;
                const pct = Math.min(100, (hrs / Math.max(target, hrs)) * 100);
                return (
                  <div key={l.id} className="sh-log-row">
                    <div style={{width:4,alignSelf:'stretch',flexShrink:0,background:met?colorMet:colorUnmet,borderRadius:2}}/>
                    <div className="sh-log-hours" style={{color:met?colorMet:colorUnmet}}>{hrs}h</div>
                    <div className="sh-log-info">
                      <div className="sh-log-date">{fmtDate(l.log_date)}</div>
                      <div className="sh-log-meta">{met ? `✓ Met target (${target}h)` : `${(target-hrs).toFixed(1)}h below target`}</div>
                    </div>
                    <div style={{flex:1,display:'flex',alignItems:'center'}}>
                      <div className="sh-log-bar-wrap">
                        <div className="sh-log-bar" style={{width:`${pct}%`,background:met?colorMet:colorUnmet}}/>
                      </div>
                    </div>
                    <button className="sh-log-del" onClick={()=>handleDelete(l.id)}>
                      <span className="icon">delete</span>
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Day popup */}
      {popup && (
        <div ref={popupRef} className="heatmap-popup" style={{top:Math.min(popup.y, window.innerHeight-280), left:Math.min(popup.x, window.innerWidth-200)}}>
          <div className="heatmap-popup-date">{fmtDate(popup.date)}{popup.existing ? ` · ${popup.existing}h logged` : ''}</div>
          <div style={{padding:'10px 12px'}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Hours Studied</div>
            <div style={{display:'flex',alignItems:'center',border:'1px solid var(--s-dim)',borderRadius:6,overflow:'hidden',marginBottom:8,background:'var(--surface)'}}>
              <button className="sh-stepper" style={{width:36,height:38,fontSize:18}} onClick={()=>setLogHours(h=>Math.max(0.5,+(h-0.5).toFixed(1)))}>−</button>
              <input type="number" min="0.5" max="24" step="0.5" value={logHours}
                onChange={e=>setLogHours(Math.max(0.5,Math.min(24,+e.target.value||0.5)))}
                style={{flex:1,height:38,border:'none',borderLeft:'1px solid var(--s-dim)',borderRight:'1px solid var(--s-dim)',background:'transparent',textAlign:'center',fontFamily:"'Libre Caslon Text',serif",fontSize:20,fontWeight:700,color:'var(--ink)',outline:'none'}}
              />
              <button className="sh-stepper" style={{width:36,height:38,fontSize:18}} onClick={()=>setLogHours(h=>Math.min(24,+(+h+0.5).toFixed(1)))}>+</button>
            </div>
            <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>
              {[1,2,3,4,5,6,7,8].map(n=>(
                <button key={n} className="sh-preset" onClick={()=>setLogHours(n)}>{n}h</button>
              ))}
            </div>
            <button className="sh-modal-save" style={{width:'100%',height:34,fontSize:11}} onClick={()=>handleLogHours(popup.date, logHours)}>
              Save {logHours}h
            </button>
          </div>
        </div>
      )}

      {/* Settings modal */}
      {showSettings && settForm && (
        <div className="sh-sett-overlay">
          <div className="sh-sett-modal">
            <div className="sh-sett-title">Study Hours Settings</div>
            <div className="sh-sett-sub">Set your daily target and choose heatmap colors for light and dark themes.</div>

            <div className="sh-sett-field">
              <label className="sh-sett-label">Daily Target (hours)</label>
              <div className="sh-target-wrap">
                <button className="sh-target-btn" onClick={()=>setSettForm(f=>({...f,target_hours:Math.max(0.5,+(+f.target_hours-0.5).toFixed(1))}))}>−</button>
                <input className="sh-target-input" type="number" min="0.5" max="24" step="0.5"
                  value={settForm.target_hours}
                  onChange={e=>setSettForm(f=>({...f,target_hours:Math.max(0.5,Math.min(24,+e.target.value||0.5))}))}
                />
                <button className="sh-target-btn" onClick={()=>setSettForm(f=>({...f,target_hours:Math.min(24,+(+f.target_hours+0.5).toFixed(1))}))}>+</button>
              </div>
            </div>

            <div className="sh-sett-field">
              <label className="sh-sett-label">Light Theme Colors</label>
              <div className="sh-color-row">
                <div className="sh-color-field">
                  <label>Met Target</label>
                  <input type="color" className="sh-color-input" value={settForm.color_met} onChange={e=>setSettForm(f=>({...f,color_met:e.target.value}))}/>
                </div>
                <div className="sh-color-field">
                  <label>Below Target</label>
                  <input type="color" className="sh-color-input" value={settForm.color_unmet} onChange={e=>setSettForm(f=>({...f,color_unmet:e.target.value}))}/>
                </div>
              </div>
            </div>

            <div className="sh-sett-field">
              <label className="sh-sett-label">Dark Theme Colors</label>
              <div className="sh-color-row">
                <div className="sh-color-field">
                  <label>Met Target</label>
                  <input type="color" className="sh-color-input" value={settForm.color_met_dark} onChange={e=>setSettForm(f=>({...f,color_met_dark:e.target.value}))}/>
                </div>
                <div className="sh-color-field">
                  <label>Below Target</label>
                  <input type="color" className="sh-color-input" value={settForm.color_unmet_dark} onChange={e=>setSettForm(f=>({...f,color_unmet_dark:e.target.value}))}/>
                </div>
              </div>
            </div>

            <div style={{padding:'10px 12px',background:'var(--s-low)',borderRadius:8,marginBottom:12,display:'flex',gap:10,alignItems:'center'}}>
              <div style={{width:28,height:28,borderRadius:6,background:isDark?settForm.color_met_dark:settForm.color_met,flexShrink:0}}/>
              <div style={{width:28,height:28,borderRadius:6,background:isDark?settForm.color_unmet_dark:settForm.color_unmet,flexShrink:0}}/>
              <span style={{fontSize:11,color:'var(--muted)'}}>Preview ({isDark?'dark':'light'} theme): met target vs below target</span>
            </div>

            <button className="sh-sett-save" onClick={()=>saveSettings(settForm)}>Save Settings</button>
            <button className="sh-sett-cancel" onClick={()=>setShowSettings(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== QUESTION COUNTER =====================
function QuestionCounter({ user, showToast }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [count, setCount] = useState(25);
  const [subject, setSubject] = useState('');
  const [qtype, setQtype] = useState('');
  const [saving, setSaving] = useState(false);
  const [leftTab, setLeftTab] = useState('log'); // 'log' | 'settings'
  // Custom types: [{type_id, label, color, sort_order, is_default}]
  const [types, setTypes] = useState([]);
  const [newTypeName, setNewTypeName] = useState('');
  const [newTypeColor, setNewTypeColor] = useState('#6366f1');
  const [savingType, setSavingType] = useState(false);

  const SUBJS = [
    {id:'maths',  label:'Maths',    color:'var(--c-maths)'},
    {id:'physics',label:'Physics',  color:'var(--c-physics)'},
    {id:'organic',label:'Organic',  color:'var(--c-organic)'},
    {id:'inorganic',label:'Inorganic',color:'var(--c-inorganic)'},
    {id:'physical',label:'Physical', color:'var(--c-physical)'},
  ];

  const DEFAULT_TYPES = [
    {type_id:'mains',    label:'Mains',    color:'#2563eb', is_default:true},
    {type_id:'advanced', label:'Advanced', color:'#dc2626', is_default:true},
    {type_id:'practice', label:'Practice', color:'#16a34a', is_default:true},
  ];

  useEffect(() => {
    if (!user) return;
    Promise.all([
      sb.from('question_logs').select('*').eq('user_id', user.id).order('logged_at',{ascending:false}),
      sb.from('question_type_settings').select('*').eq('user_id', user.id).order('sort_order')
    ]).then(([logsRes, typesRes]) => {
      if (!logsRes.error) setLogs(logsRes.data || []);
      if (!typesRes.error && typesRes.data.length > 0) {
        setTypes(typesRes.data.map(t => ({...t, is_default: false})));
      } else {
        setTypes(DEFAULT_TYPES);
      }
      setLoading(false);
    });
  }, [user]);

  // All types to use (defaults + custom, or just DB list)
  const allTypes = types;

  const total = logs.reduce((a,l) => a+l.count, 0);
  const byType = {};
  const bySubj = {maths:0, physics:0, organic:0, inorganic:0, physical:0};
  logs.forEach(l => {
    byType[l.question_type] = (byType[l.question_type]||0) + l.count;
    bySubj[l.subject] = (bySubj[l.subject]||0) + l.count;
  });

  function getTypeColor(typeId) {
    const t = allTypes.find(t => t.type_id === typeId);
    return t ? t.color : 'var(--s-dim)';
  }
  function getTypeLabel(typeId) {
    const t = allTypes.find(t => t.type_id === typeId);
    return t ? t.label : typeId;
  }

  async function handleLog() {
    if (!subject || !qtype || count < 1) return;
    setSaving(true);
    const { data, error } = await sb.from('question_logs').insert({
      user_id: user.id, count, subject, question_type: qtype
    }).select().single();
    if (error) { showToast('Failed to log questions', 'error'); }
    else { setLogs(p => [data, ...p]); showToast(`Logged ${count} questions!`, 'add_circle'); setCount(25); setSubject(''); setQtype(''); }
    setSaving(false);
  }

  async function handleDelete(id) {
    const { error } = await sb.from('question_logs').delete().eq('id', id);
    if (error) { showToast('Delete failed', 'error'); return; }
    setLogs(p => p.filter(l => l.id !== id));
    showToast('Entry deleted', 'delete');
  }

  async function handleClearAll() {
    if (!confirm('Delete all question logs? This cannot be undone.')) return;
    const { error } = await sb.from('question_logs').delete().eq('user_id', user.id);
    if (error) { showToast('Clear failed', 'error'); return; }
    setLogs([]);
    showToast('All logs cleared', 'delete_forever');
  }

  async function handleAddType() {
    const trimmed = newTypeName.trim();
    if (!trimmed) return;
    setSavingType(true);
    const typeId = 'custom_' + Date.now();
    const sortOrder = types.filter(t => !t.is_default).length;
    const { error } = await sb.from('question_type_settings').insert({
      user_id: user.id, type_id: typeId, label: trimmed, color: newTypeColor, sort_order: sortOrder
    });
    if (error) { showToast('Failed to add type', 'error'); }
    else {
      // If first custom type, also save defaults to DB
      const allInDb = types.filter(t => !t.is_default);
      if (allInDb.length === 0) {
        const defRows = DEFAULT_TYPES.map((t, i) => ({user_id: user.id, type_id: t.type_id, label: t.label, color: t.color, sort_order: -10+i}));
        await sb.from('question_type_settings').upsert(defRows, {onConflict:'user_id,type_id'});
      }
      const newT = {type_id: typeId, label: trimmed, color: newTypeColor, sort_order: sortOrder, is_default: false};
      setTypes(p => [...p, newT]);
      setNewTypeName('');
      setNewTypeColor('#6366f1');
      showToast(`Type "${trimmed}" added`, 'add_circle');
    }
    setSavingType(false);
  }

  async function handleUpdateTypeColor(typeId, color) {
    setTypes(p => p.map(t => t.type_id === typeId ? {...t, color} : t));
    await sb.from('question_type_settings').upsert(
      {user_id: user.id, type_id: typeId, color, label: allTypes.find(t=>t.type_id===typeId)?.label || typeId},
      {onConflict: 'user_id,type_id'}
    );
  }

  async function handleDeleteType(typeId) {
    if (!confirm('Delete this question type? Past logs using it will still exist.')) return;
    const { error } = await sb.from('question_type_settings').delete().eq('user_id', user.id).eq('type_id', typeId);
    if (error) { showToast('Delete failed', 'error'); return; }
    setTypes(p => p.filter(t => t.type_id !== typeId));
    if (qtype === typeId) setQtype('');
    showToast('Type removed', 'delete');
  }

  function fmtLogTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' · ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  }

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="qc-layout">
      {/* Hero bar */}
      <div className="qc-hero-bar">
        <div className="qc-hero-top">
          <div className="qc-hero-left">
            <div className="qc-total-label">Total Questions Solved</div>
            <div className="qc-total">{total.toLocaleString()}</div>
            <div className="qc-total-sub">across {Object.values(bySubj).filter(v=>v>0).length} subjects &amp; {Object.keys(byType).length} types</div>
          </div>
          <div className="qc-type-legend">
            {allTypes.map(t => (
              <div key={t.type_id} className="qc-type-item">
                <div className="qc-type-dot" style={{background: t.color}}/>
                <span className="qc-type-name">{t.label}</span>
                <span className="qc-type-num">{(byType[t.type_id]||0).toLocaleString()}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="qc-subjects">
          {SUBJS.map(s => {
            const pct = total > 0 ? Math.round((bySubj[s.id]||0)/total*100) : 0;
            return (
              <div key={s.id} className="qc-subj-cell" style={{borderLeft:`3px solid ${s.color}`}}>
                <div className="qc-subj-label">{s.label}</div>
                <div className="qc-subj-num" style={{color: s.color}}>{(bySubj[s.id]||0).toLocaleString()}</div>
                <div className="qc-subj-bar-wrap"><div className="qc-subj-bar" style={{width:`${pct}%`, background: s.color}}/></div>
                <div className="qc-subj-pct">{pct}% of total</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="qc-body">
        {/* Left panel */}
        <div className="qc-left">
          {/* Tabs */}
          <div className="qc-left-tabs">
            <button className={`qc-left-tab${leftTab==='log'?' active':''}`} onClick={()=>setLeftTab('log')}>
              <span className="icon">edit_note</span>Log
            </button>
            <button className={`qc-left-tab${leftTab==='settings'?' active':''}`} onClick={()=>setLeftTab('settings')}>
              <span className="icon">tune</span>Types
            </button>
          </div>

          {/* LOG FORM */}
          {leftTab === 'log' && (
            <div className="qc-form">
              <div className="qc-form-scroll">
                {/* Count */}
                <div className="qc-form-section">
                  <span className="qc-form-section-label">Number of Questions</span>
                  <div className="qc-count-wrap">
                    <button className="qc-stepper" onClick={()=>setCount(c=>Math.max(1,c-1))}>−</button>
                    <input className="qc-count-input" type="number" min="1" value={count}
                      onChange={e=>setCount(Math.max(1,+e.target.value||1))}/>
                    <button className="qc-stepper" onClick={()=>setCount(c=>c+1)}>+</button>
                  </div>
                  <div className="qc-presets">
                    {[5,10,20,30,50,75,90].map(n => (
                      <button key={n} className="qc-preset" onClick={()=>setCount(n)}>{n}</button>
                    ))}
                  </div>
                </div>

                {/* Subject */}
                <div className="qc-form-section">
                  <span className="qc-form-section-label">Subject</span>
                  <div className="qc-chip-grid">
                    {SUBJS.map(s => {
                      const sel = subject === s.id;
                      return (
                        <button key={s.id} className={`qc-chip${sel?' selected':''}`}
                          style={sel ? {background:s.color, borderColor:s.color} : {}}
                          onClick={()=>setSubject(subject===s.id?'':s.id)}>
                          <div className="qc-chip-dot" style={{background: sel ? 'rgba(255,255,255,0.8)' : s.color}}/>
                          {s.label}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Type */}
                <div className="qc-form-section">
                  <span className="qc-form-section-label">
                    Type
                    <span style={{fontWeight:400,marginLeft:6,fontSize:8,color:'var(--faint)',letterSpacing:0,textTransform:'none'}}>— manage in Types tab</span>
                  </span>
                  <div className="qc-chip-grid">
                    {allTypes.map(t => {
                      const sel = qtype === t.type_id;
                      return (
                        <button key={t.type_id} className={`qc-chip${sel?' selected':''}`}
                          style={sel ? {background:t.color, borderColor:t.color} : {borderColor: sel?t.color:'var(--s-dim)'}}
                          onClick={()=>setQtype(qtype===t.type_id?'':t.type_id)}>
                          <div className="qc-chip-dot" style={{background: sel ? 'rgba(255,255,255,0.8)' : t.color}}/>
                          {t.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="qc-form-footer">
                <button className="qc-log-btn" disabled={!subject||!qtype||saving} onClick={handleLog}>
                  {saving && <span className="spinner" style={{width:13,height:13,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/>}
                  {saving ? 'Saving…' : 'Log Questions'}
                </button>
              </div>
            </div>
          )}

          {/* SETTINGS / TYPES */}
          {leftTab === 'settings' && (
            <div className="qc-settings">
              <div className="qc-settings-section">
                <div className="qc-settings-head">
                  Question Types
                  <span style={{fontWeight:400,fontSize:9,letterSpacing:0,textTransform:'none',color:'var(--faint)'}}>click swatch to recolor</span>
                </div>
                {allTypes.map(t => (
                  <div key={t.type_id} className="qc-type-row">
                    <div className="qc-type-row-swatch" style={{background: t.color}}
                      title="Click to change color">
                      <input type="color" value={t.color}
                        onChange={e => handleUpdateTypeColor(t.type_id, e.target.value)}/>
                    </div>
                    <span className="qc-type-row-name">{t.label}</span>
                    {t.is_default
                      ? <span className="qc-default-badge">default</span>
                      : <button className="qc-type-row-del" onClick={()=>handleDeleteType(t.type_id)}>
                          <span className="icon">delete</span>
                        </button>
                    }
                  </div>
                ))}
              </div>

              <div className="qc-settings-section">
                <div className="qc-settings-head">Add Custom Type</div>
                <div className="qc-add-type-form">
                  <div className="qc-add-type-swatch" style={{background: newTypeColor}} title="Choose color">
                    <input type="color" value={newTypeColor} onChange={e=>setNewTypeColor(e.target.value)}/>
                  </div>
                  <input className="qc-add-type-input" type="text" placeholder="e.g. DPP, PYQ, Mock…"
                    value={newTypeName} onChange={e=>setNewTypeName(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&handleAddType()}
                    maxLength={20}/>
                  <button className="qc-add-type-btn" disabled={!newTypeName.trim()||savingType} onClick={handleAddType}>
                    Add
                  </button>
                </div>
                <div style={{fontSize:10,color:'var(--faint)',marginTop:8,lineHeight:1.5}}>
                  Custom types appear in the Log form and on history entries. Default types (Mains, Advanced, Practice) can be recolored but not deleted.
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Right: history */}
        <div className="qc-right">
          <div className="qc-history">
            <div className="qc-history-head">
              <span className="qc-history-title">History ({logs.length})</span>
              {logs.length > 0 && <button className="btn-ghost" onClick={handleClearAll}>Clear All</button>}
            </div>
            {logs.length === 0 ? (
              <div className="qc-empty">
                <span className="icon">calculate</span>
                No questions logged yet.<br/>Log your first session using the form.
              </div>
            ) : logs.map(l => {
              const subjColor = SUBJS.find(s => s.id === l.subject)?.color || 'var(--s-dim)';
              const tColor = getTypeColor(l.question_type);
              const tLabel = getTypeLabel(l.question_type);
              return (
                <div key={l.id} className="qc-entry">
                  <div style={{width:4,alignSelf:'stretch',flexShrink:0,background:subjColor,borderRadius:2}}/>
                  <div className="qc-entry-left">
                    <div className="qc-entry-count" style={{color:subjColor}}>{l.count}</div>
                    <div className="qc-entry-count-lbl">Qs</div>
                  </div>
                  <div className="qc-entry-info">
                    <div className="qc-entry-subj">{SUBJS.find(s=>s.id===l.subject)?.label || l.subject}</div>
                    <div className="qc-entry-meta">{fmtLogTime(l.logged_at)}</div>
                  </div>
                  <span className="qc-entry-badge" style={{borderColor:tColor, color:tColor}}>{tLabel}</span>
                  <button className="qc-del-btn" onClick={()=>handleDelete(l.id)}>
                    <span className="icon">delete</span>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}
// ===================== MOCK ANALYSIS =====================
// DEFAULT test types (used as fallback if user has no custom types)
const DEFAULT_MOCK_TYPES = [
  { type_id: 'mains',    label: 'Mains',    color: '#2563eb' },
  { type_id: 'advanced', label: 'Advanced', color: '#dc2626' },
  { type_id: 'practice', label: 'Practice', color: '#16a34a' },
];

function MockAnalysis({ user, showToast }) {
  const [mocks, setMocks] = useState([]);
  const [testTypes, setTestTypes] = useState([]); // custom types from DB
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  // Right panel view: 'analytics' | 'history'
  const [rightView, setRightView] = useState('analytics');
  // Subject perf view: 'bars' | 'cards'
  const [subjView, setSubjView] = useState('bars');
  // Chart type: 'line' | 'bar' | 'scatter'
  const [chartType, setChartType] = useState('line');
  // Chart filter by type_id
  const [chartFilter, setChartFilter] = useState('all');

  // Settings modal
  const [showSettings, setShowSettings] = useState(false);
  const [newTypeLabel, setNewTypeLabel] = useState('');
  const [newTypeColor, setNewTypeColor] = useState('#6366f1');

  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  // Effective types = custom if any, else defaults
  const effectiveTypes = testTypes.length > 0 ? testTypes : DEFAULT_MOCK_TYPES;

  const [form, setForm] = useState({
    test_name:'', test_type:'', test_date:today(),
    marks_maths:0, marks_physics:0, marks_chemistry:0,
    max_marks:300, notes:''
  });

  const SUBJS = [
    { id:'marks_maths',    label:'Maths',     key:'maths',     color:'var(--c-maths)' },
    { id:'marks_physics',  label:'Physics',   key:'physics',   color:'var(--c-physics)' },
    { id:'marks_chemistry',label:'Chemistry', key:'chemistry', color:'var(--c-organic)' },
  ];

  function splitChem(total) {
    const base = Math.floor(total / 3), rem = total % 3;
    return { marks_organic: base+(rem>0?1:0), marks_inorganic: base+(rem>1?1:0), marks_physical: base };
  }
  function mockChem(m) { return (m.marks_organic||0)+(m.marks_inorganic||0)+(m.marks_physical||0); }

  function getTypeColor(typeId) {
    const t = effectiveTypes.find(t=>t.type_id===typeId);
