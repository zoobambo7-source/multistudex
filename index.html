    return t ? t.color : '#888';
  }
  function getTypeLabel(typeId) {
    const t = effectiveTypes.find(t=>t.type_id===typeId);
    return t ? t.label : typeId;
  }

  useEffect(()=>{
    if (!user) return;
    Promise.all([
      sb.from('mock_tests').select('*').eq('user_id',user.id).order('test_date',{ascending:true}),
      sb.from('mock_test_types').select('*').eq('user_id',user.id).order('sort_order').order('created_at'),
    ]).then(([mocksRes, typesRes])=>{
      setMocks(mocksRes.data||[]);
      setTestTypes(typesRes.data||[]);
      // set default form type
      const types = typesRes.data?.length ? typesRes.data : DEFAULT_MOCK_TYPES;
      setForm(f=>({...f, test_type: types[0]?.type_id || 'mains'}));
      setLoading(false);
    });
  },[user]);

  // Build chart with Chart.js
  useEffect(()=>{
    if (loading || !chartRef.current) return;
    const isDark = document.documentElement.getAttribute('data-theme')==='dark';
    // Sort by date first — oldest to newest — so chart shows chronological growth
    const filtered = (chartFilter==='all' ? [...mocks] : mocks.filter(m=>m.test_type===chartFilter))
      .sort((a,b) => a.test_date.localeCompare(b.test_date));
    const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#888' : '#666';

    if (chartInstance.current) { try { chartInstance.current.destroy(); } catch(e){} chartInstance.current=null; }
    if (filtered.length < 1) return;

    const labels = filtered.map(m=>{ const d=new Date(m.test_date+'T00:00:00'); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); });
    const pcts   = filtered.map(m=>Math.round(m.total_marks/m.max_marks*100));
    const colors = filtered.map(m=>{ const c=getTypeColor(m.test_type); return c; });
    const ctx = chartRef.current.getContext('2d');

    const sharedOpts = {
      responsive:true, maintainAspectRatio:false, animation:{duration:300},
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{
        label: ctx2=>`${pcts[ctx2.dataIndex]}% — ${filtered[ctx2.dataIndex]?.test_name||''}`
      }}},
      scales:{
        x:{ grid:{color:gridColor}, ticks:{color:textColor,font:{family:'Geist',size:10},maxRotation:40} },
        y:{ grid:{color:gridColor}, ticks:{color:textColor,font:{family:'Geist',size:10},callback:v=>v+'%'}, min:0, max:100 }
      }
    };

    if (chartType==='line') {
      chartInstance.current = new Chart(ctx, { type:'line', data:{ labels, datasets:[{
        label:'Score %', data:pcts,
        borderColor: isDark?'#f0f0f0':'#000', borderWidth:2.5,
        pointBackgroundColor:colors, pointBorderColor:colors, pointRadius:5, pointHoverRadius:7,
        backgroundColor: isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)',
        fill:true, tension:0.3,
      }]}, options:sharedOpts });
    } else if (chartType==='bar') {
      chartInstance.current = new Chart(ctx, { type:'bar', data:{ labels, datasets:[{
        label:'Score %', data:pcts,
        backgroundColor: colors.map(c=>c+'cc'), borderColor:colors, borderWidth:1.5, borderRadius:5,
      }]}, options:sharedOpts });
    } else if (chartType==='scatter') {
      const scatterData = filtered.map((m,i)=>({ x:i, y:pcts[i], label:labels[i], name:m.test_name }));
      chartInstance.current = new Chart(ctx, { type:'scatter', data:{ datasets:[{
        label:'Score %', data:scatterData,
        backgroundColor:colors.map(c=>c+'bb'), pointRadius:7, pointHoverRadius:9,
      }]}, options:{...sharedOpts, scales:{
        x:{...sharedOpts.scales.x, ticks:{...sharedOpts.scales.x.ticks, callback:(_,i)=>labels[i]||''}},
        y:sharedOpts.scales.y
      }}});
    }
  },[mocks, chartFilter, chartType, loading]);

  const liveTotal = (+form.marks_maths||0)+(+form.marks_physics||0)+(+form.marks_chemistry||0);
  const livePct = form.max_marks>0 ? Math.round(liveTotal/form.max_marks*100) : 0;

  async function handleSubmit() {
    if (!form.test_name.trim()) { showToast('Enter a test name','error'); return; }
    if (!form.test_type) { showToast('Select a test type','error'); return; }
    setSaving(true);
    const chemSplit = splitChem(+form.marks_chemistry||0);
    const payload = { ...form, user_id:user.id,
      marks_maths:+form.marks_maths||0, marks_physics:+form.marks_physics||0,
      ...chemSplit, max_marks:+form.max_marks||300 };
    delete payload.marks_chemistry;
    const { data, error } = await sb.from('mock_tests').insert(payload).select().single();
    if (error) { showToast('Failed to save mock','error'); }
    else {
      setMocks(p=>[...p,data].sort((a,b)=>a.test_date>b.test_date?1:-1));
      showToast('Mock test saved!','bar_chart');
      setForm({test_name:'',test_type:effectiveTypes[0]?.type_id||'mains',test_date:today(),marks_maths:0,marks_physics:0,marks_chemistry:0,max_marks:300,notes:''});
    }
    setSaving(false);
  }

  async function handleDelete(id) {
    const { error } = await sb.from('mock_tests').delete().eq('id',id);
    if (error) { showToast('Delete failed','error'); return; }
    setMocks(p=>p.filter(m=>m.id!==id));
    showToast('Mock deleted','delete');
  }

  // Settings: add type
  async function handleAddType() {
    if (!newTypeLabel.trim()) return;
    const type_id = newTypeLabel.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    if (effectiveTypes.find(t=>t.type_id===type_id)) { showToast('Type ID already exists','error'); return; }
    const { data, error } = await sb.from('mock_test_types')
      .insert({ user_id:user.id, type_id, label:newTypeLabel.trim(), color:newTypeColor, sort_order:testTypes.length })
      .select().single();
    if (error) { showToast('Failed to add type','error'); return; }
    setTestTypes(p=>[...p, data]);
    setNewTypeLabel(''); setNewTypeColor('#6366f1');
    showToast(`Type "${data.label}" added`,'palette');
  }

  // Settings: update type color
  async function handleTypeColorChange(id, color) {
    await sb.from('mock_test_types').update({color}).eq('id',id);
    setTestTypes(p=>p.map(t=>t.id===id?{...t,color}:t));
  }

  // Settings: delete type
  async function handleDeleteType(id, type_id) {
    const usedCount = mocks.filter(m=>m.test_type===type_id).length;
    if (usedCount>0) { showToast(`Cannot delete — ${usedCount} mock${usedCount>1?'s':''} use this type`,'error'); return; }
    await sb.from('mock_test_types').delete().eq('id',id);
    setTestTypes(p=>p.filter(t=>t.id!==id));
    showToast('Type removed','delete');
  }

  // Stats
  const count   = mocks.length;
  const avgPct  = count===0?0:Math.round(mocks.reduce((a,m)=>a+m.total_marks/m.max_marks*100,0)/count);
  const bestPct = count===0?0:Math.round(Math.max(...mocks.map(m=>m.total_marks/m.max_marks*100)));
  const avgMarks= count===0?0:Math.round(mocks.reduce((a,m)=>a+m.total_marks,0)/count);

  const subjAvgs = { maths:0, physics:0, chemistry:0 };
  if (count) {
    let totM=0,totP=0,totC=0,maxM=0,maxP=0,maxC=0;
    mocks.forEach(m=>{
      totM+=(m.marks_maths||0); totP+=(m.marks_physics||0); totC+=mockChem(m);
      maxM+=m.max_marks/3; maxP+=m.max_marks/3; maxC+=m.max_marks/3;
    });
    subjAvgs.maths     = maxM>0?Math.round(totM/maxM*100):0;
    subjAvgs.physics   = maxP>0?Math.round(totP/maxP*100):0;
    subjAvgs.chemistry = maxC>0?Math.round(totC/maxC*100):0;
  }

  function tierClass(pct){ return pct>=70?'tier-green':pct>=40?'tier-amber':'tier-red'; }
  function pctClass(pct) { return pct>=70?'green':pct>=40?'amber':'red'; }

  const chartFilteredCount = chartFilter==='all'?mocks.length:mocks.filter(m=>m.test_type===chartFilter).length;

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="ma-layout">
      {/* ── LEFT: form ── */}
      <div className="ma-left">
        <div className="ma-form-header">
          <div className="ma-form-header-left">
            <div className="ma-form-header-title">Mock Analysis</div>
            <div className="ma-form-header-sub">Log tests · track trends</div>
          </div>
          <button className="ma-settings-btn" onClick={()=>setShowSettings(true)}>
            <span className="icon">tune</span>Types
          </button>
        </div>
        <div className="ma-form">
          <div className="ma-form-title">Log Mock Test</div>
          <div className="ma-field">
            <label>Test Name</label>
            <input type="text" value={form.test_name} onChange={e=>setForm(p=>({...p,test_name:e.target.value}))} placeholder="e.g. Allen Major 12"/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:9,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Type</div>
            <div className="ma-type-btns">
              {effectiveTypes.map(t=>{
                const isActive = form.test_type===t.type_id;
                return (
                  <button key={t.type_id}
                    className={`ma-type-btn${isActive?' active':''}`}
                    style={isActive?{background:t.color,borderColor:t.color}:{borderColor:t.color+'66',color:t.color}}
                    onClick={()=>setForm(p=>({...p,test_type:t.type_id}))}>
                    {t.label}
                  </button>
                );
              })}
            </div>
          </div>
          <div className="ma-field"><label>Date</label><input type="date" value={form.test_date} onChange={e=>setForm(p=>({...p,test_date:e.target.value}))}/></div>
          <div className="ma-scores-section-lbl">Subject Marks</div>
          <div className="ma-scores-grid">
            {SUBJS.map(s=>{
              const perSubjMax = Math.floor((+form.max_marks||300)/3);
              return (
                <div key={s.id} className="ma-score-field">
                  <span className="ma-score-label">{s.label} <span style={{fontWeight:400,opacity:0.6}}>/{perSubjMax}</span></span>
                  <input className="ma-score-input" type="number" min="0" max={perSubjMax} value={form[s.id]}
                    onChange={e=>{ const v=Math.min(Math.max(0,+e.target.value||0),perSubjMax); setForm(p=>({...p,[s.id]:v})); }}
                    onBlur={e=>{ const v=Math.min(Math.max(0,+e.target.value||0),perSubjMax); setForm(p=>({...p,[s.id]:v})); }}
                    style={+form[s.id]>perSubjMax?{borderColor:'var(--err)'}:{}}/>
                </div>
              );
            })}
            <div className="ma-score-field">
              <span className="ma-score-label">Max Marks</span>
              <input className="ma-score-input" type="number" min="1" value={form.max_marks}
                onChange={e=>{ const nm=+e.target.value||300; const cap=Math.floor(nm/3);
                  setForm(p=>({...p,max_marks:e.target.value,marks_maths:Math.min(+p.marks_maths,cap),marks_physics:Math.min(+p.marks_physics,cap),marks_chemistry:Math.min(+p.marks_chemistry,cap)})); }}/>
            </div>
          </div>
          <div className="ma-live-total">
            <div><div className="ma-live-label">Total Score</div><div className="ma-live-num">{liveTotal} / {form.max_marks}</div></div>
            <div className="ma-live-pct">{livePct}%</div>
          </div>
          <div className="ma-field">
            <label>Notes (optional)</label>
            <textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Reflections, weak areas..."/>
          </div>
          <button className="ma-submit-btn" disabled={saving||!form.test_name.trim()||!form.test_type} onClick={handleSubmit}>
            {saving&&<span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/>}
            Save Mock
          </button>
        </div>
      </div>

      {/* ── RIGHT: analytics + history ── */}
      <div className="ma-right">
        {/* Summary stat strip */}
        <div className="ma-stats-strip">
          {[{num:count,lbl:'Tests Logged'},{num:avgPct+'%',lbl:'Avg Score'},{num:bestPct+'%',lbl:'Best Score'},{num:avgMarks,lbl:'Avg Marks'}].map((s,i)=>(
            <div key={i} className="ma-stat">
              <div className="ma-stat-num">{s.num}</div>
              <div className="ma-stat-lbl">{s.lbl}</div>
            </div>
          ))}
        </div>

        {/* Tab bar: Analytics / History */}
        <div className="ma-right-tabs">
          <button className={`ma-right-tab${rightView==='analytics'?' active':''}`} onClick={()=>setRightView('analytics')}>
            <span className="icon">insights</span>Analytics
          </button>
          <button className={`ma-right-tab${rightView==='history'?' active':''}`} onClick={()=>setRightView('history')}>
            <span className="icon">history</span>History
            {count>0&&<span className="ma-right-tab-count">{count}</span>}
          </button>
        </div>

        {/* ── ANALYTICS PANEL ── */}
        {rightView==='analytics' && (
          <div className="ma-analytics-panel">

            {/* Subject Performance — switchable */}
            <div className="ma-subj-perf">
              <div className="ma-subj-perf-header">
                <span className="ma-subj-perf-title">Avg % by Subject</span>
                <div className="ma-subj-view-toggle">
                  <button className={`ma-subj-view-btn${subjView==='bars'?' active':''}`} onClick={()=>setSubjView('bars')} title="Bar view">
                    <span className="icon">align_start</span>
                  </button>
                  <button className={`ma-subj-view-btn${subjView==='cards'?' active':''}`} onClick={()=>setSubjView('cards')} title="Card view">
                    <span className="icon">grid_view</span>
                  </button>
                </div>
              </div>

              {subjView==='bars' ? (
                SUBJS.map(s=>(
                  <div key={s.key} className="ma-perf-row">
                    <span className="ma-perf-label">{s.label}</span>
                    <div className="ma-perf-bar-wrap">
                      <div className="ma-perf-bar" style={{width:`${subjAvgs[s.key]}%`,background:s.color}}/>
                    </div>
                    <span className="ma-perf-val">{subjAvgs[s.key]}%</span>
                  </div>
                ))
              ) : (
                <div className="ma-subj-cards">
                  {SUBJS.map(s=>{
                    const pct=subjAvgs[s.key];
                    return (
                      <div key={s.key} className="ma-subj-card">
                        <div className="ma-subj-card-accent" style={{background:s.color}}/>
                        <div className="ma-subj-card-label">{s.label}</div>
                        <div className="ma-subj-card-pct" style={{color:s.color}}>{pct}%</div>
                        <div className="ma-subj-card-bar">
                          <div className="ma-subj-card-bar-fill" style={{width:`${pct}%`,background:s.color}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Chart section */}
            <div className="ma-chart-section" style={{flex:1}}>
              <div className="ma-chart-header">
                <span className="ma-chart-header-left">Performance Trend</span>
                <div className="ma-chart-controls">
                  {/* Chart type toggle */}
                  <div className="ma-pill-group">
                    {[{id:'line',icon:'show_chart'},{id:'bar',icon:'bar_chart'},{id:'scatter',icon:'scatter_plot'}].map(ct=>(
                      <button key={ct.id} className={`ma-pill${chartType===ct.id?' active':''}`}
                        onClick={()=>setChartType(ct.id)} title={ct.id}>
                        <span className="icon" style={{fontSize:12,verticalAlign:'middle',marginRight:3}}>{ct.icon}</span>{ct.id}
                      </button>
                    ))}
                  </div>
                  {/* Filter by type */}
                  <div className="ma-pill-group">
                    <button className={`ma-pill${chartFilter==='all'?' active':''}`} onClick={()=>setChartFilter('all')}>All</button>
                    {effectiveTypes.map(t=>(
                      <button key={t.type_id} className={`ma-pill${chartFilter===t.type_id?' active':''}`}
                        style={chartFilter===t.type_id?{background:t.color,borderColor:t.color}:{borderColor:t.color+'55',color:t.color}}
                        onClick={()=>setChartFilter(t.type_id)}>{t.label}</button>
                    ))}
                  </div>
                </div>
              </div>
              {chartFilteredCount < 1 ? (
                <div className="ma-chart-empty">
                  <span className="icon">show_chart</span>
                  {count===0?'Log your first mock test to see the trend':'No mocks for this filter'}
                </div>
              ) : chartFilteredCount < 2 && chartType!=='scatter' && chartType!=='bar' ? (
                <div className="ma-chart-empty">
                  <span className="icon">show_chart</span>Add at least 2 tests to see the trend
                </div>
              ) : (
                <div className="ma-chart-canvas-wrap">
                  <canvas ref={chartRef}/>
                </div>
              )}
            </div>

          </div>
        )}

        {/* ── HISTORY PANEL ── */}
        {rightView==='history' && (
          <div className="ma-history-panel">
            <div className="ma-history-header">
              <span className="ma-history-title">All Mocks ({count})</span>
              <div className="ma-pill-group">
                <button className="ma-pill active" style={{cursor:'default'}}>Newest first</button>
              </div>
            </div>
            {count===0 ? (
              <div className="ma-empty">
                <span className="icon">bar_chart</span>
                No mock tests logged yet. Add your first test to start tracking.
              </div>
            ) : (
              <div className="ma-cards-grid">
                {[...mocks].reverse().map(m=>{
                  const pct = Math.round(m.total_marks/m.max_marks*100);
                  const typeColor = getTypeColor(m.test_type);
                  const typeLabel = getTypeLabel(m.test_type);
                  return (
                    <div key={m.id} className={`ma-card ${tierClass(pct)}`}>
                      <div className="ma-card-top">
                        <div className="ma-card-name">{m.test_name}</div>
                        <div className="ma-card-date">{fmtDate(m.test_date)}</div>
                        <div className={`ma-card-pct ${pctClass(pct)}`}>{pct}%</div>
                        <div className="ma-card-marks">{m.total_marks} / {m.max_marks} marks</div>
                      </div>
                      <div className="ma-card-tags">
                        <span className="ma-card-tag">M: {m.marks_maths||0}</span>
                        <span className="ma-card-tag">P: {m.marks_physics||0}</span>
                        <span className="ma-card-tag">C: {mockChem(m)}</span>
                      </div>
                      {m.notes&&<div className="ma-card-notes">{m.notes}</div>}
                      <div className="ma-card-footer">
                        <span className="ma-card-type-badge" style={{borderColor:typeColor,color:typeColor}}>{typeLabel}</span>
                        <button className="ma-card-del" onClick={()=>handleDelete(m.id)}>
                          <span className="icon">delete</span>
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── SETTINGS MODAL ── */}
      {showSettings && (
        <div className="ma-modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false)}}>
          <div className="ma-modal">
            <div className="ma-modal-head">
              <div>
                <div className="ma-modal-head-title">Test Types</div>
                <div className="ma-modal-head-sub">Manage types · assign colors</div>
              </div>
              <button className="ma-modal-close" onClick={()=>setShowSettings(false)}>
                <span className="icon">close</span>
              </button>
            </div>
            <div className="ma-modal-body">
              {/* Existing types */}
              <div className="ma-type-list">
                {effectiveTypes.map((t,i)=>{
                  const isDefault = testTypes.length===0;
                  return (
                    <div key={t.type_id||i} className="ma-type-row">
                      <div className="ma-type-color-dot" style={{background:t.color}}>
                        {!isDefault && (
                          <input type="color" value={t.color}
                            onChange={e=>{
                              if(!isDefault) handleTypeColorChange(t.id, e.target.value);
                            }}/>
                        )}
                      </div>
                      <div className="ma-type-row-name">{t.label}</div>
                      <div style={{fontSize:10,color:'var(--muted)',letterSpacing:'0.04em',fontFamily:'Geist,sans-serif'}}>{t.type_id}</div>
                      {isDefault ? (
                        <span className="ma-type-row-default">built-in</span>
                      ) : (
                        <button className="ma-type-del-btn" onClick={()=>handleDeleteType(t.id,t.type_id)}>
                          <span className="icon">delete</span>
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
              {/* Add new type */}
              <div className="ma-add-type-form">
                <div className="ma-add-type-color" style={{background:newTypeColor}}>
                  <input type="color" value={newTypeColor} onChange={e=>setNewTypeColor(e.target.value)}/>
                </div>
                <input className="ma-add-type-input" value={newTypeLabel}
                  onChange={e=>setNewTypeLabel(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&handleAddType()}
                  placeholder="New type name…"/>
                <button className="ma-add-type-btn" disabled={!newTypeLabel.trim()} onClick={handleAddType}>Add</button>
              </div>
              <div style={{marginTop:12,fontSize:11,color:'var(--muted)',lineHeight:1.5}}>
                Once you add a custom type, built-in types are replaced. Custom types will appear as pill buttons when logging a test.
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== DPP ANALYSIS =====================
const DPP_SUBJECTS = [
  { id:'maths',     label:'Maths',     color:'var(--c-maths)',   hex:'#2563eb' },
  { id:'physics',   label:'Physics',   color:'var(--c-physics)', hex:'#dc2626' },
  { id:'chemistry', label:'Chemistry', color:'var(--c-organic)', hex:'#16a34a' },
];

function DppAnalysis({ user, showToast }) {
  const [dpps, setDpps]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving]   = useState(false);

  // Right panel view
  const [rightView, setRightView] = useState('analytics');
  // Subject perf view: 'bars' | 'cards'
  const [subjView, setSubjView]   = useState('bars');
  // Chart controls
  const [chartType,   setChartType]   = useState('line');
  const [chartFilter, setChartFilter] = useState('all'); // 'all' | subject id

  const chartRef      = useRef(null);
  const chartInstance = useRef(null);

  const [form, setForm] = useState({
    dpp_name:'', subject:'maths', dpp_date:today(),
    marks_obtained:0, max_marks:100, notes:''
  });

  // Load DPPs
  useEffect(()=>{
    if (!user) return;
    sb.from('dpp_tests').select('*').eq('user_id',user.id)
      .order('dpp_date',{ascending:true})
      .then(({data})=>{ setDpps(data||[]); setLoading(false); });
  },[user]);

  // Build chart
  useEffect(()=>{
    if (loading || !chartRef.current) return;
    const isDark = document.documentElement.getAttribute('data-theme')==='dark';
    // Sort by date first — oldest to newest — so chart shows chronological growth
    const filtered = (chartFilter==='all' ? [...dpps] : dpps.filter(d=>d.subject===chartFilter))
      .sort((a,b) => a.dpp_date.localeCompare(b.dpp_date));
    const gridColor = isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
    const textColor = isDark?'#888':'#666';

    if (chartInstance.current){ try{ chartInstance.current.destroy(); }catch(e){} chartInstance.current=null; }
    if (filtered.length < 1) return;

    const labels  = filtered.map(d=>{ const dt=new Date(d.dpp_date+'T00:00:00'); return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); });
    const pcts    = filtered.map(d=>Math.round(d.marks_obtained/d.max_marks*100));
    const colors  = filtered.map(d=>{ const s=DPP_SUBJECTS.find(s=>s.id===d.subject); return s?s.hex:'#888'; });
    const ctx     = chartRef.current.getContext('2d');

    const sharedOpts = {
      responsive:true, maintainAspectRatio:false, animation:{duration:300},
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{
        label: c=>`${pcts[c.dataIndex]}% — ${filtered[c.dataIndex]?.dpp_name||''} (${filtered[c.dataIndex]?.subject||''})`
      }}},
      scales:{
        x:{ grid:{color:gridColor}, ticks:{color:textColor,font:{family:'Geist',size:10},maxRotation:40} },
        y:{ grid:{color:gridColor}, ticks:{color:textColor,font:{family:'Geist',size:10},callback:v=>v+'%'}, min:0, max:100 }
      }
    };

    if (chartType==='line') {
      chartInstance.current = new Chart(ctx, { type:'line', data:{ labels, datasets:[{
        label:'Score %', data:pcts,
        borderColor:isDark?'#f0f0f0':'#000', borderWidth:2.5,
        pointBackgroundColor:colors, pointBorderColor:colors, pointRadius:5, pointHoverRadius:7,
        backgroundColor:isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)',
        fill:true, tension:0.3,
      }]}, options:sharedOpts });
    } else if (chartType==='bar') {
      chartInstance.current = new Chart(ctx, { type:'bar', data:{ labels, datasets:[{
        label:'Score %', data:pcts,
        backgroundColor:colors.map(c=>c+'cc'), borderColor:colors, borderWidth:1.5, borderRadius:5,
      }]}, options:sharedOpts });
    } else if (chartType==='scatter') {
      chartInstance.current = new Chart(ctx, { type:'scatter', data:{ datasets:[{
        label:'Score %', data:filtered.map((d,i)=>({x:i,y:pcts[i]})),
        backgroundColor:colors.map(c=>c+'bb'), pointRadius:7, pointHoverRadius:9,
      }]}, options:{...sharedOpts, scales:{
        x:{...sharedOpts.scales.x, ticks:{...sharedOpts.scales.x.ticks, callback:(_,i)=>labels[i]||''}},
        y:sharedOpts.scales.y
      }}});
    }
  },[dpps, chartFilter, chartType, loading]);

  // Live calc
  const livePct = form.max_marks>0 ? Math.round((+form.marks_obtained||0)/(+form.max_marks||1)*100) : 0;

  async function handleSubmit() {
    if (!form.dpp_name.trim()) { showToast('Enter a DPP name','error'); return; }
    const mo = Math.max(0,+form.marks_obtained||0), mx = Math.max(1,+form.max_marks||100);
    if (mo > mx) { showToast('Marks obtained cannot exceed max marks','error'); return; }
    setSaving(true);
    const payload = {
      user_id:user.id, dpp_name:form.dpp_name.trim(), subject:form.subject,
      dpp_date:form.dpp_date, marks_obtained:mo, max_marks:mx, notes:form.notes
    };
    const { data, error } = await sb.from('dpp_tests').insert(payload).select().single();
    if (error) { showToast('Failed to save DPP','error'); }
    else {
      setDpps(p=>[...p,data].sort((a,b)=>a.dpp_date.localeCompare(b.dpp_date)));
      showToast('DPP saved!','book_2');
      setForm({dpp_name:'',subject:form.subject,dpp_date:today(),marks_obtained:0,max_marks:100,notes:''});
    }
    setSaving(false);
  }

  async function handleDelete(id) {
    const { error } = await sb.from('dpp_tests').delete().eq('id',id);
    if (error) { showToast('Delete failed','error'); return; }
    setDpps(p=>p.filter(d=>d.id!==id));
    showToast('DPP deleted','delete');
  }

  // Stats
  const count    = dpps.length;
  const avgPct   = count===0?0:Math.round(dpps.reduce((a,d)=>a+d.marks_obtained/d.max_marks*100,0)/count);
  const bestPct  = count===0?0:Math.round(Math.max(...dpps.map(d=>d.marks_obtained/d.max_marks*100)));
  const avgMarks = count===0?0:Math.round(dpps.reduce((a,d)=>a+d.marks_obtained,0)/count);

  // Per-subject averages
  const subjAvgs = {};
  DPP_SUBJECTS.forEach(s=>{
    const rows = dpps.filter(d=>d.subject===s.id);
    if (!rows.length){ subjAvgs[s.id]=0; return; }
    const tot = rows.reduce((a,d)=>a+d.marks_obtained/d.max_marks*100,0);
    subjAvgs[s.id] = Math.round(tot/rows.length);
  });

  // Per-subject counts
  const subjCounts = {};
  DPP_SUBJECTS.forEach(s=>{ subjCounts[s.id]=dpps.filter(d=>d.subject===s.id).length; });

  function tierClass(pct){ return pct>=70?'tier-green':pct>=40?'tier-amber':'tier-red'; }
  function pctClass(pct) { return pct>=70?'green':pct>=40?'amber':'red'; }

  const chartFiltered = chartFilter==='all'?dpps:dpps.filter(d=>d.subject===chartFilter);
  const selSubj = DPP_SUBJECTS.find(s=>s.id===form.subject);

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="ma-layout">

      {/* ── LEFT: log form ── */}
      <div className="ma-left">
        <div className="ma-form-header">
          <div className="ma-form-header-left">
            <div className="ma-form-header-title">DPP Analysis</div>
            <div className="ma-form-header-sub">Log DPPs · track subject trends</div>
          </div>
        </div>

        <div className="ma-form">
          <div className="ma-form-title">Log DPP</div>

          {/* DPP Name */}
          <div className="ma-field">
            <label>DPP Name</label>
            <input type="text" value={form.dpp_name}
              onChange={e=>setForm(p=>({...p,dpp_name:e.target.value}))}
              placeholder="e.g. Allen DPP 24 – Limits"/>
          </div>

          {/* Subject selector */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Subject</div>
            <div className="dpp-subj-btns">
              {DPP_SUBJECTS.map(s=>{
                const isActive = form.subject===s.id;
                return (
                  <button key={s.id}
                    className={`dpp-subj-btn${isActive?' active':''}`}
                    style={isActive?{background:s.hex,borderColor:s.hex}:{borderColor:s.hex+'55',color:s.hex}}
                    onClick={()=>setForm(p=>({...p,subject:s.id}))}>
                    {s.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Date */}
          <div className="ma-field">
            <label>Date</label>
            <input type="date" value={form.dpp_date}
              onChange={e=>setForm(p=>({...p,dpp_date:e.target.value}))}/>
          </div>

          {/* Marks — only for selected subject */}
          <div className="dpp-marks-panel">
            <div style={{fontSize:9,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:selSubj?.hex,marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
              <span className="icon" style={{fontSize:13}}>{form.subject==='maths'?'functions':form.subject==='physics'?'bolt':'science'}</span>
              {selSubj?.label} · Marks
            </div>
            <div className="dpp-marks-grid">
              <div className="dpp-marks-box" style={{borderColor:selSubj?.hex+'55'}}>
                <span className="dpp-marks-box-label">Obtained</span>
                <input className="dpp-marks-input" type="number" min="0"
                  value={form.marks_obtained}
                  onChange={e=>setForm(p=>({...p,marks_obtained:e.target.value}))}
                  onBlur={e=>{ const v=Math.min(Math.max(0,+e.target.value||0),+form.max_marks||100); setForm(p=>({...p,marks_obtained:v})); }}
                  style={{borderColor:selSubj?.hex+'99'}}/>
              </div>
              <div className="dpp-marks-box">
                <span className="dpp-marks-box-label">Maximum</span>
                <input className="dpp-marks-input" type="number" min="1"
                  value={form.max_marks}
                  onChange={e=>setForm(p=>({...p,max_marks:e.target.value}))}
                  onBlur={e=>{ const v=Math.max(1,+e.target.value||100); setForm(p=>({...p,max_marks:v,marks_obtained:Math.min(+p.marks_obtained,v)})); }}/>
              </div>
            </div>
          </div>

          {/* Live score */}
          <div className="ma-live-total" style={{marginBottom:12}}>
            <div>
              <div className="ma-live-label">Score · {selSubj?.label}</div>
              <div className="ma-live-num">{form.marks_obtained} / {form.max_marks}</div>
            </div>
            <div className="ma-live-pct" style={{color:livePct>=70?'#16a34a':livePct>=40?'#ea580c':'#dc2626'}}>
              {livePct}%
            </div>
          </div>

          {/* Notes */}
          <div className="ma-field">
            <label>Notes (optional)</label>
            <textarea value={form.notes}
              onChange={e=>setForm(p=>({...p,notes:e.target.value}))}
              placeholder="Weak topics, mistakes…"/>
          </div>

          <button className="ma-submit-btn" disabled={saving||!form.dpp_name.trim()} onClick={handleSubmit}>
            {saving&&<span className="spinner" style={{width:14,height:14,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/>}
            Save DPP
          </button>
        </div>
      </div>

      {/* ── RIGHT ── */}
      <div className="ma-right">

        {/* Stat strip — 4 cards */}
        <div className="ma-stats-strip">
          {[
            {num:count,             lbl:'DPPs Logged'},
            {num:avgPct+'%',        lbl:'Avg Score'},
            {num:bestPct+'%',       lbl:'Best Score'},
            {num:avgMarks,          lbl:'Avg Marks'},
          ].map((s,i)=>(
            <div key={i} className="ma-stat">
              <div className="ma-stat-num">{s.num}</div>
              <div className="ma-stat-lbl">{s.lbl}</div>
            </div>
          ))}
        </div>

        {/* Analytics / History tabs */}
        <div className="ma-right-tabs">
          <button className={`ma-right-tab${rightView==='analytics'?' active':''}`} onClick={()=>setRightView('analytics')}>
            <span className="icon">insights</span>Analytics
          </button>
          <button className={`ma-right-tab${rightView==='history'?' active':''}`} onClick={()=>setRightView('history')}>
            <span className="icon">history</span>History
            {count>0&&<span className="ma-right-tab-count">{count}</span>}
          </button>
        </div>

        {/* ── ANALYTICS ── */}
        {rightView==='analytics' && (
          <div className="ma-analytics-panel">

            {/* Subject avg — bars or cards */}
            <div className="ma-subj-perf">
              <div className="ma-subj-perf-header">
                <span className="ma-subj-perf-title">Avg % by Subject</span>
                <div className="ma-subj-view-toggle">
                  <button className={`ma-subj-view-btn${subjView==='bars'?' active':''}`} onClick={()=>setSubjView('bars')} title="Bar view">
                    <span className="icon">align_start</span>
                  </button>
                  <button className={`ma-subj-view-btn${subjView==='cards'?' active':''}`} onClick={()=>setSubjView('cards')} title="Card view">
                    <span className="icon">grid_view</span>
                  </button>
                </div>
              </div>

              {subjView==='bars' ? (
                DPP_SUBJECTS.map(s=>(
                  <div key={s.id} className="ma-perf-row">
                    <span className="ma-perf-label">{s.label}</span>
                    <div className="ma-perf-bar-wrap">
                      <div className="ma-perf-bar" style={{width:`${subjAvgs[s.id]}%`,background:s.color}}/>
                    </div>
                    <span className="ma-perf-val">{subjAvgs[s.id]}%</span>
                    <span style={{fontSize:9,color:'var(--muted)',width:28,textAlign:'right',flexShrink:0}}>{subjCounts[s.id]}d</span>
                  </div>
                ))
              ) : (
                <div className="ma-subj-cards">
                  {DPP_SUBJECTS.map(s=>{
                    const pct=subjAvgs[s.id];
                    return (
                      <div key={s.id} className="ma-subj-card">
                        <div className="ma-subj-card-accent" style={{background:s.color}}/>
                        <div className="ma-subj-card-label">{s.label}</div>
                        <div className="ma-subj-card-pct" style={{color:s.color}}>{pct}%</div>
                        <div style={{fontSize:9,color:'var(--muted)',marginTop:2}}>{subjCounts[s.id]} DPP{subjCounts[s.id]!==1?'s':''}</div>
                        <div className="ma-subj-card-bar">
                          <div className="ma-subj-card-bar-fill" style={{width:`${pct}%`,background:s.color}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Chart */}
            <div className="ma-chart-section" style={{flex:1}}>
              <div className="ma-chart-header">
                <span className="ma-chart-header-left">Performance Trend</span>
                <div className="ma-chart-controls">
                  <div className="ma-pill-group">
                    {[{id:'line',icon:'show_chart'},{id:'bar',icon:'bar_chart'},{id:'scatter',icon:'scatter_plot'}].map(ct=>(
                      <button key={ct.id} className={`ma-pill${chartType===ct.id?' active':''}`}
                        onClick={()=>setChartType(ct.id)}>
                        <span className="icon" style={{fontSize:12,verticalAlign:'middle',marginRight:3}}>{ct.icon}</span>{ct.id}
                      </button>
                    ))}
                  </div>
                  <div className="ma-pill-group">
                    <button className={`ma-pill${chartFilter==='all'?' active':''}`} onClick={()=>setChartFilter('all')}>All</button>
                    {DPP_SUBJECTS.map(s=>(
                      <button key={s.id}
                        className={`ma-pill${chartFilter===s.id?' active':''}`}
                        style={chartFilter===s.id?{background:s.hex,borderColor:s.hex}:{borderColor:s.hex+'55',color:s.hex}}
                        onClick={()=>setChartFilter(s.id)}>{s.label}</button>
                    ))}
                  </div>
                </div>
              </div>
              {chartFiltered.length < 1 ? (
                <div className="ma-chart-empty">
                  <span className="icon">show_chart</span>
                  {count===0?'Log your first DPP to see the trend':'No DPPs for this filter'}
                </div>
              ) : chartFiltered.length < 2 && chartType==='line' ? (
                <div className="ma-chart-empty">
                  <span className="icon">show_chart</span>Add at least 2 DPPs to see the line trend
                </div>
              ) : (
                <div className="ma-chart-canvas-wrap">
                  <canvas ref={chartRef}/>
                </div>
              )}
            </div>

          </div>
        )}

        {/* ── HISTORY ── */}
        {rightView==='history' && (
          <div className="ma-history-panel">
            <div className="ma-history-header">
              <span className="ma-history-title">All DPPs ({count})</span>
            </div>
            {count===0 ? (
              <div className="ma-empty">
                <span className="icon">book_2</span>
                No DPPs logged yet. Add your first DPP to start tracking.
              </div>
            ) : (
              <div className="ma-cards-grid">
                {[...dpps].reverse().map(d=>{
                  const pct   = Math.round(d.marks_obtained/d.max_marks*100);
                  const subj  = DPP_SUBJECTS.find(s=>s.id===d.subject)||DPP_SUBJECTS[0];
                  return (
                    <div key={d.id} className={`ma-card ${tierClass(pct)}`} style={{borderLeftColor:subj.hex}}>
                      <div className="ma-card-top">
                        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                          <span style={{fontSize:9,fontWeight:700,padding:'2px 8px',border:`1.5px solid ${subj.hex}`,borderRadius:20,color:subj.hex,letterSpacing:'0.05em',textTransform:'uppercase'}}>
                            {subj.label}
                          </span>
                        </div>
                        <div className="ma-card-name">{d.dpp_name}</div>
                        <div className="ma-card-date">{fmtDate(d.dpp_date)}</div>
                        <div className={`ma-card-pct ${pctClass(pct)}`}>{pct}%</div>
                        <div className="ma-card-marks">{d.marks_obtained} / {d.max_marks} marks</div>
                      </div>
                      {d.notes&&(
                        <div style={{padding:'6px 14px',fontSize:11,color:'var(--muted)',fontStyle:'italic',borderTop:'1px solid var(--s-low)'}}>
                          {d.notes}
                        </div>
                      )}
                      <div className="ma-card-footer">
                        <span/>
                        <button className="ma-card-del" onClick={()=>handleDelete(d.id)}>
                          <span className="icon">delete</span>
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

// ===================== NOTES =====================
const NOTE_COLORS = [
  { hex:'#ffffff', label:'White'    },
  { hex:'#fef9c3', label:'Yellow'   },
  { hex:'#dcfce7', label:'Green'    },
  { hex:'#dbeafe', label:'Blue'     },
  { hex:'#fce7f3', label:'Pink'     },
  { hex:'#ede9fe', label:'Purple'   },
  { hex:'#ffedd5', label:'Orange'   },
  { hex:'#f1f5f9', label:'Slate'    },
];
// dark-mode friendly accent colors (top bar stripe)
const ACCENT_MAP = {
  '#ffffff':'#e2e2e2','#fef9c3':'#ca8a04','#dcfce7':'#16a34a',
  '#dbeafe':'#2563eb','#fce7f3':'#db2777','#ede9fe':'#7c3aed',
  '#ffedd5':'#ea580c','#f1f5f9':'#64748b',
};

function NotesManager({ user, showToast }) {
  const [notes, setNotes]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [saving, setSaving]     = useState(false);
  const [search, setSearch]     = useState('');
  const [filter, setFilter]     = useState('all'); // 'all' | 'pinned'
  const [modal, setModal]       = useState(null);   // null | { mode:'new'|'edit', note?:{} }

  // form state inside modal
  const [fTitle, setFTitle]     = useState('');
  const [fBody,  setFBody]      = useState('');
  const [fColor, setFColor]     = useState('#ffffff');

  const isDark = document.documentElement.getAttribute('data-theme')=='dark';

  useEffect(()=>{
    if (!user) return;
    sb.from('studex_notes_cards').select('*').eq('user_id',user.id)
      .order('pinned',{ascending:false}).order('created_at',{ascending:false})
      .then(({data})=>{ setNotes(data||[]); setLoading(false); });
  },[user]);

  function openNew() {
    setFTitle(''); setFBody(''); setFColor('#ffffff');
    setModal({mode:'new'});
  }
  function openEdit(n) {
    setFTitle(n.title); setFBody(n.body); setFColor(n.color||'#ffffff');
    setModal({mode:'edit', note:n});
  }
  function closeModal() { setModal(null); }

  async function handleSave() {
    if (!fBody.trim() && !fTitle.trim()) return;
    setSaving(true);
    if (modal.mode==='new') {
      const { data, error } = await sb.from('studex_notes_cards')
        .insert({ user_id:user.id, title:fTitle.trim(), body:fBody.trim(), color:fColor, pinned:false })
        .select().single();
      if (error) { showToast('Failed to save note','error'); }
      else { setNotes(p=>[data,...p]); showToast('Note saved','sticky_note_2'); closeModal(); }
    } else {
      const { data, error } = await sb.from('studex_notes_cards')
        .update({ title:fTitle.trim(), body:fBody.trim(), color:fColor, updated_at:new Date().toISOString() })
        .eq('id',modal.note.id).select().single();
      if (error) { showToast('Failed to update note','error'); }
      else { setNotes(p=>p.map(n=>n.id===data.id?data:n)); showToast('Note updated','edit'); closeModal(); }
    }
    setSaving(false);
  }

  async function handlePin(n) {
    const { data, error } = await sb.from('studex_notes_cards')
      .update({ pinned:!n.pinned }).eq('id',n.id).select().single();
    if (!error) {
      setNotes(p=>{
        const updated = p.map(x=>x.id===data.id?data:x);
        return [...updated].sort((a,b)=> b.pinned-a.pinned || new Date(b.created_at)-new Date(a.created_at));
      });
    }
  }

  async function handleDelete(id) {
    await sb.from('studex_notes_cards').delete().eq('id',id);
    setNotes(p=>p.filter(n=>n.id!==id));
    showToast('Note deleted','delete');
  }

  // Filtering + search
  const visible = notes.filter(n=>{
    if (filter==='pinned' && !n.pinned) return false;
    if (search) {
      const q = search.toLowerCase();
      return n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q);
    }
    return true;
  });

  const pinned   = visible.filter(n=>n.pinned);
  const unpinned = visible.filter(n=>!n.pinned);
  const pinnedCount = notes.filter(n=>n.pinned).length;

  function fmtNoteDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }

  function cardBg(hex) {
    // in dark mode, tint the dark surface instead of using the light pastel
    if (isDark) {
      if (hex==='#ffffff') return 'var(--surface)';
      // blend a subtle tint
      return hex==='#fef9c3'?'#1a1800':hex==='#dcfce7'?'#001a08':hex==='#dbeafe'?'#00081a'
           :hex==='#fce7f3'?'#1a0010':hex==='#ede9fe'?'#0e0018':hex==='#ffedd5'?'#1a0800'
           :hex==='#f1f5f9'?'#141618':'var(--surface)';
    }
    return hex;
  }

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

  return (
    <div className="nt-layout">

      {/* Top bar */}
      <div className="nt-topbar">
        <div>
          <div className="nt-topbar-title">Notes</div>
          <div className="nt-topbar-sub">{notes.length} note{notes.length!==1?'s':''} · {pinnedCount} pinned</div>
        </div>
        <div className="nt-search-wrap">
          <span className="icon">search</span>
          <input className="nt-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search notes…"/>
        </div>
        <button className="nt-new-btn" onClick={openNew}>
          <span className="icon">add</span>New Note
        </button>
      </div>

      {/* Filter chips */}
      <div className="nt-filters">
        <button className={`nt-filter-chip${filter==='all'?' active':''}`} onClick={()=>setFilter('all')}>
          <span className="icon">notes</span>All
          <span className="nt-count-badge">{notes.length}</span>
        </button>
        <button className={`nt-filter-chip${filter==='pinned'?' active':''}`} onClick={()=>setFilter('pinned')}>
          <span className="icon">push_pin</span>Pinned
          <span className="nt-count-badge">{pinnedCount}</span>
        </button>
      </div>

      {/* Grid */}
      <div className="nt-grid-wrap">
        {visible.length===0 ? (
          <div className="nt-empty">
            <span className="icon nt-empty-icon">sticky_note_2</span>
            <div className="nt-empty-title">{search?'No matches':(filter==='pinned'?'No pinned notes':'No notes yet')}</div>
            <div className="nt-empty-sub">
              {search?'Try a different search term.':(filter==='pinned'?'Pin a note to keep it at the top.':`Click "New Note" to capture a thought, formula, or reminder.`)}
            </div>
            {!search && filter==='all' && (
              <button className="nt-new-btn" style={{marginTop:8}} onClick={openNew}>
                <span className="icon">add</span>Create first note
              </button>
            )}
          </div>
        ) : (
          <div>
            {/* Pinned section */}
            {filter==='all' && pinned.length>0 && unpinned.length>0 && (
              <div className="nt-section-label" style={{marginBottom:10}}>
                <span className="icon" style={{fontSize:13}}>push_pin</span>Pinned
              </div>
            )}
            {pinned.length>0 && (
              <div className="nt-grid" style={{marginBottom: unpinned.length>0?20:0}}>
                {pinned.map(n=><NoteCard key={n.id} note={n} onEdit={openEdit} onPin={handlePin} onDelete={handleDelete} cardBg={cardBg} isDark={isDark}/>)}
              </div>
            )}
            {/* Unpinned section */}
            {filter==='all' && pinned.length>0 && unpinned.length>0 && (
              <div className="nt-section-label" style={{marginBottom:10}}>
                <span className="icon" style={{fontSize:13}}>notes</span>Others
              </div>
            )}
            {unpinned.length>0 && (
              <div className="nt-grid">
                {unpinned.map(n=><NoteCard key={n.id} note={n} onEdit={openEdit} onPin={handlePin} onDelete={handleDelete} cardBg={cardBg} isDark={isDark}/>)}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Compose / Edit modal */}
      {modal && (
        <div className="nt-modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) closeModal(); }}>
          <div className="nt-modal">
            <div className="nt-modal-head">
              <span className="nt-modal-head-title">{modal.mode==='new'?'New Note':'Edit Note'}</span>
              <button className="nt-modal-close" onClick={closeModal}><span className="icon">close</span></button>
            </div>
            <div className="nt-modal-body">
              <div className="nt-modal-field">
                <label>Title <span style={{fontWeight:400,opacity:0.5}}>(optional)</span></label>
                <input className="nt-modal-title-input" value={fTitle}
                  onChange={e=>setFTitle(e.target.value)} placeholder="Note title…"
                  onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); document.getElementById('nt-body-input')?.focus(); } }}/>
              </div>
              <div className="nt-modal-field">
                <label>Content</label>
                <textarea id="nt-body-input" className="nt-modal-body-input" value={fBody}
                  onChange={e=>setFBody(e.target.value)} placeholder="Write your note… formulas, key points, reminders…"
                  autoFocus={modal.mode==='new'&&!fTitle}/>
              </div>
              <div className="nt-modal-field">
                <label>Card color</label>
                <div className="nt-color-row">
                  {NOTE_COLORS.map(c=>(
                    <div key={c.hex} className={`nt-color-swatch${fColor===c.hex?' selected':''}`}
                      style={{background:c.hex, border: fColor===c.hex?'2.5px solid var(--ink)':'2px solid var(--s-dim)'}}
                      title={c.label} onClick={()=>setFColor(c.hex)}/>
                  ))}
                  <div className="nt-color-custom" style={{background: NOTE_COLORS.some(c=>c.hex===fColor)?'transparent':fColor}}
                    title="Custom color">
                    <span className="icon">colorize</span>
                    <input type="color" value={fColor} onChange={e=>setFColor(e.target.value)}/>
                  </div>
                </div>
              </div>
            </div>
            <div className="nt-modal-footer">
              <button className="nt-cancel-btn" onClick={closeModal}>Cancel</button>
              <button className="nt-save-btn" disabled={saving||(!fTitle.trim()&&!fBody.trim())} onClick={handleSave}>
                {saving&&<span className="spinner" style={{width:12,height:12,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/>}
                {modal.mode==='new'?'Save Note':'Save Changes'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function NoteCard({ note, onEdit, onPin, onDelete, cardBg, isDark }) {
  const accent = ACCENT_MAP[note.color] || '#888';
  const bg     = cardBg(note.color||'#ffffff');
  const bodyPreview = note.body.length>220 ? note.body.slice(0,220)+'…' : note.body;

  function fmtNoteDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  }

  return (
    <div className="nt-card" style={{background:bg}}>
      <div className="nt-card-accent" style={{background:accent}}/>
      {note.pinned && (
        <div className="nt-pin-badge"><span className="icon" style={{fontSize:10,color:'var(--on-ink)',fontVariationSettings:"'FILL' 1"}}>push_pin</span></div>
      )}
      <div className="nt-card-body" onClick={()=>onEdit(note)} style={{cursor:'pointer'}}>
        {note.title && <div className="nt-card-title">{note.title}</div>}
        {note.body  && <div className="nt-card-text">{bodyPreview}</div>}
      </div>
      <div className="nt-card-footer" style={{borderTopColor: isDark?'var(--s-dim)':`${accent}33`}}>
        <span className="nt-card-date">{fmtNoteDate(note.updated_at||note.created_at)}</span>
        <div className="nt-card-actions">
          <button className={`nt-card-btn${note.pinned?' pin-active':''}`} onClick={()=>onPin(note)} title={note.pinned?'Unpin':'Pin'}>
            <span className="icon" style={{fontVariationSettings:note.pinned?"'FILL' 1":"'FILL' 0"}}>push_pin</span>
          </button>
          <button className="nt-card-btn" onClick={()=>onEdit(note)} title="Edit">
            <span className="icon">edit</span>
          </button>
          <button className="nt-card-btn del-btn" onClick={()=>onDelete(note.id)} title="Delete">
            <span className="icon">delete</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// CSS var names driven by settings keys
const SETTINGS_CSS_MAP = {
  // subjects
  maths: '--c-maths', physics: '--c-physics', organic: '--c-organic',
  inorganic: '--c-inorganic', physical: '--c-physical',
  // surface
  bg: '--bg', surface: '--surface', ink: '--ink', err: '--err',
  // checkbox
  checkbox_bg: '--checkbox-bg', checkbox_border: '--checkbox-border',
  // revision pills
  rev_done: '--rev-done', rev_overdue: '--rev-overdue', rev_today: '--rev-today',
  // difficulty
  diff_easy: '--diff-easy', diff_medium: '--diff-medium', diff_hard: '--diff-hard',
  // consistency
  con_studied: '--con-studied', con_missed: '--con-missed',
  // hours
  hours_met: '--hours-met', hours_unmet: '--hours-unmet',
  // revision action buttons
  rev_mark_border: '--rev-mark-border', rev_mark_hover_bg: '--rev-mark-hover-bg',
  rev_undo_border: '--rev-undo-border', rev_undo_hover: '--rev-undo-hover',
};

function applySettings(s) {
  const el = document.documentElement;
  const isDark = el.getAttribute('data-theme') === 'dark';
  const pfx = isDark ? 'dark' : 'light';
  Object.entries(SETTINGS_CSS_MAP).forEach(([key, cssVar]) => {
    const val = s[`${pfx}_${key}`] || SETTINGS_DEFAULTS[`${pfx}_${key}`];
    if (val) el.style.setProperty(cssVar, val);
  });
  // font size
  const sz = s.font_size || 'normal';
  el.style.fontSize = sz==='small'?'13px':sz==='large'?'15px':'14px';
}

// ── Inject dynamic CSS variables that all tabs consume ──

    .diff-btn.medium:hover { background: var(--diff-medium, #ea580c) !important; color: #fff !important; }
    .diff-badge.hard, .diff-btn.hard { border-color: var(--diff-hard, #ba1a1a) !important; color: var(--diff-hard, #ba1a1a) !important; }
    .diff-badge.hard { background: color-mix(in srgb, var(--diff-hard, #ba1a1a) 8%, transparent) !important; }
    .diff-btn.hard:hover { background: var(--diff-hard, #ba1a1a) !important; color: #fff !important; }

    /* Consistency heatmap */

    .heatmap-cell[data-status="missed"]  { background: var(--con-missed,  var(--err)) !important; }

    .week-day[data-status="missed"]  { border-color: var(--con-missed, var(--err)) !important; }

    /* Revision Mark Done button */
    .btn-mark, .ddr-btn-mark {
      border-color: var(--rev-mark-border, var(--ink)) !important;
      color: var(--rev-mark-border, var(--ink)) !important;

      background: var(--rev-mark-hover-bg, var(--ink)) !important;

    /* Revision Undo button */

      border-color: var(--rev-undo-hover, var(--ink)) !important;
      color: var(--rev-undo-hover, var(--ink)) !important;
    }
  `;
  document.head.appendChild(style);
})();

function SettingsManager({ user, showToast, darkMode, onThemeChange }) {
  const [section, setSection] = useState('appearance');
  const [settings, setSettings] = useState(SETTINGS_DEFAULTS);
  const [loading,  setLoading]  = useState(true);
  const [saving,   setSaving]   = useState(false);
  const [saved,    setSaved]    = useState(false);
  const [dirty,    setDirty]    = useState(false);

  const isDark = darkMode;
  const pfx    = isDark ? 'dark' : 'light';

  useEffect(() => {
    if (!user) return;
    sb.from('user_settings').select('settings').eq('user_id', user.id).maybeSingle()
      .then(({ data }) => {
        if (data?.settings) {
          const merged = { ...SETTINGS_DEFAULTS, ...data.settings };
          setSettings(merged);
          applySettings(merged);
        }
        setLoading(false);
      });
  }, [user]);

  useEffect(() => {
    if (!loading) applySettings(settings);
  }, [darkMode]);

  function set(key, val) {
    setSettings(p => {
      const n = { ...p, [key]: val };
      const curDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const curPfx  = curDark ? 'dark' : 'light';
      // only live-apply if editing the currently active theme
      if (key.startsWith(curPfx + '_')) {
        const shortKey = key.slice(curPfx.length + 1);
        const cssVar = SETTINGS_CSS_MAP[shortKey];
        if (cssVar) document.documentElement.style.setProperty(cssVar, val);
        // also map to legacy vars
        if (shortKey === 'bg')      document.documentElement.style.setProperty('--bg', val);
        if (shortKey === 'surface') document.documentElement.style.setProperty('--surface', val);
        if (shortKey === 'ink')     document.documentElement.style.setProperty('--ink', val);
        if (shortKey === 'err')     document.documentElement.style.setProperty('--err', val);
        ['maths','physics','organic','inorganic','physical'].forEach(s => {
          if (shortKey === s) document.documentElement.style.setProperty(`--c-${s}`, val);
        });
      }
      if (key === 'font_size') {
        document.documentElement.style.fontSize = val==='small'?'13px':val==='large'?'15px':'14px';
      }
      return n;
    });
    setDirty(true); setSaved(false);
  }

  async function handleSave() {
    setSaving(true);
    // also push study hours colors to study_hours_settings for that tab
    const shPatch = {
      color_met:        settings.light_hours_met,
      color_unmet:      settings.light_hours_unmet,
      color_met_dark:   settings.dark_hours_met,
      color_unmet_dark: settings.dark_hours_unmet,
    };
    await sb.from('study_hours_settings').upsert({ user_id: user.id, ...shPatch }, { onConflict: 'user_id' });
    const { error } = await sb.from('user_settings')
      .upsert({ user_id: user.id, settings, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
    if (error) { showToast('Failed to save settings', 'error'); }
    else { showToast('Settings saved', 'settings'); setSaved(true); setDirty(false); }
    setSaving(false);
  }

  function handleReset(which) {
    const keys = which === 'colors'
      ? Object.keys(SETTINGS_DEFAULTS).filter(k => k !== 'font_size')
      : Object.keys(SETTINGS_DEFAULTS);
    const patch = {};
    keys.forEach(k => { patch[k] = SETTINGS_DEFAULTS[k]; });
    const next = { ...settings, ...patch };
    setSettings(next);
    applySettings(next);
    setDirty(true); setSaved(false);
    showToast('Reset to defaults', 'refresh');
  }

  // ── Color row helper ──
  function ColorRow({ icon, label, desc, settingKey }) {
    const fullKey = `${pfx}_${settingKey}`;
    const val = settings[fullKey] || SETTINGS_DEFAULTS[fullKey] || '#000000';
    return (
      <div className="st-row">
        <div className="st-row-icon"><span className="icon">{icon}</span></div>
        <div className="st-row-info">
          <div className="st-row-label">{label}</div>
          <div className="st-row-sub">{desc}</div>
        </div>
        <div className="st-row-ctrl">
          <span style={{fontSize:10,color:'var(--muted)',fontFamily:'monospace'}}>{val}</span>
          <div className="st-color-dot" style={{background:val,borderColor:'var(--s-dim)'}}>
            <input type="color" value={val} onChange={e=>set(fullKey,e.target.value)}/>
          </div>
        </div>
      </div>
    );
  }

  // ── Dual color row (light + dark side-by-side) ──
  function DualColorRow({ icon, label, desc, lightKey, darkKey }) {
    const lv = settings[`light_${lightKey}`] || SETTINGS_DEFAULTS[`light_${lightKey}`] || '#000';
    const dv = settings[`dark_${darkKey||lightKey}`]  || SETTINGS_DEFAULTS[`dark_${darkKey||lightKey}`]  || '#fff';
    return (

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>

              <div className="st-section-head"><div className="st-section-title">Reset</div><div className="st-section-sub">Restore defaults. Study data is never affected.</div></div>
              <div className="st-card">
                <div className="st-row">
                  <div className="st-row-icon"><span className="icon">palette</span></div>
                  <div className="st-row-info"><div className="st-row-label">Reset all colors</div><div className="st-row-sub">Restore every color to factory defaults for both themes</div></div>
                  <div className="st-row-ctrl"><button className="st-reset-btn" onClick={()=>handleReset('colors')}>Reset Colors</button></div>
                </div>
                <div className="st-row">
                  <div className="st-row-icon"><span className="icon">settings_backup_restore</span></div>
                  <div className="st-row-info"><div className="st-row-label">Reset everything</div><div className="st-row-sub">All settings including font size</div></div>
                  <div className="st-row-ctrl"><button className="st-reset-btn" onClick={()=>handleReset('all')}>Reset All</button></div>
                </div>
              </div>
            </div>
            <div className="st-section">
              <div className="st-section-head"><div className="st-section-title">Active CSS Token Reference</div><div className="st-section-sub">Current {isDark?'dark':'light'} theme values.</div></div>
              <div className="st-card">
                {[
                  {label:'--c-maths',       val:settings[`${pfx}_maths`]},
                  {label:'--c-physics',     val:settings[`${pfx}_physics`]},
                  {label:'--c-organic',     val:settings[`${pfx}_organic`]},
                  {label:'--c-inorganic',   val:settings[`${pfx}_inorganic`]},
                  {label:'--c-physical',    val:settings[`${pfx}_physical`]},
                  {label:'--bg',            val:settings[`${pfx}_bg`]},
                  {label:'--surface',       val:settings[`${pfx}_surface`]},
                  {label:'--ink',           val:settings[`${pfx}_ink`]},
                  {label:'--err',           val:settings[`${pfx}_err`]},
                  {label:'--checkbox-bg',   val:settings[`${pfx}_checkbox_bg`]},
                  {label:'--rev-done',      val:settings[`${pfx}_rev_done`]},
                  {label:'--rev-overdue',   val:settings[`${pfx}_rev_overdue`]},
                  {label:'--diff-easy',     val:settings[`${pfx}_diff_easy`]},
                  {label:'--diff-medium',   val:settings[`${pfx}_diff_medium`]},
                  {label:'--diff-hard',     val:settings[`${pfx}_diff_hard`]},
                  {label:'--con-studied',   val:settings[`${pfx}_con_studied`]},
                  {label:'--con-missed',    val:settings[`${pfx}_con_missed`]},
                  {label:'--hours-met',     val:settings[`${pfx}_hours_met`]},
                  {label:'--hours-unmet',   val:settings[`${pfx}_hours_unmet`]},
                ].map(t=>(
                  <div key={t.label} className="st-row" style={{paddingTop:8,paddingBottom:8}}>
                    <div style={{width:18,height:18,borderRadius:4,background:t.val||'transparent',border:'1px solid var(--s-dim)',flexShrink:0}}/>
                    <div style={{flex:1,fontFamily:'monospace',fontSize:10,color:'var(--muted)'}}>{t.label}</div>
                    <div style={{fontFamily:'monospace',fontSize:10,color:'var(--ink)',fontWeight:600}}>{t.val||'—'}</div>
                  </div>
                ))}
              </div>
            </div>
          </>)}

        </div>

        <div className="st-save-bar">
          {saved
            ? <span className="st-saved-badge"><span className="icon">check_circle</span>Saved</span>
            : <span className="st-save-hint">{dirty?'Unsaved changes.':'All changes saved.'}</span>}
          <button className="st-save-btn" disabled={saving||!dirty} onClick={handleSave}>
            {saving&&<span className="spinner" style={{width:12,height:12,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}}/>}
            Save Settings
          </button>
        </div>
      </div>
    </div>
  );
}


// ===================== USER PROFILE =====================
const CLOUDINARY_CLOUD = 'dlygqn0vk';
const CLOUDINARY_PRESET = 'multistudex';

async function uploadToCloudinary(file, folder='avatars') {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  fd.append('folder', folder);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {method:'POST', body:fd});
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.secure_url;
}

function UserProfile({ user, showToast, checkedMap, doneSet, mocks, onProfileUpdate }) {
  const EMPTY = {
    display_name:'', tagline:'', bio:'', motivation_quote:'',
    target_college:'', target_rank:'', prep_start_date:'',
    avatar_url:'', banner_url:'', city:'', phone:'',
    school_name:'', board:'', class_year:'', coaching:'',
    attempt_year:'', jee_type:'', daily_study_goal:'',
    strong_subjects:'', weak_subjects:''
  };
  const [profile,         setProfile]         = useState(EMPTY);
  const [loading,         setLoading]         = useState(true);
  const [showEdit,        setShowEdit]        = useState(false);
  const [draft,           setDraft]           = useState({});
  const [saving,          setSaving]          = useState(false);
  const [uploadingAvatar, setUploadingAvatar] = useState(false);
  const [uploadingBanner, setUploadingBanner] = useState(false);

  useEffect(()=>{
    if (!user) return;
    sb.from('user_profiles').select('*').eq('user_id',user.id).maybeSingle()
      .then(({data})=>{ if(data) setProfile({...EMPTY,...data}); setLoading(false); });
  },[user]);

  const initials = profile.display_name
    ? profile.display_name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()
    : (user?.email||'??').slice(0,2).toUpperCase();

  async function handleAvatarUpload(e) {
    const file = e.target.files?.[0]; if (!file) return;
    if (file.size > 5*1024*1024) { showToast('Max 5MB','error'); return; }
    setUploadingAvatar(true);
    try {
      const url = await uploadToCloudinary(file,'studex/avatars');
      await sb.from('user_profiles').upsert({user_id:user.id,...profile,avatar_url:url,updated_at:new Date().toISOString()},{onConflict:'user_id'});
      setProfile(p=>({...p,avatar_url:url}));
      onProfileUpdate?.({avatar_url:url,display_name:profile.display_name});
      showToast('Avatar updated!','account_circle');
    } catch { showToast('Upload failed','error'); }
    setUploadingAvatar(false); e.target.value='';
  }

  async function handleBannerUpload(e) {
    const file = e.target.files?.[0]; if (!file) return;
    if (file.size > 10*1024*1024) { showToast('Max 10MB','error'); return; }
    setUploadingBanner(true);
    try {
      const url = await uploadToCloudinary(file,'studex/banners');
      await sb.from('user_profiles').upsert({user_id:user.id,...profile,banner_url:url,updated_at:new Date().toISOString()},{onConflict:'user_id'});
      setProfile(p=>({...p,banner_url:url}));
      showToast('Banner updated!','panorama');
    } catch { showToast('Upload failed','error'); }
    setUploadingBanner(false); e.target.value='';
  }

  async function handleSaveProfile() {
    setSaving(true);
    const {error} = await sb.from('user_profiles')
      .upsert({user_id:user.id,...draft,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    if (error) { showToast('Save failed','error'); }
    else {
      setProfile(p=>({...p,...draft}));
      onProfileUpdate?.({avatar_url:draft.avatar_url||profile.avatar_url,display_name:draft.display_name});
      showToast('Profile saved!','check_circle');
      setShowEdit(false);
    }
    setSaving(false);
  }

  // ── Computed stats ──
  const totalChapters = SUBJECTS.reduce((a,s)=>a+s.chapters.length,0);
  const doneChapters  = Object.keys(checkedMap).length;
  const syllPct       = totalChapters>0 ? Math.round(doneChapters/totalChapters*100) : 0;
  const mockCount     = mocks?.length||0;
  const avgMockPct    = mockCount>0 ? Math.round(mocks.reduce((a,m)=>a+m.total_marks/m.max_marks*100,0)/mockCount) : 0;
  const revDone       = doneSet.size;
  const daysActive    = profile.prep_start_date
    ? Math.max(0,Math.floor((new Date()-new Date(profile.prep_start_date+'T00:00:00'))/86400000)) : null;
  const subjProgress  = SUBJECTS.map(s=>{
    const done = s.chapters.filter(c=>checkedMap[c.id]).length;
    return {label:s.label, color:s.color, done, total:s.chapters.length,
            pct: s.chapters.length>0 ? Math.round(done/s.chapters.length*100):0};
  });

  const displayName = profile.display_name || user?.email?.split('@')[0] || 'Student';

  function IV(v,unit='') {
    return v ? <span className="prof-info-val">{v}{unit}</span>
             : <span className="prof-info-val empty">Not set</span>;
  }

  // pct → filled dots out of 5 (like star rating bars in WellMed)
  function PctDots({pct, color}) {
    const filled = Math.round(pct/20);
    return (
      <div className="prof-stat-dots">
        {Array.from({length:5}).map((_,i)=>(
          <div key={i} className={`prof-stat-dot${i<filled?' filled':''}`}
            style={i<filled?{background:color}:{}}/>
        ))}
      </div>
    );
  }

  function ContactRow({icon, label, val, link}) {
    return (
      <div className="prof-contact-row">
        <div className="prof-contact-icon"><span className="icon">{icon}</span></div>
        <div className="prof-contact-text">
          <span className="prof-contact-label">{label}</span>
          {val
            ? (link
                ? <a className="prof-contact-val link" href={link}>{val}</a>
                : <span className="prof-contact-val">{val}</span>)
            : <span className="prof-contact-val empty">Not set</span>}
        </div>
      </div>
    );
  }

  const STAT_COLORS = ['var(--c-maths)','#16a34a','var(--c-physical)','var(--c-inorganic)'];

  if (loading) return <div className="loading-wrap"><div className="spinner"/></div>;

    <div className="prof-layout">

      {/* ══════════════ LEFT CARD ══════════════ */}
      <div className="prof-left">

        {/* Banner + upload */}
        <div className="prof-left-hero">
          {profile.banner_url
            ? <img src={profile.banner_url} alt="Banner" className="prof-banner-img"/>
            : <div className="prof-banner-placeholder"/>}
          {uploadingBanner && (
            <div className="prof-banner-uploading-overlay">
              <div className="spinner" style={{borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff',width:22,height:22}}/>
              <span>Uploading…</span>
            </div>
          )}
          <label className="prof-banner-label" title="Change banner">
            <div className="prof-banner-label-inner">
              <span className="icon">panorama</span>Banner
            </div>
            <input type="file" accept="image/*" style={{display:'none'}} onChange={handleBannerUpload}/>
          </label>
        </div>

        {/* Avatar */}
        <div className="prof-avatar-wrap">
          <label className="prof-avatar" title="Change photo">
            {profile.avatar_url ? <img src={profile.avatar_url} alt="Avatar"/> : <span>{initials}</span>}
            {!uploadingAvatar
              ? <div className="prof-avatar-overlay">
                  <span className="icon">photo_camera</span>
                  <span className="prof-avatar-overlay-lbl">Change</span>
                </div>
              : <div className="prof-avatar-spinner">
                  <div className="spinner" style={{borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff',width:18,height:18}}/>
                </div>}
            <input type="file" accept="image/*" style={{display:'none'}} onChange={handleAvatarUpload}/>
          </label>
        </div>

        {/* Name block */}
        <div className="prof-left-name-block">
          <div className="prof-name">{displayName}</div>
          {profile.tagline && <div className="prof-tagline">{profile.tagline}</div>}
          <div className="prof-chips">
            {daysActive!==null && (
              <span className="prof-chip">
                <span className="icon" style={{color:'var(--c-physical)'}}>local_fire_department</span>
                {daysActive}d active
              </span>
            )}
            {profile.attempt_year && <span className="prof-chip"><span className="icon">event</span>JEE {profile.attempt_year}</span>}
            {profile.jee_type     && <span className="prof-chip"><span className="icon">verified</span>{profile.jee_type}</span>}
          </div>
        </div>

        {/* Bio */}
        {profile.bio && <div className="prof-bio-left">{profile.bio}</div>}

        {/* Contact list */}
        <div className="prof-contact-list">
          <ContactRow icon="location_on"     label="City"         val={profile.city}/>
          <ContactRow icon="account_balance" label="Coaching"     val={profile.coaching}/>
          <ContactRow icon="phone"           label="Phone"        val={profile.phone}/>
          <ContactRow icon="alternate_email" label="Email"        val={user?.email} link={`mailto:${user?.email}`}/>
          <ContactRow icon="menu_book"       label="Class / Board" val={profile.class_year&&profile.board?`${profile.class_year} · ${profile.board}`:profile.class_year||profile.board||''}/>
          <ContactRow icon="event_available" label="Prep Since"   val={profile.prep_start_date ? fmtDate(profile.prep_start_date) : ''}/>
        </div>

        {/* Footer CTA */}
        <div className="prof-left-footer">
          <button className="prof-edit-btn-full" onClick={()=>{ setDraft({...profile}); setShowEdit(true); }}>
            <span className="icon">manage_accounts</span>Edit Profile
          </button>
        </div>

      </div>

      {/* ══════════════ MIDDLE COLUMN ══════════════ */}
      <div className="prof-middle">

        {/* Header — name + bio like "Dr. Olivia Harper, MD ✓  Specialist in Cardiology  Bio text" */}
        <div className="prof-mid-header">
          <div className="prof-mid-name">

        </div>

        {/* Stats strip — like "4.9 Overall | 4.8 Patient Care | …" */}
        <div className="prof-stats-row">

            {num:avgMockPct>0?`${avgMockPct}%`:'—', lbl:'Avg Mock Score',sub:`${mockCount} mock${mockCount!==1?'s':''} logged`, color:'#16a34a', pct:avgMockPct},

            <div key={i} className="prof-stat-cell">

              {s.pct>0 && <PctDots pct={s.pct} color={s.color}/>}

        </div>

        {/* Body */}
        <div className="prof-mid-body">

          {/* Subject Progress — like "Top Patient Visit Reasons" */}

            {/* Top 3 as big cards */}

              <div className="prof-subj-rows">
                {subjProgress.slice(3).map((s,i)=>(
                  <div key={i} className="prof-subj-row">

                    <div className="prof-subj-row-bar-wrap">

          {/* Highlights — like "Professional Highlights 1200+ Patients Treated …" */}
          <div>
            <div className="prof-sec-head">
              <div className="prof-sec-title">Prep Highlights</div>
            </div>
            <div className="prof-highlights">
              {[
                {icon:'menu_book',   color:'#2563eb', bg:'#dbeafe', num:`${doneChapters}+`,  label:'Chapters Done'},
                {icon:'event_repeat',color:'#7c3aed', bg:'#ede9fe', num:`${revDone}+`,       label:'Revisions Done'},

                    <span className="icon" style={{color:h.color,fontSize:22}}>{h.icon}</span>
                  </div>

                </div>
              ))}
            </div>
          </div>

        </div>
      </div>

      {/* ══════════════ RIGHT SIDEBAR ══════════════ */}
      <div className="prof-right">

          <div className="prof-info-card-head"><span className="icon">emoji_events</span>JEE Goals</div>

          <div className="prof-info-row"><span className="prof-info-key">Coaching</span>{IV(profile.coaching)}</div>
        </div>

          <div className="prof-quote-block">
            <span className="icon prof-quote-icon">format_quote</span>
            <span className="prof-quote-text">{profile.motivation_quote}</span>
